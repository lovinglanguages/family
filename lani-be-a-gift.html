<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
  <title>Loving English Garden - Teacher Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, getDocs, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB_RqXoT5thozqJGYP0_MKCjGXcne5Qr8I",
      authDomain: "dailyenglish-aca50.firebaseapp.com",
      projectId: "dailyenglish-aca50",
      storageBucket: "dailyenglish-aca50.firebasestorage.app",
      messagingSenderId: "876041668209",
      appId: "1:876041668209:web:4ee8019d0605650a90bdd0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUserRole = "student";

    async function getUserData(email) {
      try {
        const docRef = doc(db, "whitelist", email.toLowerCase().trim());
        const docSnap = await getDoc(docRef);
        return docSnap.exists() ? docSnap.data() : null;
      } catch (e) { return null; }
    }

    window.loginWithGoogle = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const userData = await getUserData(result.user.email);
        if (userData) { location.reload(); } 
        else { await signOut(auth); alert("Email không có trong Whitelist!"); }
      } catch (error) { alert("Lỗi đăng nhập!"); }
    };

    // CHỨC NĂNG XEM BÀI LÀM (DÀNH CHO GIÁO VIÊN)
    window.loadAllSubmissions = async () => {
      const container = document.getElementById('submissionsContainer');
      container.innerHTML = "<p>Đang tải dữ liệu bài làm...</p>";
      try {
        const q = query(collection(db, "results"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = "";
        
        if(snap.empty) { container.innerHTML = "<p>Chưa có bài nộp nào.</p>"; return; }

        snap.forEach(doc => {
          const d = doc.data();
          const time = d.timestamp?.toDate().toLocaleString('vi-VN') || "Vừa xong";
          const typeIcon = d.type.includes('speaking') ? "🎙️" : "⌨️";
          
          container.innerHTML += `
            <div class="work-card">
              <div class="work-header">
                <span class="work-user">${d.email}</span>
                <span class="work-time">${time}</span>
              </div>
              <div class="work-info">Bài: Topic ${d.topic} - Ngày ${d.day} (${typeIcon})</div>
              <div class="work-content">${d.answer}</div>
              ${d.audioUrl ? `<audio controls src="${d.audioUrl}" class="work-audio"></audio>` : ""}
            </div>
          `;
        });
      } catch (e) { 
        container.innerHTML = "<p style='color:red'>Lỗi: Bạn cần tạo Index trên Firebase hoặc chưa được cấp quyền Teacher.</p>";
      }
    };

    window.logout = () => { signOut(auth); location.reload(); };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userData = await getUserData(user.email);
        if (userData) {
          currentUserRole = userData.role || "student";
          document.getElementById('loginOverlay').style.display = 'none';
          document.getElementById('userEmailDisplay').textContent = user.email;
          if (currentUserRole === "teacher") {
            document.getElementById('teacherSection').style.display = 'block';
            loadAllSubmissions();
          }
        } else { await signOut(auth); }
      }
    });
  </script>

  <style>
    :root{ --beige:#F5F0E8; --beige2:#EDE6D6; --warm:#D4C5A9; --wood:#8B6F4E; --green:#5C8A5E; --drop:#4A90D9; --text:#3D2B1F; --card-r:16px; }
    *{ margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
    body{ font-family:'Nunito',sans-serif; background:var(--beige); color:var(--text); min-height:100vh; }
    .nav{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:#fff; border-bottom:1px solid var(--warm); position:sticky; top:0; z-index:99; }
    .home-wrap{ max-width:900px; margin:0 auto; padding:20px; }
    .stats-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:30px; }
    .stat-box{ background:#fff; padding:15px; border-radius:12px; text-align:center; border:1px solid var(--beige2); }
    .stat-num{ font-size:24px; font-weight:800; color:var(--wood); }
    
    /* TEACHER DASHBOARD STYLE */
    #teacherSection { display:none; background:#fff; padding:25px; border-radius:24px; border:2px solid var(--green); margin-bottom:40px; }
    .work-card { background:var(--beige); padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid var(--warm); }
    .work-header { display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px dashed var(--warm); padding-bottom:5px; }
    .work-user { font-weight:800; color:var(--wood); font-size:14px; }
    .work-time { font-size:12px; color:var(--text); opacity:0.7; }
    .work-content { font-style:italic; padding:10px; background:#fff; border-radius:8px; margin-top:8px; border-left:4px solid var(--green); }
    .work-audio { width:100%; height:35px; margin-top:10px; }

    .topic-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:15px; }
    .t-card{ background:#fff; padding:15px; border-radius:16px; text-decoration:none; color:inherit; border:1px solid var(--beige2); }
    .login-overlay{ position:fixed; inset:0; background:var(--beige); z-index:9999; display:flex; align-items:center; justify-content:center; }
    .login-box{ background:#fff; padding:40px; border-radius:24px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
    .google-btn{ background:#fff; border:2px solid var(--beige2); padding:12px 24px; border-radius:12px; cursor:pointer; font-weight:800; display:flex; align-items:center; gap:10px; margin-top:20px; }
    
    @media (min-width: 1024px) {
      .home-wrap { max-width: 1100px; }
      .stat-num { font-size: 40px; }
      .topic-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
    }
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1 style="font-family:'Lora'; color:var(--wood)">Loving English Garden</h1>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
      Đăng nhập bằng Gmail
    </button>
  </div>
</div>

<div class="nav">
  <div style="font-family:'Lora'; font-weight:800; color:var(--wood)">🌱 English Garden</div>
  <div style="display:flex; align-items:center; gap:15px">
    <span id="userEmailDisplay" style="font-size:13px; font-weight:700; color:var(--green)"></span>
    <button onclick="logout()" style="background:none; border:1px solid var(--warm); padding:5px 10px; border-radius:8px; cursor:pointer">Thoát</button>
  </div>
</div>

<div class="home-wrap">
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num">100</div><p>Ngày học</p></div>
    <div class="stat-box"><div class="stat-num">10</div><p>Chủ đề</p></div>
    <div class="stat-box"><div class="stat-num">🔥 1</div><p>Chuỗi</p></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--green)">0%</div><p>Tiến độ</p></div>
  </div>

  <div id="teacherSection">
    <h2 style="font-family:'Lora'; color:var(--green); margin-bottom:20px">Góc Quản Lý Giáo Viên 👩‍🏫</h2>
    <div style="margin-bottom:20px; font-weight:bold">Tiến độ nộp bài của học viên:</div>
    <div id="submissionsContainer" style="max-height:600px; overflow-y:auto">
       </div>
  </div>

  <h3 style="margin-bottom:15px; text-transform:uppercase; color:var(--wood)">Lộ trình 100 ngày</h3>
  <div class="topic-grid">
    <a href="topic1.html" class="t-card">
      <div style="font-size:40px">👋</div>
      <div style="font-weight:800; margin:10px 0">Topic 1: Chào buổi sáng</div>
      <div style="font-size:12px; background:var(--beige2); display:inline-block; padding:3px 8px; border-radius:10px">Đang học</div>
    </a>
    </div>
</div>

<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
