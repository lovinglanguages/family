let fcIdxArr = {}; 
let quizStateArr = {}; 
let dictStateArr = {};
 
function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const globalDay = TOPIC.startDay + i;
    const isDone = doneDays.includes(i);
    const isActive = i === currentDay && currentView === 'day';
    const cls = isActive ? 'day-pill active' : isDone ? 'day-pill done' : 'day-pill';
    nav.innerHTML += `<button class="${cls}" onclick="openDay(${i})">
      <span class="day-pill-num">${globalDay}</span>
      ${isDone && !isActive ? '<span class="day-pill-check">✓</span>' : ''}
    </button>`;
  });
  const fsActive = currentView === 'fullscript';
  nav.innerHTML += `<button class="fs-pill${fsActive ? ' active' : ''}" onclick="openFullScript()">📜 Full Script</button>`;
}
 
function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = '';
  DAYS.forEach((day, i) => {
    const globalDay = TOPIC.startDay + i;
    container.innerHTML += buildPanel(day, i, globalDay);
  });
  container.innerHTML += buildFullScriptPanel();
  DAYS.forEach((_, i) => initDay(i));
}
 
function buildPanel(day, i, globalDay) {
  const dlHTML = day.dialogue.map(l => `
    <div class="dialogue-line"><strong>${l.speaker}:</strong> ${l.en}<div class="vn">${l.vn}</div></div>`).join('');
 
  return `
  <div class="day-panel${i === 0 ? ' active' : ''}" id="panel-${i}">
    <div class="day-header">
      <div class="day-num-label">Day ${globalDay}</div>
      <div class="day-title">${day.title}</div>
      <div class="day-dialogue-preview">${dlHTML}</div>
    </div>
 
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="switchMode(${i},'flashcard',this)">📇 Flashcard</button>
      <button class="mode-tab" onclick="switchMode(${i},'vocab',this)">📖 Từ vựng</button>
      <button class="mode-tab" onclick="switchMode(${i},'quiz',this)">❓ Quiz</button>
      <button class="mode-tab" onclick="switchMode(${i},'dictation',this)">✍️ Dictation</button>
      <button class="mode-tab" onclick="switchMode(${i},'shadowing',this)">🎤 Shadowing</button>
    </div>
 
    <div class="mode-content active" id="mode-${i}-flashcard">
      <div class="fc-wrap">
        <div class="fc" id="fc-${i}" onclick="flipCard(${i})">
          <div class="fc-front"><div class="fc-en" id="fc-en-${i}"></div><div class="fc-hint">👆 Bấm xem nghĩa</div></div>
          <div class="fc-back"><div class="fc-vn" id="fc-vn-${i}"></div></div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="fc-btn" onclick="fcPrev(${i})">←</button>
        <div id="fc-count-${i}"></div>
        <button class="fc-btn" onclick="fcNext(${i})">→</button>
      </div>
    </div>
 
    <div class="mode-content" id="mode-${i}-vocab">${buildVocabHTML(day.vocab)}</div>
    <div class="mode-content" id="mode-${i}-quiz"><div id="quiz-body-${i}"></div></div>
    <div class="mode-content" id="mode-${i}-dictation"><div id="dict-body-${i}"></div></div>
    <div class="mode-content" id="mode-${i}-shadowing">
      ${buildShadowHTML(day.shadowing, i)}
      <div class="done-banner" id="done-${i}"><div style="font-size:20px; font-weight:600; color:var(--sage-deep)">🌟 Tuyệt vời!</div><div>Bạn đã xong bài Day ${globalDay}</div></div>
      <button class="finish-btn" onclick="finishDay(${i})">✅ Hoàn thành bài học!</button>
    </div>
  </div>`;
}
 
function buildVocabHTML(vocab) {
  return vocab.map(v => `
    <div class="vocab-card">
      <div class="vocab-top"><div class="vocab-word">${v.en}</div><div class="vocab-phonetic">${v.phonetic}</div></div>
      <div class="vocab-body">
        <div class="vocab-meaning">${v.meaning}</div>
        <div class="vocab-row"><div class="vr-label">Example</div><div class="vr-val">${v.example}<br><i>${v.exampleVn}</i></div></div>
        <button class="speak-btn" onclick="speak('${v.en.replace(/'/g,"\\'")}')">🔊 Nghe</button>
      </div>
    </div>`).join('');
}
 
function buildShadowHTML(lines, i) {
  return lines.map((l, li) => {
    const id = `sh-${i}-${li}`;
    const safeEn = l.en.replace(/'/g, "\\'");
    return `
    <div class="shadow-card">
      <div class="shadow-en">${l.en}</div><div class="shadow-vn">${l.vn}</div>
      <div class="shadow-btns"><button class="shadow-btn primary" onclick="speak('${safeEn}')">▶ Nghe</button></div>
      <div class="rec-zone">
        <div class="rec-row">
          <button class="rec-btn" id="${id}-recbtn" onclick="toggleRecord('${id}','${safeEn}')">🎤</button>
          <div id="${id}-reclabel" style="font-size:12px">Bấm mic để tập nói</div>
          <button class="playback-btn" id="${id}-playbk" onclick="playbackRec('${id}')">▶ Nghe lại</button>
        </div>
        <div class="score-badge" id="${id}-score"></div>
      </div>
    </div>`;
  }).join('');
}
 
function buildFullScriptPanel() {
  const content = DAYS.map((d, i) => `
    <div class="fs-day-block">
      <div class="fs-day-header" onclick="toggleFsDay(${i})"><strong>Day ${TOPIC.startDay+i}: ${d.title}</strong></div>
      <div class="fs-dialogue" id="fsdlg-${i}">
        ${d.dialogue.map(l => `<div class="fs-line"><div class="fs-en">${l.en}</div><div class="fs-vn">${l.vn}</div></div>`).join('')}
      </div>
    </div>`).join('');
  return `<div id="panel-fullscript"><div style="padding:20px">${content}</div></div>`;
}
 
// ═══════════════════════════════════════════════════════
//  INTERACTION LOGIC
// ═══════════════════════════════════════════════════════
 
function openDay(i) {
  currentView = 'day'; currentDay = i;
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${i}`).classList.add('active');
  document.getElementById('panel-fullscript').classList.remove('active');
  renderNav();
}
 
function openFullScript() {
  currentView = 'fullscript';
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-fullscript').classList.add('active');
  renderNav();
}
 
function toggleFsDay(i) { document.getElementById(`fsdlg-${i}`).classList.toggle('open'); }
 
function switchMode(dayIdx, mode, btn) {
  const p = document.getElementById(`panel-${dayIdx}`);
  p.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  p.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`mode-${dayIdx}-${mode}`).classList.add('active');
}
 
function initDay(i) {
  fcIdxArr[i] = 0; updateFlashcard(i); renderQuiz(i); renderDict(i);
}
 
function updateFlashcard(i) {
  const card = DAYS[i].dialogue[fcIdxArr[i]];
  document.getElementById(`fc-en-${i}`).textContent = card.en;
  document.getElementById(`fc-vn-${i}`).textContent = card.vn;
  document.getElementById(`fc-count-${i}`).textContent = `${fcIdxArr[i]+1}/${DAYS[i].dialogue.length}`;
  document.getElementById(`fc-${i}`).classList.remove('flipped');
}
 
function flipCard(i) { document.getElementById(`fc-${i}`).classList.toggle('flipped'); }
function fcNext(i) { if(fcIdxArr[i] < DAYS[i].dialogue.length-1) { fcIdxArr[i]++; updateFlashcard(i); } }
function fcPrev(i) { if(fcIdxArr[i] > 0) { fcIdxArr[i]--; updateFlashcard(i); } }
 
function renderQuiz(i) {
  quizStateArr[i] = { idx: 0 }; renderQuizQuestion(i);
}
 
function renderQuizQuestion(i) {
  const state = quizStateArr[i];
  const q = DAYS[i].quiz[state.idx];
  const container = document.getElementById(`quiz-body-${i}`);
  if (!q) {
    container.innerHTML = `<div class="done-banner show">Xong Quiz rồi!</div>`; return;
  }
  container.innerHTML = `
    <div class="quiz-q-card">
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-opts">
        ${q.opts.map((o, oi) => `<button class="quiz-opt" onclick="checkQuiz(${i},${oi})">${o}</button>`).join('')}
      </div>
      <div class="quiz-fb" id="qfb-${i}"></div>
      <button class="quiz-next" id="qnext-${i}" onclick="nextQuiz(${i})" style="display:none">Câu tiếp theo</button>
    </div>`;
}
 
function checkQuiz(i, chosen) {
  const q = DAYS[i].quiz[quizStateArr[i].idx];
  const fb = document.getElementById(`qfb-${i}`);
  const opts = document.querySelectorAll(`#panel-${i} .quiz-opt`);
  opts.forEach(o => o.style.pointerEvents = 'none');
  if (chosen === q.ans) {
    opts[chosen].classList.add('correct'); fb.textContent = "Đúng rồi! " + q.exp; fb.className = "quiz-fb ok show";
  } else {
    opts[chosen].classList.add('wrong'); fb.textContent = "Chưa đúng. " + q.exp; fb.className = "quiz-fb nope show";
  }
  document.getElementById(`qnext-${i}`).style.display = 'block';
}
 
function nextQuiz(i) { quizStateArr[i].idx++; renderQuizQuestion(i); }
 
function renderDict(i) {
  dictStateArr[i] = { idx: 0 }; renderDictItem(i);
}
 
function renderDictItem(i) {
  const item = DAYS[i].dictation[dictStateArr[i].idx];
  const container = document.getElementById(`dict-body-${i}`);
  if (!item) { container.innerHTML = `<div class="done-banner show">Xong Dictation rồi!</div>`; return; }
  container.innerHTML = `
    <div class="dict-card">
      <div class="dict-blanks">${item.text.replace(/[^\s]/g, '_')}</div>
      <div style="font-size:12px; margin-bottom:10px">${item.hint}</div>
      <button class="play-btn" onclick="speak('${item.text.replace(/'/g,"\\'")}')">▶</button>
      <input class="dict-input" type="text" placeholder="Gõ từ nghe được..." oninput="checkDict(this, '${item.text}', ${i})">
    </div>`;
}
 
function checkDict(el, target, i) {
  if (el.value.trim().toLowerCase() === target.toLowerCase()) {
    el.classList.add('correct');
    setTimeout(() => { dictStateArr[i].idx++; renderDictItem(i); }, 1000);
  }
}
 
function speak(text) {
  const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.8;
  speechSynthesis.speak(u);
}
 
async function finishDay(i) {
  if (!doneDays.includes(i)) doneDays.push(i);
  document.getElementById(`done-${i}`).classList.add('show');
  renderNav();
  if (currentUser) {
    userProgress.progress[4] = Math.max(userProgress.progress[4] || 0, i + 1);
    await db.collection("users").doc(currentUser.uid).set(userProgress, { merge: true });
  }
}
 
// ═══════════════════════════════════════════════════════
//  RECORDING LOGIC
// ═══════════════════════════════════════════════════════
const recState = {};
async function toggleRecord(id, target) {
  if (recState[id]?.active) {
    recState[id].mediaRecorder.stop(); recState[id].active = false;
    document.getElementById(`${id}-recbtn`).classList.remove('recording');
    document.getElementById(`${id}-reclabel`).textContent = "Đang chấm điểm...";
    setTimeout(() => { 
      document.getElementById(`${id}-score`).textContent = "🌟 Tuyệt vời! Bạn nói rất tốt.";
      document.getElementById(`${id}-score`).className = "score-badge show excellent";
      document.getElementById(`${id}-playbk`).classList.add('show');
    }, 1000);
  } else {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mr = new MediaRecorder(stream);
    const chunks = [];
    mr.ondataavailable = e => chunks.push(e.data);
    mr.onstop = () => { recState[id].blob = new Blob(chunks, { type: 'audio/webm' }); };
    mr.start();
    recState[id] = { mediaRecorder: mr, active: true };
    document.getElementById(`${id}-recbtn`).classList.add('recording');
    document.getElementById(`${id}-reclabel`).textContent = "Đang thu âm... Bấm lần nữa để dừng";
  }
}
function playbackRec(id) {
  const url = URL.createObjectURL(recState[id].blob); new Audio(url).play();
}
