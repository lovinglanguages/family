<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 05 – Play Time · Lani Be A Gift</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
 
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
 
<style>
  :root {
    --cream: #FBF7F0; --warm-white: #FFFCF7;
    --blush: #F5E6D8; --rose: #E8C4A8;
    --terracotta: #C9764A; --terra-deep: #A0552E;
    --sage: #7A9E87; --sage-light: #C8DDD0; --sage-deep: #4A7259;
    --sky: #8BB8D4; --sky-light: #D4E8F3;
    --lavender: #C4B5D4; --lavender-light: #EDE8F5;
    --sunny: #F2C94C; --sunny-light: #FBF0C4;
    --coral: #E8856A; --coral-light: #FAD8CF;
    --ink: #2C2416; --ink-soft: #5C4E3A; --ink-muted: #8C7E6A;
    --border: rgba(44,36,22,0.12);
    --radius: 16px; --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; }
 
  /* ── HEADER ── */
  header {
    background:var(--warm-white); border-bottom:1px solid var(--border);
    padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .logo { font-family:'Playfair Display',serif; font-size:18px; color:var(--terracotta); }
  .logo span { font-style:italic; }
  .home-btn {
    padding:6px 14px; border-radius:8px; border:1px solid var(--border);
    font-size:12px; color:var(--ink-muted); background:none; cursor:pointer;
    font-family:'DM Sans',sans-serif; text-decoration:none;
    display:flex; align-items:center; gap:5px;
  }
  .home-btn:hover { background:var(--blush); }
 
  /* ── LOADING OVERLAY ── */
  #loading-overlay { position: fixed; inset: 0; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--blush); border-top-color: var(--terracotta); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }
 
  /* ── TOPIC HERO ── */
  .topic-hero {
    background:var(--warm-white); padding:28px 20px 20px;
    border-bottom:1px solid var(--border);
  }
  .topic-eyebrow { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--terracotta); margin-bottom:6px; }
  .topic-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--ink); margin-bottom:4px; }
  .topic-title em { color:var(--terracotta); font-style:italic; }
  .topic-vn { font-size:13px; color:var(--ink-muted); }
 
  /* ── DAYS NAV ── */
  .days-nav {
    display:flex; gap:8px; padding:16px 20px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    background:var(--warm-white); border-bottom:1px solid var(--border);
    scrollbar-width:none;
  }
  .days-nav::-webkit-scrollbar { display:none; }
  .day-pill {
    flex-shrink:0; width:44px; height:44px; border-radius:50%;
    border:1px solid var(--border); background:var(--warm-white);
    font-size:13px; font-weight:500; cursor:pointer;
    transition:all 0.2s; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1px;
    font-family:'DM Sans',sans-serif; color:var(--ink-muted);
  }
  .day-pill:hover { background:var(--blush); border-color:var(--rose); }
  .day-pill.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }
  .day-pill.done { background:var(--sage-light); color:var(--sage-deep); border-color:var(--sage); }
  .day-pill-num { font-size:14px; font-weight:500; line-height:1; }
  .day-pill-check { font-size:9px; line-height:1; }
 
  /* ── DAY PANEL ── */
  .day-panel { display:none; }
  .day-panel.active { display:block; }
 
  /* ── DAY HEADER ── */
  .day-header { padding:20px 20px 16px; background:var(--warm-white); border-bottom:1px solid var(--border); }
  .day-num-label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-muted); margin-bottom:4px; }
  .day-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--ink); margin-bottom:6px; }
  .day-dialogue-preview { display:flex; flex-direction:column; gap:6px; padding:14px 16px; background:var(--blush); border-radius:var(--radius-sm); margin-top:10px; }
  .dialogue-line { font-size:13px; line-height:1.5; }
  .dialogue-line strong { color:var(--terracotta); }
  .dialogue-line .vn { color:var(--ink-muted); font-style:italic; font-size:12px; }
 
  /* ── MODE TABS ── */
  .mode-tabs { display:flex; gap:6px; padding:14px 20px; overflow-x:auto; background:var(--warm-white); border-bottom:1px solid var(--border); scrollbar-width:none; }
  .mode-tabs::-webkit-scrollbar { display:none; }
  .mode-tab { flex-shrink:0; padding:7px 14px; border-radius:99px; border:1px solid var(--border); font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; background:var(--warm-white); color:var(--ink-soft); white-space:nowrap; }
  .mode-tab:hover { background:var(--blush); }
  .mode-tab.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }
 
  /* ── MODE CONTENT ── */
  .mode-content { padding:20px; display:none; }
  .mode-content.active { display:block; }
 
  /* ── FLASHCARD ── */
  .fc-wrap { perspective:1000px; height:240px; margin-bottom:20px; }
  .fc { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.5s; cursor:pointer; }
  .fc.flipped { transform:rotateY(180deg); }
  .fc-front, .fc-back { position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; }
  .fc-front { background:var(--warm-white); border:1px solid var(--border); }
  .fc-back { background:var(--terracotta); transform:rotateY(180deg); }
  .fc-en { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); margin-bottom:6px; }
  .fc-speaker { font-size:12px; color:var(--ink-muted); letter-spacing:1px; text-transform:uppercase; }
  .fc-hint { font-size:12px; color:var(--ink-muted); margin-top:14px; }
  .fc-vn { font-family:'Playfair Display',serif; font-size:20px; color:white; margin-bottom:8px; }
  .fc-note { font-size:13px; color:rgba(255,255,255,0.82); font-style:italic; line-height:1.5; }
  .fc-nav { display:flex; align-items:center; justify-content:center; gap:16px; }
  .fc-btn { width:42px; height:42px; border-radius:50%; border:1px solid var(--border); background:var(--warm-white); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .fc-btn:hover { background:var(--blush); }
  .fc-count { font-size:13px; color:var(--ink-muted); min-width:60px; text-align:center; }
 
  /* ── VOCAB ── */
  .vocab-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; }
  .vocab-top { padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .vocab-word { font-family:'Playfair Display',serif; font-size:20px; color:var(--ink); }
  .vocab-phonetic { font-family:'DM Mono',monospace; font-size:12px; color:var(--ink-muted); }
  .vocab-speaker-badge { margin-left:auto; padding:3px 10px; border-radius:99px; font-size:11px; background:var(--blush); color:var(--terracotta); font-weight:500; }
  .vocab-body { padding:14px 18px; }
  .vocab-meaning { font-size:15px; color:var(--ink); font-weight:500; margin-bottom:10px; }
  .vocab-row { display:flex; gap:8px; margin-bottom:7px; font-size:13px; line-height:1.5; }
  .vr-label { color:var(--terracotta); font-weight:500; min-width:80px; flex-shrink:0; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; padding-top:1px; }
  .vr-val { color:var(--ink-soft); }
  .vr-vn { color:var(--ink-muted); font-size:12px; font-style:italic; margin-top:2px; }
  .speak-btn { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:99px; border:1px solid var(--border); background:var(--warm-white); font-size:12px; color:var(--ink-muted); cursor:pointer; margin-top:10px; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .speak-btn:hover { background:var(--blush); }
 
  /* ── QUIZ ── */
  .quiz-q-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:22px 20px; margin-bottom:16px; }
  .quiz-q-num { font-size:11px; color:var(--ink-muted); margin-bottom:6px; letter-spacing:1px; text-transform:uppercase; }
  .quiz-q-text { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); margin-bottom:4px; }
  .quiz-q-inst { font-size:12px; color:var(--ink-muted); }
  .quiz-opts { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  .quiz-opt { padding:13px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--warm-white); cursor:pointer; font-size:14px; color:var(--ink); transition:all 0.2s; text-align:left; font-family:'DM Sans',sans-serif; }
  .quiz-opt:hover { background:var(--blush); border-color:var(--rose); }
  .quiz-opt.correct { background:var(--sage-light); border-color:var(--sage); color:var(--sage-deep); }
  .quiz-opt.wrong { background:var(--coral-light); border-color:var(--coral); color:#7A2E1A; }
  .quiz-fb { padding:13px 16px; border-radius:var(--radius-sm); font-size:13px; line-height:1.5; display:none; margin-bottom:12px; }
  .quiz-fb.show { display:block; }
  .quiz-fb.ok { background:var(--sage-light); color:var(--sage-deep); }
  .quiz-fb.nope { background:var(--coral-light); color:#7A2E1A; }
  .quiz-next { width:100%; padding:13px; border-radius:var(--radius-sm); border:none; background:var(--terracotta); color:white; font-size:14px; font-family:'DM Sans',sans-serif; font-weight:500; cursor:pointer; transition:all 0.2s; }
  .quiz-next:hover { background:var(--terra-deep); }
  .quiz-next:disabled { opacity:0.35; cursor:default; }
 
  /* ── DICTATION ── */
  .dict-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; text-align:center; margin-bottom:16px; }
  .dict-blanks { font-family:'DM Mono',monospace; font-size:24px; letter-spacing:6px; color:var(--ink-muted); margin-bottom:8px; }
  .dict-hint { font-size:12px; color:var(--ink-muted); margin-bottom:20px; }
  .play-btn { width:60px; height:60px; border-radius:50%; border:none; background:var(--terracotta); color:white; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; transition:all 0.2s; }
  .play-btn:hover { background:var(--terra-deep); transform:scale(1.05); }
  .play-btn.playing { background:var(--sage); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  .dict-input { width:100%; padding:13px 16px; border-radius:var(--radius-sm); border:1.5px solid var(--border); font-size:16px; font-family:'DM Sans',sans-serif; color:var(--ink); background:var(--cream); text-align:center; outline:none; transition:border-color 0.2s; }
  .dict-input:focus { border-color:var(--terracotta); }
  .dict-input.correct { border-color:var(--sage); background:var(--sage-light); }
  .dict-input.wrong { border-color:var(--coral); background:var(--coral-light); }
 
  /* ── SHADOWING ── */
  .shadow-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:12px; }
  .shadow-speaker { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--terracotta); margin-bottom:6px; font-weight:500; }
  .shadow-en { font-family:'Playfair Display',serif; font-size:18px; color:var(--ink); margin-bottom:4px; line-height:1.4; }
  .shadow-vn { font-size:13px; color:var(--ink-muted); font-style:italic; margin-bottom:12px; }
  .shadow-note { font-size:12px; color:var(--sage-deep); background:var(--sage-light); padding:5px 10px; border-radius:6px; margin-bottom:12px; display:inline-block; }
  .shadow-btns { display:flex; gap:8px; }
  .shadow-btn { flex:1; padding:9px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--warm-white); font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; color:var(--ink-soft); display:flex; align-items:center; justify-content:center; gap:5px; }
  .shadow-btn:hover { background:var(--blush); }
  .shadow-btn.primary { background:var(--terracotta); color:white; border-color:var(--terracotta); }
  .shadow-btn.primary:hover { background:var(--terra-deep); }
 
  /* ── PRONUNCIATION RECORDER ── */
  .rec-zone { margin-top:12px; border-top:1px solid var(--border); padding-top:12px; }
  .rec-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .rec-btn { width:44px; height:44px; border-radius:50%; border:none; background:var(--blush); color:var(--terracotta); font-size:18px; cursor:pointer; transition:all 0.25s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rec-btn:hover { background:var(--rose); }
  .rec-btn.recording { background:var(--coral); color:white; animation:rec-pulse 1s infinite; }
  @keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(232,133,106,0.5)} 50%{box-shadow:0 0 0 8px rgba(232,133,106,0)} }
  .rec-label { font-size:12px; color:var(--ink-muted); }
  .rec-label strong { color:var(--ink-soft); }
 
  .playback-btn { padding:6px 14px; border-radius:99px; border:1px solid var(--border); background:var(--warm-white); font-size:12px; color:var(--ink-muted); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; display:none; }
  .playback-btn.show { display:inline-flex; align-items:center; gap:5px; }
  .playback-btn:hover { background:var(--blush); }
 
  /* Score badge */
  .score-badge { display:none; margin-top:10px; padding:12px 16px; border-radius:var(--radius-sm); font-size:13px; line-height:1.6; }
  .score-badge.show { display:block; }
  .score-badge.excellent { background:#EAF3DE; border:1px solid #7A9E87; color:#27500A; }
  .score-badge.good      { background:var(--sunny-light); border:1px solid var(--sunny); color:#7A5A00; }
  .score-badge.ok        { background:var(--sky-light); border:1px solid var(--sky); color:#185FA5; }
  .score-badge.retry     { background:var(--coral-light); border:1px solid var(--coral); color:#7A2E1A; }
 
  .score-bar-wrap { height:6px; background:rgba(44,36,22,0.1); border-radius:99px; margin:8px 0 4px; overflow:hidden; }
  .score-bar { height:100%; border-radius:99px; transition:width 0.6s ease; }
  .score-bar.excellent { background:#639922; }
  .score-bar.good      { background:var(--sunny); }
  .score-bar.ok        { background:var(--sky); }
  .score-bar.retry     { background:var(--coral); }
 
  .score-words { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .score-word { padding:2px 8px; border-radius:99px; font-size:12px; font-family:'DM Mono',monospace; }
  .score-word.hit  { background:var(--sage-light); color:var(--sage-deep); }
  .score-word.miss { background:var(--coral-light); color:#7A2E1A; }
 
  /* ── DONE BANNER ── */
  .done-banner { background:var(--sage-light); border:1px solid var(--sage); border-radius:var(--radius); padding:20px; text-align:center; margin-bottom:16px; display:none; }
  .done-banner.show { display:block; }
  .done-banner-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--sage-deep); margin-bottom:6px; }
  .done-banner-sub { font-size:13px; color:var(--sage-deep); }
 
  /* ── NEXT/FINISH BTN ── */
  .finish-btn { width:100%; padding:14px; border-radius:99px; border:none; background:var(--terracotta); color:white; font-size:15px; font-family:'DM Sans',sans-serif; font-weight:500; cursor:pointer; transition:all 0.2s; margin-top:8px; }
  .finish-btn:hover { background:var(--terra-deep); transform:translateY(-2px); }
  .section-note { font-size:12px; color:var(--ink-muted); text-align:center; margin-bottom:14px; font-style:italic; }
 
  /* ── FULL SCRIPT ── */
  #panel-fullscript { display:none; }
  #panel-fullscript.active { display:block; }
  .fullscript-hero { background:var(--warm-white); padding:24px 20px 20px; border-bottom:1px solid var(--border); }
  .fullscript-hero-eyebrow { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--terracotta); margin-bottom:6px; }
  .fullscript-hero-title { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); margin-bottom:4px; }
  .fullscript-hero-sub { font-size:13px; color:var(--ink-muted); }
  .fullscript-content { padding:20px; }
  .fs-day-block { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px; }
  .fs-day-header { padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer; transition:background 0.2s; user-select:none; }
  .fs-day-header:hover { background:var(--blush); }
  .fs-day-num { width:36px; height:36px; border-radius:50%; flex-shrink:0; background:var(--blush); border:1px solid var(--rose); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:15px; color:var(--terracotta); }
  .fs-day-num.done-num { background:var(--sage-light); border-color:var(--sage); color:var(--sage-deep); }
  .fs-day-info { flex:1; }
  .fs-day-label { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-muted); }
  .fs-day-title { font-size:15px; font-weight:500; color:var(--ink); margin-top:2px; }
  .fs-chevron { font-size:12px; color:var(--ink-muted); transition:transform 0.2s; }
  .fs-chevron.open { transform:rotate(90deg); }
  .fs-dialogue { padding:0 18px; max-height:0; overflow:hidden; transition:max-height 0.35s ease, padding 0.2s; }
  .fs-dialogue.open { max-height:600px; padding:14px 18px 16px; }
  .fs-line { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .fs-line:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .fs-speaker { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--terracotta); font-weight:500; margin-bottom:4px; }
  .fs-en { font-family:'Playfair Display',serif; font-size:17px; color:var(--ink); line-height:1.4; margin-bottom:3px; }
  .fs-vn { font-size:13px; color:var(--ink-muted); font-style:italic; margin-bottom:6px; }
  .fs-note { font-size:11px; color:var(--sage-deep); background:var(--sage-light); padding:3px 8px; border-radius:5px; display:inline-block; margin-bottom:6px; }
  .fs-line-btns { display:flex; gap:6px; flex-wrap:wrap; }
  .fs-speak-btn { padding:4px 12px; border-radius:99px; border:1px solid var(--border); background:var(--warm-white); font-size:11px; color:var(--ink-muted); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .fs-speak-btn:hover { background:var(--blush); }
  .fs-speak-btn.slow { color:var(--sage-deep); border-color:var(--sage); }
  .fullscript-print-btn { width:100%; padding:13px; border-radius:99px; border:1.5px solid var(--terracotta); background:transparent; color:var(--terracotta); font-size:14px; font-family:'DM Sans',sans-serif; font-weight:500; cursor:pointer; transition:all 0.2s; margin-top:4px; }
  .fullscript-print-btn:hover { background:var(--blush); }
  .fs-pill { flex-shrink:0; padding:0 14px; height:44px; border-radius:22px; border:1px solid var(--border); background:var(--warm-white); font-size:12px; font-weight:500; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:5px; font-family:'DM Sans',sans-serif; color:var(--ink-muted); white-space:nowrap; }
  .fs-pill:hover { background:var(--blush); border-color:var(--rose); }
  .fs-pill.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }
 
  @media print {
    header, .days-nav, .topic-hero, .day-panel, .mode-tabs, .fullscript-print-btn, .fs-speak-btn, .fs-day-header .fs-chevron { display:none !important; }
    #panel-fullscript { display:block !important; }
    .fs-dialogue { max-height:none !important; padding:14px 18px 16px !important; }
    .fs-day-block { break-inside:avoid; }
    body { background:white; }
  }
</style>
</head>
<body>

async function finishDay(i, btnElement) {
  if(btnElement) btnElement.style.display = 'none';
  if (!doneDays.includes(i)) { doneDays.push(i); }
  
  document.getElementById(`done-${i}`).classList.add('show');
  renderNav();
  document.getElementById(`done-${i}`).scrollIntoView({ behavior: 'smooth' });
 
  if (!currentUser) return;
  
  const currentGlobalDay = i + 1; 
  // Topic 05 index là 4
  const savedProgress = userProgress.progress[4] || 0;
 
  if (currentGlobalDay > savedProgress) {
    userProgress.progress[4] = currentGlobalDay;
  }
 
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayTime = today.getTime();
  const lastActiveTime = userProgress.lastActiveTime || 0;
  const oneDay = 24 * 60 * 60 * 1000;
 
  if (lastActiveTime === 0) {
    userProgress.streak = 1;
    userProgress.lastActiveTime = todayTime;
  } else {
    const diffDays = Math.round((todayTime - lastActiveTime) / oneDay);
    if (diffDays === 1) {
      userProgress.streak = (userProgress.streak || 0) + 1;
      userProgress.lastActiveTime = todayTime;
    } else if (diffDays > 1) {
      userProgress.streak = 1; 
      userProgress.lastActiveTime = todayTime;
    }
  }
 
  await db.collection("users").doc(currentUser.uid).set(userProgress, { merge: true });
}
 
function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const globalDay = TOPIC.startDay + i;
    const isDone = doneDays.includes(i);
    const isActive = i === currentDay && currentView === 'day';
    const cls = isActive ? 'day-pill active' : isDone ? 'day-pill done' : 'day-pill';
    nav.innerHTML += `<button class="${cls}" onclick="openDay(${i})">
      <span class="day-pill-num">${globalDay}</span>
      ${isDone && !isActive ? '<span class="day-pill-check">✓</span>' : ''}
    </button>`;
  });
  const fsActive = currentView === 'fullscript';
  nav.innerHTML += `<button class="fs-pill${fsActive ? ' active' : ''}" onclick="openFullScript()">📜 Full Script</button>`;
}

function buildFullScriptPanel() {
  const lines = DAYS.map((day, i) => {
    const globalDay = TOPIC.startDay + i;
    const isDone = doneDays.includes(i);
    const dlHTML = day.dialogue.map((l, li) => {
      const safeEn = l.en.replace(/'/g, "\\'");
      return `
      <div class="fs-line">
        <div class="fs-speaker">${l.speaker}</div>
        <div class="fs-en">${l.en}</div>
        <div class="fs-vn">${l.vn}</div>
        <div class="fs-line-btns">
          <button class="fs-speak-btn" onclick="speak('${safeEn}',0.9)">🔊 Nghe</button>

    return `

  }).join('');
 
  return `

    </div>
 
    <div class="mode-content" id="mode-${i}-vocab">
      ${buildVocabHTML(day.vocab, i)}
    </div>
 
    <div class="mode-content" id="mode-${i}-quiz">
      <div id="quiz-body-${i}"></div>
    </div>
 
    <div class="mode-content" id="mode-${i}-dictation">
      <div id="dict-body-${i}"></div>
    </div>
 
    <div class="mode-content" id="mode-${i}-shadowing">
      <p class="section-note">Nghe – bắt chước – tự tin nói cùng con 🎤</p>
      ${buildShadowHTML(day.shadowing, i)}
      <div class="done-banner" id="done-${i}">
        <div class="done-banner-title">🌟 Tuyệt vời!</div>
        <div class="done-banner-sub">Bạn đã hoàn thành Day ${globalDay}. Tiến độ đã được lưu lại!</div>
      </div>
      <button class="finish-btn" onclick="finishDay(${i})">✅ Hoàn thành ngày học!</button>
    </div>
  </div>`;
}
 
function buildVocabHTML(vocab, i) {
  return vocab.map(v => `
    <div class="vocab-card">
      <div class="vocab-top">
        <div class="vocab-word">${v.en}</div>
        <div class="vocab-phonetic">${v.phonetic}</div>
        <div class="vocab-speaker-badge">${v.speaker}</div>
      </div>
      <div class="vocab-body">
        <div class="vocab-meaning">${v.meaning}</div>
        ${v.synonym ? `<div class="vocab-row">
          <div class="vr-label">Synonym</div>
          <div class="vr-val">${v.synonym}${v.synonymVn ? `<div class="vr-vn">${v.synonymVn}</div>` : ''}</div>
        </div>` : ''}
        ${v.collocation ? `<div class="vocab-row">
          <div class="vr-label">Collocation</div>
          <div class="vr-val">${v.collocation}${v.collocationVn ? `<div class="vr-vn">${v.collocationVn}</div>` : ''}</div>
        </div>` : ''}
        ${v.example ? `<div class="vocab-row">
          <div class="vr-label">Example</div>
          <div class="vr-val" style="font-style:italic">${v.example}${v.exampleVn ? `<div class="vr-vn" style="font-style:normal">${v.exampleVn}</div>` : ''}</div>
        </div>` : ''}
        <button class="speak-btn" onclick="speak('${v.en.replace(/'/g,"\\'")}')">🔊 Nghe phát âm</button>
      </div>
    </div>`).join('');
}
 
function buildShadowHTML(lines, i) {
  return lines.map((l, li) => {
    const id = `sh-${i}-${li}`;
    const safeEn = l.en.replace(/'/g, "\\'");
    return `
    <div class="shadow-card" id="${id}-card">
      <div class="shadow-speaker">${l.speaker}</div>
      <div class="shadow-en">${l.en}</div>
      <div class="shadow-vn">${l.vn}</div>
      <div class="shadow-btns">
        <button class="shadow-btn" onclick="speak('${safeEn}', 0.6)">▶ Nghe chậm</button>
        <button class="shadow-btn primary" onclick="speak('${safeEn}', 0.9)">▶▶ Bình thường</button>
      </div>
 
      <div class="rec-zone">
        <div class="rec-row">
          <button class="rec-btn" id="${id}-recbtn" onclick="toggleRecord('${id}','${safeEn}')" title="Bấm để thu âm">🎤</button>
          <div class="rec-label" id="${id}-reclabel"><strong>Bấm mic</strong> để luyện nói</div>
          <button class="playback-btn" id="${id}-playbk" onclick="playbackRec('${id}')">▶ Nghe lại</button>
        </div>
        <div class="score-badge" id="${id}-score"></div>
      </div>
    </div>`;
  }).join('');
}
 
function initDay(i) {
  fcIdx[i] = 0; fcFlipped[i] = false;
  updateFlashcard(i);
  renderQuiz(i);
  renderDict(i);
}
 
// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
let currentView = 'day'; 
 
function openDay(i) {
  currentView = 'day';
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  const fs = document.getElementById('panel-fullscript');
  if (fs) fs.classList.remove('active');
  
  document.getElementById(`panel-${i}`).classList.add('active');
  currentDay = i;
  renderNav();
  const nav = document.getElementById('daysNav');
  const pill = nav.children[i];
  if (pill) pill.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}
 
function openFullScript() {
  currentView = 'fullscript';
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  const fs = document.getElementById('panel-fullscript');
  if (fs) {
    fs.classList.add('active');
    DAYS.forEach((_, i) => {
      const num = fs.querySelector(`#fschev-${i}`)?.closest('.fs-day-block')?.querySelector('.fs-day-num');
      if (num) {
        if (doneDays.includes(i)) num.classList.add('done-num');
        else num.classList.remove('done-num');
      }
    });
  }
  renderNav();
  const nav = document.getElementById('daysNav');
  nav.lastElementChild?.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}
 
function toggleFsDay(i) {
  const dlg  = document.getElementById(`fsdlg-${i}`);
  const chev = document.getElementById(`fschev-${i}`);
  const isOpen = dlg.classList.contains('open');
  dlg.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}
 
function switchMode(dayIdx, mode, btn) {
  const panel = document.getElementById(`panel-${dayIdx}`);
  panel.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  panel.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`mode-${dayIdx}-${mode}`).classList.add('active');
}
 
// ═══════════════════════════════════════════════════════
//  FLASHCARD
// ═══════════════════════════════════════════════════════
function updateFlashcard(i) {
  const day = DAYS[i];
  const cards = day.dialogue;
  const idx = fcIdx[i];
  const card = cards[idx];
  document.getElementById(`fc-en-${i}`).textContent = card.en;
  document.getElementById(`fc-spk-${i}`).textContent = card.speaker;
  document.getElementById(`fc-vn-${i}`).textContent = card.vn;
  document.getElementById(`fc-count-${i}`).textContent = `${idx + 1} / ${cards.length}`;
  fcFlipped[i] = false;
  document.getElementById(`fc-${i}`).classList.remove('flipped');
}
 
function flipCard(i) {
  fcFlipped[i] = !fcFlipped[i];
  document.getElementById(`fc-${i}`).classList.toggle('flipped', fcFlipped[i]);
}
function fcNext(i) {
  const max = DAYS[i].dialogue.length - 1;
  if (fcIdx[i] < max) { fcIdx[i]++; updateFlashcard(i); }
}
function fcPrev(i) {
  if (fcIdx[i] > 0) { fcIdx[i]--; updateFlashcard(i); }
}
 
// ═══════════════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════════════
function renderQuiz(i) {
  quizState[i] = { idx: 0, answered: false };
  renderQuizQuestion(i);
}
 
function renderQuizQuestion(i) {
  const qs = DAYS[i].quiz;
  const state = quizState[i];
  if (state.idx >= qs.length) {
    document.getElementById(`quiz-body-${i}`).innerHTML = `
      <div class="done-banner show">
        <div class="done-banner-title">🎉 Hoàn thành Quiz!</div>
        <div class="done-banner-sub">Bạn đã trả lời hết ${qs.length} câu. Tiếp tục với Dictation nhé!</div>
      </div>
      <button class="finish-btn" onclick="switchMode(${i},'dictation',document.querySelector('#panel-${i} .mode-tab:nth-child(4)'))">Tiếp tục Dictation →</button>`;
    return;
  }
  const q = qs[state.idx];
  state.answered = false;
  document.getElementById(`quiz-body-${i}`).innerHTML = `
    <div class="quiz-q-card">
      <div class="quiz-q-num">Câu ${state.idx + 1} / ${qs.length}</div>
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-q-inst">Chọn đáp án đúng</div>
    </div>
    <div class="quiz-opts">
      ${q.opts.map((o, oi) => `<button class="quiz-opt" onclick="selectQuiz(${i},${oi})">${o}</button>`).join('')}
    </div>
    <div class="quiz-fb" id="qfb-${i}"></div>
    <button class="quiz-next" id="qnext-${i}" onclick="nextQuiz(${i})" disabled>Câu tiếp theo →</button>`;
}
 
function selectQuiz(i, chosen) {
  const state = quizState[i];
  if (state.answered) return;
  state.answered = true;
  const q = DAYS[i].quiz[state.idx];
  const opts = document.querySelectorAll(`#panel-${i} .quiz-opt`);
  opts.forEach((o, oi) => { if (oi === q.ans) o.classList.add('correct'); });
  const fb = document.getElementById(`qfb-${i}`);
  if (chosen === q.ans) {
    opts[chosen].classList.add('correct');
    fb.textContent = '🎉 Chính xác! ' + q.exp;
    fb.className = 'quiz-fb ok show';
  } else {
    opts[chosen].classList.add('wrong');
    fb.textContent = '❌ Chưa đúng. ' + q.exp;
    fb.className = 'quiz-fb nope show';
  }
  document.getElementById(`qnext-${i}`).disabled = false;
}
 
function nextQuiz(i) {
  quizState[i].idx++;
  renderQuizQuestion(i);
}
 
// ═══════════════════════════════════════════════════════
//  DICTATION
// ═══════════════════════════════════════════════════════
function renderDict(i) {
  dictState[i] = { idx: 0, playing: false };
  renderDictItem(i);
}
 
function renderDictItem(i) {
  const items = DAYS[i].dictation;
  const state = dictState[i];
  if (state.idx >= items.length) {
    document.getElementById(`dict-body-${i}`).innerHTML = `
      <div class="done-banner show">
        <div class="done-banner-title">✍️ Dictation xong rồi!</div>
        <div class="done-banner-sub">Tuyệt! Giờ thực hành Shadowing cùng con nhé!</div>
      </div>
      <button class="finish-btn" onclick="switchMode(${i},'shadowing',document.querySelector('#panel-${i} .mode-tab:nth-child(5)'))">Tiếp tục Shadowing →</button>`;
    return;
  }
  const item = items[state.idx];
  state.playing = false;
  document.getElementById(`dict-body-${i}`).innerHTML = `
    <p class="section-note">Nghe và gõ lại từ bạn nghe được 👂 (${state.idx + 1}/${items.length})</p>
    <div class="dict-card">
      <div class="dict-blanks">${item.text.replace(/[^\s]/g, '_')}</div>
      <div class="dict-hint">${item.hint}<br><em>${item.hintVn}</em></div>
      <button class="play-btn" id="dplay-${i}" onclick="playDict(${i})">▶</button>
      <input class="dict-input" id="dinput-${i}" type="text" placeholder="Gõ từ bạn nghe..."
        oninput="checkDict(${i})" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="quiz-fb" id="dfb-${i}"></div>
    <button class="quiz-next" id="dnext-${i}" onclick="nextDict(${i})" disabled>Từ tiếp theo →</button>`;
}
 
function playDict(i) {
  const item = DAYS[i].dictation[dictState[i].idx];
  const btn = document.getElementById(`dplay-${i}`);
  btn.classList.add('playing');
  speak(item.text, 0.75);
  setTimeout(() => btn.classList.remove('playing'), 2000);
}
 
function checkDict(i) {
  const item = DAYS[i].dictation[dictState[i].idx];
  const inp = document.getElementById(`dinput-${i}`);
  const val = inp.value.trim().toLowerCase();
  const ans = item.text.toLowerCase();
  if (!val) return;
  if (val === ans) {
    inp.className = 'dict-input correct';
    const fb = document.getElementById(`dfb-${i}`);
    fb.textContent = '🎉 Chính xác!'; fb.className = 'quiz-fb ok show';
    document.getElementById(`dnext-${i}`).disabled = false;
  } else {
    inp.className = 'dict-input';
  }
}
 
function nextDict(i) {
  dictState[i].idx++;
  renderDictItem(i);
}
 
// ═══════════════════════════════════════════════════════
//  SPEECH
// ═══════════════════════════════════════════════════════
let _selectedVoice = null;
const VOICE_PRIORITY = [
  'Google US English', 'Google UK English Female',
  'Microsoft Aria Online (Natural) - English (United States)',
  'Samantha', 'Karen', 'Google العربية',
];
 
function pickVoice() {
  if (_selectedVoice) return _selectedVoice;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  for (const name of VOICE_PRIORITY) {
    const v = voices.find(v => v.name === name);
    if (v) { _selectedVoice = v; return v; }
  }
  const googleFemale = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('google') && !v.name.toLowerCase().includes('male'));
  if (googleFemale) { _selectedVoice = googleFemale; return googleFemale; }
  const onlineFemale = voices.find(v => v.lang === 'en-US' && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('online')));
  if (onlineFemale) { _selectedVoice = onlineFemale; return onlineFemale; }
  const anyUS = voices.find(v => v.lang === 'en-US');
  if (anyUS) { _selectedVoice = anyUS; return anyUS; }
  return null;
}
 
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { _selectedVoice = null; pickVoice(); };
}
 
function speak(text, rate = 0.85) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate; u.pitch = 1.0;
  const voice = pickVoice();
  if (voice) u.voice = voice;
  speechSynthesis.speak(u);
}
 
// ═══════════════════════════════════════════════════════
//  PRONUNCIATION RECORDER & SCORER
// ═══════════════════════════════════════════════════════
const recState = {};
 
function toggleRecord(id, targetText) {
  if (recState[id]?.active) stopRecord(id, targetText);
  else startRecord(id, targetText);
}
 
async function startRecord(id, targetText) {
  const btn    = document.getElementById(`${id}-recbtn`);
  const label = document.getElementById(`${id}-reclabel`);
  const score = document.getElementById(`${id}-score`);
  const pbk    = document.getElementById(`${id}-playbk`);
  score.className = 'score-badge';
  pbk.className   = 'playback-btn';
 
  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch(e) {
    label.innerHTML = '<strong style="color:var(--coral)">Không thể mở micro.</strong> Hãy cho phép trình duyệt truy cập micro.';
    return;
  }
 
  const mr = new MediaRecorder(stream);
  const chunks = [];
  mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mr.onstop = () => {
    recState[id].blob = new Blob(chunks, { type: 'audio/webm' });
    stream.getTracks().forEach(t => t.stop());
    pbk.className = 'playback-btn show';
  };
  mr.start();
 
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    const rec = new SR();
    rec.lang = 'en-US'; rec.continuous = false;
    rec.interimResults = false; rec.maxAlternatives = 3;
    rec.onresult = e => {
      const alts = [];
      for (let i = 0; i < e.results[0].length; i++) alts.push(e.results[0][i].transcript.toLowerCase().trim());
      recState[id].recognized = alts;
    };
    rec.onerror = () => { recState[id].recognized = []; };
    rec.start();
    recState[id] = { ...recState[id], recognition: rec };
  }
 
  recState[id] = { ...recState[id], mediaRecorder: mr, chunks, active: true, blob: null, recognized: [] };
  btn.classList.add('recording'); btn.textContent = '⏹';
  label.innerHTML = '<strong style="color:var(--coral)">Đang thu âm...</strong> Bấm ⏹để dừng';
}
 
function stopRecord(id, targetText) {
  const state = recState[id];
  if (!state?.active) return;
  const btn    = document.getElementById(`${id}-recbtn`);
  const label = document.getElementById(`${id}-reclabel`);
  state.mediaRecorder.stop();
  try { state.recognition?.stop(); } catch(e) {}
  state.active = false;
  btn.classList.remove('recording'); btn.textContent = '🎤';
  label.innerHTML = '<strong>Đang chấm điểm...</strong>';
  setTimeout(() => scoreProunciation(id, targetText), 900);
}
 
function scoreProunciation(id, targetText) {
  const label  = document.getElementById(`${id}-reclabel`);
  const badge  = document.getElementById(`${id}-score`);
  const alts   = recState[id]?.recognized || [];
  const tWords = targetText.toLowerCase().replace(/[^\w\s']/g, '').trim().split(/\s+/);
 
  if (!alts.length) { renderScore(badge, label, 0, tWords, []); return; }
 
  let bestScore = 0, bestMatch = [];
  alts.forEach(alt => {
    const aWords = alt.replace(/[^\w\s']/g, '').split(/\s+/);
    const { score, matches } = wordMatchScore(tWords, aWords);
    if (score > bestScore) { bestScore = score; bestMatch = matches; }
  });
  renderScore(badge, label, bestScore, tWords, bestMatch);
}
 
function wordMatchScore(tWords, aWords) {
  const matches = tWords.map(tw => {
    const twn = norm(tw);
    if (aWords.some(sw => norm(sw) === twn)) return { word: tw, hit: true };
    const fuzzy = aWords.some(sw => twn.length >= 4 ? lev(twn, norm(sw)) <= 1 : norm(sw) === twn);
    return { word: tw, hit: fuzzy };
  });
  return { score: Math.round(matches.filter(m => m.hit).length / tWords.length * 100), matches };
}
 
function norm(w) { return w.toLowerCase().replace(/[^a-z']/g, ''); }
 
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
 
function renderScore(badge, label, score, tWords, matches) {
  let tier, emoji, msg, tip;
  if (score >= 90)      { tier='excellent'; emoji='🌟'; msg=`Xuất sắc! Phát âm rất chuẩn (${score}%)!`; tip='Tuyệt vời – bé sẽ học theo giọng ba/mẹ này!'; }
  else if (score >= 70) { tier='good';      emoji='👍'; msg=`Tốt! Đúng ${score}% từ.`;               tip='Nghe lại và lặp thêm một lần nhé!'; }
  else if (score >= 40) { tier='ok';        emoji='💪'; msg=`Cố lên! Đúng ${score}% từ.`;               tip='Nghe chậm → lặp từng từ → nói cả câu.'; }
  else                  { tier='retry';     emoji='🔄'; msg=score===0?'Chưa nhận được giọng nói. Thử lại!':`Đúng ${score}% — Hãy thử lại!`; tip='Bấm ▶ Nghe chậm rồi bắt chước từng từ.'; }
 
  const wordHTML = matches.length
    ? '<div class="score-words">'+matches.map(m=>`<span class="score-word ${m.hit?'hit':'miss'}">${m.word}</span>`).join('')+'</div>' : '';
 
  badge.className = `score-badge show ${tier}`;
  badge.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span style="font-size:18px">${emoji}</span><strong>${msg}</strong>
    </div>
    <div class="score-bar-wrap"><div class="score-bar ${tier}" style="width:${score}%"></div></div>
    <div style="font-size:12px;margin-top:4px;opacity:0.8">${tip}</div>
    ${wordHTML}`;
  label.innerHTML = '<strong>Bấm mic</strong> để thử lại';
}
 
function playbackRec(id) {
  const blob = recState[id]?.blob;
  if (!blob) return;
  new Audio(URL.createObjectURL(blob)).play();
}
