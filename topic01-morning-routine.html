};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let userProgress = { progress: {} };
let doneDays = [];

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = 'lani-be-a-gift.html';
  } else {
    currentUser = user;
    await fetchProgress();
    document.getElementById('loading-overlay').style.display = 'none';
  }
});

async function fetchProgress() {
  try {
    const doc = await db.collection("users").doc(currentUser.uid).get();
    if (doc.exists) {
      userProgress = doc.data();
      const daysCompleted = userProgress.progress[0] || 0;
      doneDays = [];
      for(let i=0; i < daysCompleted; i++) { doneDays.push(i); }
    }
    renderPanels();
    renderNav();
  } catch (error) { console.error(error); }
}

    ],
    vocab: [
      { en: 'Happy day', phonetic: '/ˈhæpi deɪ/', speaker: 'Mom', meaning: 'Ngày vui vẻ' },
    ],
    quiz: [{ q: '"Happy" có nghĩa là?', opts: ['Buồn','Tức giận','Vui vẻ','Mệt'], ans: 2, exp: 'Happy là vui vẻ.' }],
    dictation: [{ text: 'Today', hint: 'Hôm nay', hintVn: 'Hôm nay' }],
    shadowing: [{ speaker: 'Mom', en: 'Today is a happy day!', vn: 'Hôm nay là một ngày vui vẻ!' }, { speaker: 'Child', en: 'A very happy day!', vn: 'Một ngày rất vui vẻ!' }],
  },
];

let currentDay = 0;
let fcIdx = {}, fcFlipped = {};
let quizState = {};
let dictState = {};

async function finishDay(i) {
  if (!doneDays.includes(i)) { doneDays.push(i); }
  document.getElementById(`done-${i}`).classList.add('show');
  renderNav();
  if (!currentUser) return;
  const currentGlobalDay = i + 1;
  const savedProgress = userProgress.progress[0] || 0;
  if (currentGlobalDay > savedProgress) {
    userProgress.progress[0] = currentGlobalDay;
    const today = new Date().toDateString();
    if (userProgress.lastActive !== today) {
      userProgress.streak = (userProgress.streak || 0) + 1;
      userProgress.lastActive = today;
    }
    await db.collection("users").doc(currentUser.uid).set(userProgress, { merge: true });
  }
}

function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const isDone = doneDays.includes(i);
    const isActive = i === currentDay;
    const cls = isActive ? 'day-pill active' : isDone ? 'day-pill done' : 'day-pill';
    nav.innerHTML += `<button class="${cls}" onclick="openDay(${i})">
      <span class="day-pill-num">${TOPIC.startDay + i}</span>
      ${isDone && !isActive ? '<span class="day-pill-check">✓</span>' : ''}
    </button>`;
  });
}

function openDay(i) {
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${i}`).classList.add('active');
  currentDay = i;
  renderNav();
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = '';
  DAYS.forEach((day, i) => {
    const dlHTML = day.dialogue.map(l => `<div class="dialogue-line"><strong>${l.speaker}:</strong> ${l.en}<div class="vn">${l.vn}</div></div>`).join('');
    container.innerHTML += `
    <div class="day-panel${i === 0 ? ' active' : ''}" id="panel-${i}">
      <div class="day-header">
        <div class="day-title">${day.title}</div>
        <div class="day-dialogue-preview">${dlHTML}</div>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="switchMode(${i},'flashcard',this)">📇 Flashcard</button>
        <button class="mode-tab" onclick="switchMode(${i},'vocab',this)">📖 Từ vựng</button>
        <button class="mode-tab" onclick="switchMode(${i},'quiz',this)">❓ Quiz</button>
        <button class="mode-tab" onclick="switchMode(${i},'dictation',this)">✍️ Dictation</button>
        <button class="mode-tab" onclick="switchMode(${i},'shadowing',this)">🎤 Shadowing</button>
      </div>
      <div class="mode-content active" id="mode-${i}-flashcard">
        <div class="fc-wrap"><div class="fc" id="fc-${i}" onclick="flipCard(${i})"><div class="fc-front"><div class="fc-en" id="fc-en-${i}"></div><div class="fc-speaker" id="fc-spk-${i}"></div></div><div class="fc-back"><div class="fc-vn" id="fc-vn-${i}"></div></div></div></div>
        <div class="fc-nav"><button class="fc-btn" onclick="fcPrev(${i})">←</button><div class="fc-count" id="fc-count-${i}"></div><button class="fc-btn" onclick="fcNext(${i})">→</button></div>
      </div>
      <div class="mode-content" id="mode-${i}-vocab">${buildVocabHTML(day.vocab)}</div>
      <div class="mode-content" id="mode-${i}-quiz"><div id="quiz-body-${i}"></div></div>
      <div class="mode-content" id="mode-${i}-dictation"><div id="dict-body-${i}"></div></div>
      <div class="mode-content" id="mode-${i}-shadowing">
        ${buildShadowHTML(day.shadowing, i)}
        <div class="done-banner" id="done-${i}"><div class="done-banner-title">🌟 Tuyệt vời!</div><div class="done-banner-sub">Tiến độ đã được lưu lại!</div></div>
        <button class="finish-btn" onclick="finishDay(${i})">✅ Hoàn thành ngày học!</button>
      </div>
    </div>`;
  });
  DAYS.forEach((_, i) => initDay(i));
}

function buildVocabHTML(vocab) {
  return vocab.map(v => `<div class="vocab-card"><div class="vocab-top"><div class="vocab-word">${v.en}</div></div><div class="vocab-body"><div class="vocab-meaning">${v.meaning}</div></div></div>`).join('');
}

function buildShadowHTML(lines, i) {
  return lines.map((l, li) => `<div class="shadow-card"><div class="shadow-en">${l.en}</div><div class="shadow-vn">${l.vn}</div></div>`).join('');
}

function switchMode(dayIdx, mode, btn) {
  const panel = document.getElementById(`panel-${dayIdx}`);
  panel.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  panel.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`mode-${dayIdx}-${mode}`).classList.add('active');
}

function updateFlashcard(i) {
  const card = DAYS[i].dialogue[fcIdx[i]];
  document.getElementById(`fc-en-${i}`).textContent = card.en;
  document.getElementById(`fc-spk-${i}`).textContent = card.speaker;
  document.getElementById(`fc-vn-${i}`).textContent = card.vn;
  document.getElementById(`fc-count-${i}`).textContent = `${fcIdx[i] + 1} / ${DAYS[i].dialogue.length}`;
}

function flipCard(i) { document.getElementById(`fc-${i}`).classList.toggle('flipped'); }
function fcNext(i) { if (fcIdx[i] < DAYS[i].dialogue.length - 1) { fcIdx[i]++; updateFlashcard(i); } }
function fcPrev(i) { if (fcIdx[i] > 0) { fcIdx[i]--; updateFlashcard(i); } }

function initDay(i) { fcIdx[i] = 0; updateFlashcard(i); renderQuiz(i); renderDict(i); }

function renderQuiz(i) {
  quizState[i] = { idx: 0 };
  const q = DAYS[i].quiz[0];
  document.getElementById(`quiz-body-${i}`).innerHTML = `
    <div class="quiz-q-card"><div class="quiz-q-text">${q.q}</div></div>
    <div class="quiz-opts">${q.opts.map((o, oi) => `<button class="quiz-opt" onclick="this.classList.add('${oi===q.ans?'correct':'wrong'}')">${o}</button>`).join('')}</div>`;
}

function renderDict(i) {
  const item = DAYS[i].dictation[0];
  document.getElementById(`dict-body-${i}`).innerHTML = `
    <div class="dict-card"><div class="dict-blanks">${item.text.replace(/[^\s]/g, '_')}</div><input class="dict-input" type="text" oninput="if(this.value.toLowerCase()==='${item.text.toLowerCase()}')this.classList.add('correct')" placeholder="Gõ từ..."></div>`;
}

</script>
</body>
</html>
