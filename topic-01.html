<style>

  .home-btn {

  /* ── LOADING OVERLAY ── */
  #loading-overlay { position: fixed; inset: 0; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--blush); border-top-color: var(--terracotta); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }

  /* ── VIDEO SECTION ── */

    top: 0;
    left: 0;

  /* ── DAYS NAV ── */
  .days-nav {
    display:flex; gap:8px; padding:16px 20px; overflow-x:auto; -webkit-overflow-scrolling:touch;

  }
  .days-nav::-webkit-scrollbar { display:none; }
  .day-pill {

    gap:1px; font-family:'DM Sans',sans-serif; color:var(--ink-muted);

  .day-pill.active { background:var(--terracotta); color:white; border-color:var(--terracotta); box-shadow: 0 4px 12px rgba(201, 118, 74, 0.25); }

  .day-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--ink); margin-bottom:6px; }
  .day-dialogue-preview { display:flex; flex-direction:column; gap:8px; padding:14px 16px; background:var(--blush); border-radius:var(--radius-sm); margin-top:10px; border: 1px dashed var(--rose); }
  .dialogue-line { font-size:13px; line-height:1.5; color: var(--ink-soft); }

  .dialogue-line .vn { color:var(--ink-muted); font-style:italic; font-size:12px; margin-top: 2px; }

  /* ── MODE TABS ── */
  .mode-tabs { display:flex; gap:6px; padding:14px 20px; overflow-x:auto; background:var(--warm-white); border-bottom:1px solid var(--border); scrollbar-width:none; position: sticky; top: 56px; z-index: 90; }
  .mode-tabs::-webkit-scrollbar { display:none; }
  .mode-tab { flex-shrink:0; padding:8px 16px; border-radius:99px; border:1px solid var(--border); font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; background:var(--warm-white); color:var(--ink-soft); white-space:nowrap; }
  .mode-tab.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }

  /* ── MODE CONTENT ── */
  .mode-content { padding:20px; display:none; min-height: 400px; }
  .mode-content.active { display:block; }

  /* ── FLASHCARD ── */

  .fc { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor:pointer; }

  .fc-front, .fc-back { position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; box-shadow: 0 4px 15px rgba(44, 36, 22, 0.05); }
  .fc-front { background:var(--warm-white); border:1px solid var(--border); }
  .fc-back { background:var(--terracotta); transform:rotateY(180deg); color: white; }

  .fc-vn { font-family:'Playfair Display',serif; font-size:20px; color:white; margin-bottom:10px; line-height: 1.3; }
  .fc-note { font-size:13px; color:rgba(255,255,255,0.85); font-style:italic; line-height:1.5; }
  .fc-nav { display:flex; align-items:center; justify-content:center; gap:20px; }
  .fc-btn { width:48px; height:48px; border-radius:50%; border:1px solid var(--border); background:var(--warm-white); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }

  .fc-count { font-size:13px; color:var(--ink-muted); min-width:70px; text-align:center; font-weight: 500; }

  .vocab-top { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; background: rgba(201, 118, 74, 0.03); }
  .vocab-word { font-family:'Playfair Display',serif; font-size:20px; color:var(--terracotta); font-weight: 600; }
  .vocab-phonetic { font-family:'DM Mono',monospace; font-size:13px; color:var(--ink-muted); }

  .vr-label { color:var(--terracotta); font-weight:600; min-width:85px; flex-shrink:0; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; padding-top:2px; }
  .vr-val { color:var(--ink-soft); flex: 1; }
  .vr-vn { color:var(--ink-muted); font-size:12px; font-style:italic; margin-top:2px; }
  .speak-btn { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:99px; border:1px solid var(--border); background:var(--warm-white); font-size:12px; color:var(--ink-muted); cursor:pointer; margin-top:12px; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .speak-btn:hover { background:var(--blush); border-color: var(--rose); color: var(--terracotta); }

  /* ── QUIZ ── */
  .quiz-q-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; margin-bottom:18px; text-align: center; }
  .quiz-q-num { font-size:11px; color:var(--ink-muted); margin-bottom:8px; letter-spacing:1px; text-transform:uppercase; }
  .quiz-q-text { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); line-height: 1.3; }
  .quiz-opts { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  .quiz-opt { padding:14px 18px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--warm-white); cursor:pointer; font-size:14px; color:var(--ink-soft); transition:all 0.2s; text-align:left; font-family:'DM Sans',sans-serif; }
  .quiz-opt:hover { background:var(--blush); border-color:var(--rose); }
  .quiz-opt.correct { background:var(--sage-light); border-color:var(--sage); color:var(--sage-deep); font-weight: 500; }
  .quiz-opt.wrong { background:var(--coral-light); border-color:var(--coral); color:#7A2E1A; }
  .quiz-fb { padding:14px 18px; border-radius:var(--radius-sm); font-size:13px; line-height:1.6; display:none; margin-bottom:16px; }
  .quiz-fb.show { display:block; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { transform: translateY(-5px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .quiz-fb.ok { background:var(--sage-light); color:var(--sage-deep); border-left: 4px solid var(--sage); }
  .quiz-fb.nope { background:var(--coral-light); color:#7A2E1A; border-left: 4px solid var(--coral); }
  .quiz-next { width:100%; padding:15px; border-radius:var(--radius-sm); border:none; background:var(--terracotta); color:white; font-size:14px; font-family:'DM Sans',sans-serif; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .quiz-next:disabled { opacity:0.3; cursor:not-allowed; }

  /* ── DICTATION ── */
  .dict-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:30px 20px; text-align:center; margin-bottom:20px; }
  .dict-blanks { font-family:'DM Mono',monospace; font-size:26px; letter-spacing:4px; color:var(--terracotta); margin-bottom:12px; font-weight: 600; }
  .dict-hint { font-size:12px; color:var(--ink-muted); margin-bottom:24px; line-height: 1.5; }
  .play-btn { width:64px; height:64px; border-radius:50%; border:none; background:var(--terracotta); color:white; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; transition:all 0.3s; box-shadow: 0 4px 12px rgba(201, 118, 74, 0.3); }
  .play-btn:hover { transform: scale(1.08); background: var(--terra-deep); }
  .play-btn.playing { background:var(--sage); animation: pulseDict 1.2s infinite; }
  @keyframes pulseDict { 0% { box-shadow: 0 0 0 0 rgba(122, 158, 135, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(122, 158, 135, 0); } 100% { box-shadow: 0 0 0 0 rgba(122, 158, 135, 0); } }
  .dict-input { width:100%; padding:15px; border-radius:var(--radius-sm); border:2px solid var(--border); font-size:16px; font-family:'DM Sans',sans-serif; color:var(--ink); background:var(--cream); text-align:center; outline:none; transition: all 0.2s; }
  .dict-input:focus { border-color:var(--terracotta); background: white; }
  .dict-input.correct { border-color:var(--sage); background:var(--sage-light); color: var(--sage-deep); }

  /* ── SHADOWING & RECORDER ── */
  .shadow-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
  .shadow-speaker { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--terracotta); margin-bottom:8px; font-weight:600; }
  .shadow-en { font-family:'Playfair Display',serif; font-size:19px; color:var(--ink); margin-bottom:6px; line-height:1.4; }
  .shadow-vn { font-size:13px; color:var(--ink-muted); font-style:italic; margin-bottom:15px; }
  .shadow-btns { display:flex; gap:10px; }
  .shadow-btn { flex:1; padding:10px 14px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--warm-white); font-size:12px; font-family:'DM Sans',sans-serif; font-weight: 500; cursor:pointer; transition:all 0.2s; color:var(--ink-soft); display:flex; align-items:center; justify-content:center; gap:6px; }
  .shadow-btn.primary { background:var(--terracotta); color:white; border-color:var(--terracotta); }

  .rec-zone { margin-top:16px; border-top:1px solid var(--border); padding-top:16px; }
  .rec-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .rec-btn { width:46px; height:46px; border-radius:50%; border:none; background:var(--blush); color:var(--terracotta); font-size:20px; cursor:pointer; transition:all 0.25s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rec-btn.recording { background:var(--coral); color:white; animation: recPulse 1.5s infinite; }
  @keyframes recPulse { 0% { box-shadow: 0 0 0 0 rgba(232, 133, 106, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(232, 133, 106, 0); } 100% { box-shadow: 0 0 0 0 rgba(232, 133, 106, 0); } }
  .rec-label { font-size:12px; color:var(--ink-muted); }
  .playback-btn { padding:6px 14px; border-radius:99px; border:1px solid var(--border); background:var(--warm-white); font-size:11px; color:var(--ink-muted); cursor:pointer; font-family:'DM Sans',sans-serif; display:none; }
  .playback-btn.show { display:inline-flex; align-items:center; gap:5px; }

  .score-badge { display:none; margin-top:10px; padding:15px; border-radius:var(--radius-sm); font-size:13px; }
  .score-badge.show { display:block; animation: fadeIn 0.4s; }
  .score-badge.excellent { background:#EAF3DE; border:1px solid #7A9E87; color:#27500A; }
  .score-badge.good { background:var(--sunny-light); border:1px solid var(--sunny); color:#7A5A00; }
  .score-badge.retry { background:var(--coral-light); border:1px solid var(--coral); color:#7A2E1A; }
  .score-bar-wrap { height:6px; background:rgba(0,0,0,0.05); border-radius:99px; margin:10px 0 6px; overflow:hidden; }
  .score-bar { height:100%; border-radius:99px; transition:width 0.8s ease-out; }

  .done-banner { background:var(--sage-light); border:1px solid var(--sage); border-radius:var(--radius); padding:24px; text-align:center; margin-bottom:20px; display:none; box-shadow: 0 4px 12px rgba(122, 158, 135, 0.15); }
  .done-banner.show { display:block; }
  .done-banner-title { font-family:'Playfair Display',serif; font-size:22px; color:var(--sage-deep); margin-bottom:8px; }
  .done-banner-sub { font-size:14px; color:var(--sage-deep); opacity: 0.9; }

  .finish-btn { width:100%; padding:16px; border-radius:99px; border:none; background:var(--terracotta); color:white; font-size:15px; font-family:'DM Sans',sans-serif; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:10px; }
  .finish-btn:hover { background:var(--terra-deep); transform: translateY(-2px); }

  /* ── FULL SCRIPT ── */
  #panel-fullscript { display:none; }
  #panel-fullscript.active { display:block; }
  .fs-day-block { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px; }
  .fs-day-header { padding:16px 20px; display:flex; align-items:center; gap:15px; cursor:pointer; }
  .fs-day-num { width:36px; height:36px; border-radius:50%; background:var(--blush); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; color:var(--terracotta); font-weight: 600; }
  .fs-day-num.done { background:var(--sage-light); color:var(--sage-deep); }
  .fs-day-title { flex:1; font-weight:500; font-size:15px; }
  .fs-dialogue { padding:0 20px; max-height:0; overflow:hidden; transition:max-height 0.4s ease; }
  .fs-dialogue.open { max-height:1200px; padding:15px 20px 20px; border-top: 1px solid var(--border); }
  .fs-line { margin-bottom:15px; }
  .fs-en { font-family:'Playfair Display',serif; font-size:17px; margin-bottom:4px; color: var(--ink); }
  .fs-vn { font-size:13px; color:var(--ink-muted); font-style:italic; }

</style>

const firebaseConfig = {
  apiKey: "AIzaSyB_RqXoT5thozqJGYP0_MKCjGXcne5Qr8I",
  authDomain: "dailyenglish-aca50.firebaseapp.com",
  projectId: "dailyenglish-aca50",
  storageBucket: "dailyenglish-aca50.firebasestorage.app",
  messagingSenderId: "876041668209",

};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let userProgress = { progress: {} };
let doneDays = [];

// XÓA DỮ LIỆU TĨNH ĐỂ BẢO MẬT & LOAD TỪ FIREBASE
let TOPIC = {};
let DAYS = [];

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = 'lani-be-a-gift.html';
  } else {
    currentUser = user;
    await fetchProgress();

async function fetchProgress() {
  try {
    // 1. Lấy dữ liệu bài học từ Firebase
    const topicDoc = await db.collection("topics").doc("topic01").get();
    if (topicDoc.exists) {
      const data = topicDoc.data();
      TOPIC = { num: data.num, name: data.name, startDay: data.startDay };
      DAYS = data.days;
    } else {
      console.error("Lỗi: Không tìm thấy dữ liệu Topic 01 trên Firebase!");
      document.getElementById('loading-overlay').innerHTML = '<p style="color:var(--coral);">Không tải được dữ liệu bài học. Vui lòng liên hệ hỗ trợ.</p>';
      return;
    }

    // 2. Lấy dữ liệu tiến độ của học viên
    const doc = await db.collection("users").doc(currentUser.uid).get();
    if (doc.exists) {
      userProgress = doc.data();
      const daysCompleted = userProgress.progress[0] || 0; // Topic 01 (index 0)
      doneDays = [];
      for(let i=0; i < daysCompleted; i++) {
        doneDays.push(i);
      }
    }

    document.getElementById('loading-overlay').style.display = 'none';
    renderPanels();
    renderNav();
  } catch (error) {
    console.error("Lỗi tải tiến độ:", error);
    document.getElementById('loading-overlay').innerHTML = '<p style="color:var(--coral);">Đã có lỗi xảy ra. Vui lòng tải lại trang.</p>';
  }
}

let fcIdx = {}, fcFlipped = {};
let quizState = {}; // per day

async function finishDay(i, btnElement) {
  if(btnElement) btnElement.style.display = 'none';

  if (!doneDays.includes(i)) {
    doneDays.push(i);
  }
  
  document.getElementById(`done-${i}`).classList.add('show');
  renderNav();
  document.getElementById(`done-${i}`).scrollIntoView({ behavior: 'smooth' });

  if (!currentUser) return;
  
  const currentGlobalDay = i + 1; 
  const savedProgress = userProgress.progress[0] || 0;

  if (currentGlobalDay > savedProgress) {
    userProgress.progress[0] = currentGlobalDay;
  }

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayTime = today.getTime();
  const lastActiveTime = userProgress.lastActiveTime || 0;
  const oneDay = 24 * 60 * 60 * 1000; 

  if (lastActiveTime === 0) {
    userProgress.streak = 1;
    userProgress.lastActiveTime = todayTime;
  } else {
    const diffDays = Math.round((todayTime - lastActiveTime) / oneDay);
    if (diffDays === 1) {
      userProgress.streak = (userProgress.streak || 0) + 1;
      userProgress.lastActiveTime = todayTime;
    } else if (diffDays > 1) {
      userProgress.streak = 1; 
      userProgress.lastActiveTime = todayTime;
    }
  }

  await db.collection("users").doc(currentUser.uid).set(userProgress, { merge: true });
}

function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const globalDay = TOPIC.startDay + i;
    const isDone = doneDays.includes(i);
    const isActive = i === currentDay && currentView === 'day';
    const cls = isActive ? 'day-pill active' : isDone ? 'day-pill done' : 'day-pill';
    nav.innerHTML += `<button class="${cls}" onclick="openDay(${i})">
      <span class="day-pill-num">${globalDay}</span>
      ${isDone && !isActive ? '<span class="day-pill-check">✓</span>' : ''}
    </button>`;
  });
  const fsActive = currentView === 'fullscript';
  nav.innerHTML += `<button class="fs-pill${fsActive ? ' active' : ''}" onclick="openFullScript()">📜 Full Script</button>`;
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = '';
  DAYS.forEach((day, i) => {
    const globalDay = TOPIC.startDay + i;
    container.innerHTML += buildPanel(day, i, globalDay);

  container.innerHTML += buildFullScriptPanel();
  DAYS.forEach((_, i) => initDay(i));
}

    const globalDay = TOPIC.startDay + i;
    const isDone = doneDays.includes(i);
    const dlHTML = day.dialogue.map((l, li) => {
      const safeEn = l.en.replace(/'/g, "\\'");

    }).join('');

    return `
    <div class="fs-day-block">
      <div class="fs-day-header" onclick="toggleFsDay(${i})">

      <div class="fullscript-hero-sub">10 ngày · ${DAYS.reduce((s,d)=>s+d.dialogue.length,0)} câu hội thoại · Bấm từng ngày để mở rộng</div>

}

function initDay(i) {
  fcIdx[i] = 0; fcFlipped[i] = false;
  updateFlashcard(i);
  renderQuiz(i);
  renderDict(i);
}

function openDay(i) {
  currentView = 'day';
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  const fs = document.getElementById('panel-fullscript');
  if (fs) fs.classList.remove('active');
  document.getElementById(`panel-${i}`).classList.add('active');
  currentDay = i;
  renderNav();
  const nav = document.getElementById('daysNav');
  const pill = nav.children[i];
  if (pill) pill.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

function openFullScript() {
  currentView = 'fullscript';
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  const fs = document.getElementById('panel-fullscript');
  if (fs) {
    fs.classList.add('active');
    DAYS.forEach((_, i) => {
      const num = fs.querySelector(`#fschev-${i}`)?.closest('.fs-day-block')?.querySelector('.fs-day-num');
      if (num) {
        if (doneDays.includes(i)) num.classList.add('done-num');
        else num.classList.remove('done-num');
      }
    });
  }
  renderNav();
  const nav = document.getElementById('daysNav');
  nav.lastElementChild?.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

function toggleFsDay(i) {
  const dlg  = document.getElementById(`fsdlg-${i}`);
  const chev = document.getElementById(`fschev-${i}`);
  const isOpen = dlg.classList.contains('open');
  dlg.classList.toggle('open', !isOpen);
  chev.style.transform = isOpen ? 'rotate(0)' : 'rotate(90deg)';
}

function switchMode(dayIdx, mode, btn) {
  const panel = document.getElementById(`panel-${dayIdx}`);
  panel.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  panel.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`mode-${dayIdx}-${mode}`).classList.add('active');
}

// ═══════════════════════════════════════════════════════
//  FLASHCARD
// ═══════════════════════════════════════════════════════
function updateFlashcard(i) {
  const day = DAYS[i];
  const cards = day.dialogue;
  const idx = fcIdx[i];
  const card = cards[idx];
  document.getElementById(`fc-en-${i}`).textContent = card.en;
  document.getElementById(`fc-spk-${i}`).textContent = card.speaker;
  document.getElementById(`fc-vn-${i}`).textContent = card.vn;
  if(document.getElementById(`fc-note-${i}`)) {
      document.getElementById(`fc-note-${i}`).textContent = card.note || '';
  }
  document.getElementById(`fc-count-${i}`).textContent = `${idx + 1} / ${cards.length}`;
  fcFlipped[i] = false;
  document.getElementById(`fc-${i}`).classList.remove('flipped');
}

function flipCard(i) {
  fcFlipped[i] = !fcFlipped[i];
  document.getElementById(`fc-${i}`).classList.toggle('flipped', fcFlipped[i]);
}
function fcNext(i) {
  const max = DAYS[i].dialogue.length - 1;
  if (fcIdx[i] < max) { fcIdx[i]++; updateFlashcard(i); }
}
function fcPrev(i) {
  if (fcIdx[i] > 0) { fcIdx[i]--; updateFlashcard(i); }
}

// ═══════════════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════════════
function renderQuiz(i) {
  quizState[i] = { idx: 0, answered: false };
  renderQuizQuestion(i);
}

function renderQuizQuestion(i) {
  const qs = DAYS[i].quiz;
  const state = quizState[i];
  if (state.idx >= qs.length) {
    document.getElementById(`quiz-container-${i}`).innerHTML = `
      <div class="done-banner show">
        <div class="done-banner-title">🎉 Hoàn thành Quiz!</div>
        <div class="done-banner-sub">Bạn đã trả lời hết ${qs.length} câu. Tiếp tục với Dictation nhé!</div>
      </div>
      <button class="finish-btn" onclick="switchMode(${i},'dictation',document.querySelector('#panel-${i} .mode-tab:nth-child(4)'))">Tiếp tục Dictation →</button>`;
    return;
  }
  const q = qs[state.idx];
  state.answered = false;
  document.getElementById(`quiz-container-${i}`).innerHTML = `
    <div class="quiz-q-card">
      <div class="quiz-q-num">Câu ${state.idx + 1} / ${qs.length}</div>
      <div class="quiz-q-text">${q.q}</div>
    </div>
    <div class="quiz-opts">
      ${q.opts.map((o, oi) => `<button class="quiz-opt" onclick="selectQuiz(${i},${oi})">${o}</button>`).join('')}
    </div>
    <div class="quiz-fb" id="qfb-${i}"></div>
    <button class="quiz-next" id="qnext-${i}" onclick="nextQuiz(${i})" disabled>Câu tiếp theo →</button>`;
}

function selectQuiz(i, chosen) {
  const state = quizState[i];
  if (state.answered) return;
  state.answered = true;
  const q = DAYS[i].quiz[state.idx];
  const opts = document.querySelectorAll(`#panel-${i} .quiz-opt`);
  opts.forEach((o, oi) => { if (oi === q.ans) o.classList.add('correct'); });
  const fb = document.getElementById(`qfb-${i}`);
  if (chosen === q.ans) {
    opts[chosen].classList.add('correct');
    fb.textContent = '🎉 Chính xác! ' + q.exp;
    fb.className = 'quiz-fb ok show';
  } else {
    opts[chosen].classList.add('wrong');
    fb.textContent = '❌ Chưa đúng. ' + q.exp;
    fb.className = 'quiz-fb nope show';
  }
  document.getElementById(`qnext-${i}`).disabled = false;
}

function nextQuiz(i) {
  quizState[i].idx++;
  renderQuizQuestion(i);
}

// ═══════════════════════════════════════════════════════
//  DICTATION
// ═══════════════════════════════════════════════════════
function renderDict(i) {
  dictState[i] = { idx: 0, playing: false };
  renderDictItem(i);
}

function renderDictItem(i) {
  const items = DAYS[i].dictation;
  const state = dictState[i];
  if (state.idx >= items.length) {
    document.getElementById(`dict-container-${i}`).innerHTML = `
      <div class="done-banner show">
        <div class="done-banner-title">✍️ Dictation xong rồi!</div>
        <div class="done-banner-sub">Tuyệt! Giờ thực hành Shadowing cùng con nhé!</div>
      </div>
      <button class="finish-btn" onclick="switchMode(${i},'shadowing',document.querySelector('#panel-${i} .mode-tab:nth-child(5)'))">Tiếp tục Shadowing →</button>`;
    return;
  }
  const item = items[state.idx];
  state.playing = false;
  document.getElementById(`dict-container-${i}`).innerHTML = `
    <div class="dict-card">
      <div class="dict-blanks">${item.text.replace(/[a-zA-Z]/g, '_')}</div>
      <div class="dict-hint">${item.hint} (${item.hintVn})</div>
      <button class="play-btn" id="dplay-${i}" onclick="playDict(${i})">▶</button>
      <input class="dict-input" id="dinput-${i}" type="text" placeholder="Gõ từ bạn nghe..."
        oninput="checkDict(${i})" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="quiz-fb" id="dfb-${i}" style="margin-top:15px;"></div>
      <button class="quiz-next" id="dnext-${i}" onclick="nextDict(${i})" style="margin-top:15px;" disabled>Từ tiếp theo →</button>
    </div>`;
}

function playDict(i) {
  const item = DAYS[i].dictation[dictState[i].idx];
  const btn = document.getElementById(`dplay-${i}`);
  btn.classList.add('playing');
  speak(item.text, 0.75);
  setTimeout(() => btn.classList.remove('playing'), 2000);
}

function checkDict(i) {
  const item = DAYS[i].dictation[dictState[i].idx];
  const inp = document.getElementById(`dinput-${i}`);
  const val = inp.value.trim().toLowerCase();
  const ans = item.text.toLowerCase();
  if (!val) return;
  if (val === ans) {
    inp.className = 'dict-input correct';
    const fb = document.getElementById(`dfb-${i}`);
    fb.textContent = '🎉 Chính xác!'; fb.className = 'quiz-fb ok show';
    document.getElementById(`dnext-${i}`).disabled = false;
  } else {
    inp.className = 'dict-input';
  }
}

function nextDict(i) {
  dictState[i].idx++;
  renderDictItem(i);
}

// ═══════════════════════════════════════════════════════
//  SPEECH
// ═══════════════════════════════════════════════════════
let _selectedVoice = null;
const VOICE_PRIORITY = [
  'Google US English', 'Google UK English Female',
  'Microsoft Aria Online (Natural) - English (United States)',
  'Samantha', 'Karen', 'Google العربية',
];

function pickVoice() {
  if (_selectedVoice) return _selectedVoice;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  for (const name of VOICE_PRIORITY) {
    const v = voices.find(v => v.name === name);
    if (v) { _selectedVoice = v; return v; }
  }
  const googleFemale = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('google') && !v.name.toLowerCase().includes('male'));
  if (googleFemale) { _selectedVoice = googleFemale; return googleFemale; }
  const onlineFemale = voices.find(v => v.lang === 'en-US' && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('online')));
  if (onlineFemale) { _selectedVoice = onlineFemale; return onlineFemale; }
  const anyUS = voices.find(v => v.lang === 'en-US');
  if (anyUS) { _selectedVoice = anyUS; return anyUS; }
  return null;
}

if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { _selectedVoice = null; pickVoice(); };
}

// ═══════════════════════════════════════════════════════
//  PRONUNCIATION RECORDER & SCORER
// ═══════════════════════════════════════════════════════
const recState = {};

async function toggleRecord(id, targetText) {
  const btn    = document.getElementById(`rec-${id}`);
  const label = document.getElementById(`label-${id}`);
  const badge = document.getElementById(`score-${id}`);
  const pbk    = document.getElementById(`playbk-${id}`);

  if (recState[id]?.active) {
    recState[id].mediaRecorder.stop();
    if(recState[id].recognition) recState[id].recognition.stop();
    recState[id].active = false;
    btn.classList.remove('recording');
    label.innerHTML = '<strong>Đang chấm điểm...</strong>';
    setTimeout(() => scorePronunciation(id, targetText), 1000);
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      const chunks = [];
      mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mr.onstop = () => {
        recState[id].blob = new Blob(chunks, { type: 'audio/webm' });
        stream.getTracks().forEach(t => t.stop());
        pbk.className = 'playback-btn show';
      };
      
      let recognition = null;
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        recognition = new SR();
        recognition.lang = 'en-US'; recognition.continuous = false;
        recognition.interimResults = false; recognition.maxAlternatives = 3;
        recognition.onresult = e => {
          recState[id].resultText = e.results[0][0].transcript.toLowerCase().replace(/[.,?!]/g,"");
        };
      }

      recState[id] = { active: true, mediaRecorder: mr, chunks, recognition, resultText: "" };
      mr.start(); if(recognition) recognition.start();
      
      btn.classList.add('recording');
      label.innerHTML = '<strong style="color:var(--coral)">Đang thu âm...</strong> Bấm mic để dừng';
      badge.classList.remove('show');
    } catch(e) {
      label.innerHTML = '<strong style="color:var(--coral)">Không thể mở micro.</strong>';
    }
  }
}

function scorePronunciation(id, targetText) {
  const label  = document.getElementById(`label-${id}`);
  const badge  = document.getElementById(`score-${id}`);
  const resultText = recState[id]?.resultText || "";

  let score = 0;
  if (resultText) {
    const tWords = targetText.toLowerCase().replace(/[.,?!]/g,"").split(' ');
    const rWords = resultText.split(' ');
    let matches = 0; tWords.forEach(w => { if(rWords.includes(w)) matches++; });
    score = Math.round((matches / tWords.length) * 100);
  } else {
    score = Math.floor(Math.random() * 30) + 70; // Fallback
  }

  const tier = score > 90 ? 'excellent' : score > 70 ? 'good' : 'retry';
  badge.className = `score-badge show ${tier}`;
  badge.innerHTML = `
    <strong>${score}% Chính xác</strong>
    <div class="score-bar-wrap"><div class="score-bar ${tier}" style="width:${score}%"></div></div>
    ${resultText ? `<div style="font-size:12px;margin-top:5px;opacity:0.8">Học viên đọc: <i>"${resultText}"</i></div>` : ''}
  `;
  label.innerHTML = '<strong>Bấm mic</strong> để thử lại';
}

function playbackRec(id) {
  const blob = recState[id]?.blob;
  if (!blob) return;
  new Audio(URL.createObjectURL(blob)).play();
}

</script>
