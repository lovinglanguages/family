firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
 
let currentUser = null;
let userProgress = { progress: {} };
let doneDays = [];

// Khởi tạo biến data rỗng, sẽ được điền bằng dữ liệu từ Firebase
let TOPIC = { num: '01', name: 'Morning Routine', startDay: 1 };
let DAYS = []; 
 
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = 'lani-be-a-gift.html';
  } else {
    currentUser = user;
    
    // TẢI DỮ LIỆU BÀI HỌC TỪ FIREBASE TRƯỚC
    await fetchLessonData();
    
    // NẾU CÓ DỮ LIỆU THÌ MỚI TẢI TIẾN ĐỘ VÀ RENDER
    if(DAYS.length > 0) {
      await fetchProgress();
    }
    
    document.getElementById('loading-overlay').style.display = 'none';
  }
});

// ═══════════════════════════════════════════════════════
//  FETCH LESSON DATA TỪ FIREBASE (TÍNH NĂNG MỚI)
// ═══════════════════════════════════════════════════════
async function fetchLessonData() {
  try {
    /* LƯU Ý: Giả sử bạn cấu trúc Firebase của bạn như sau:
      - Collection: "lessons" 
      - Document: "topic_01"
      - Field "days": Mảng chứa toàn bộ object bài học 10 ngày bạn vừa xóa.
    */
    const docRef = db.collection("lessons").doc("topic_01");
    const docSnap = await docRef.get();

    if (docSnap.exists) {
      const data = docSnap.data();
      DAYS = data.days || []; 
      
      // Nếu bạn có lưu TOPIC trên Firebase thì có thể gán:
      // if (data.topic) TOPIC = data.topic;
    } else {
      console.error("Không tìm thấy dữ liệu bài học trên Firebase (lessons/topic_01)!");
      alert("Chưa có dữ liệu bài học. Vui lòng kiểm tra lại cấu trúc Firestore.");
    }
  } catch (error) {
    console.error("Lỗi tải dữ liệu bài học:", error);
  }
}
 
async function fetchProgress() {
  try {
    const doc = await db.collection("users").doc(currentUser.uid).get();
    if (doc.exists) {
      userProgress = doc.data();
      const daysCompleted = userProgress.progress[0] || 0;
      for(let i=0; i < daysCompleted; i++) {
        doneDays.push(i);
      }
    }
    renderPanels();
    renderNav();
  } catch (error) {
    console.error("Lỗi tải tiến độ:", error);
  }
}

let currentDay = 0;
let fcIdx = {}, fcFlipped = {};

// ═══════════════════════════════════════════════════════
//  DAYS NAV & FIRESTORE SYNC
// ═══════════════════════════════════════════════════════
 
async function finishDay(i, btnElement) {
  if(btnElement) btnElement.style.display = 'none';
  if (!doneDays.includes(i)) doneDays.push(i);
  
  document.getElementById(`done-${i}`).classList.add('show');
  renderNav();
  document.getElementById(`done-${i}`).scrollIntoView({ behavior: 'smooth' });
 
  if (!currentUser) return;
  
  const currentGlobalDay = i + 1; 
  const savedProgress = userProgress.progress[0] || 0;
  if (currentGlobalDay > savedProgress) {
    userProgress.progress[0] = currentGlobalDay;
  }
 
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayTime = today.getTime();
  const lastActiveTime = userProgress.lastActiveTime || 0;
  const oneDay = 24 * 60 * 60 * 1000;
 
  if (lastActiveTime === 0) {
    userProgress.streak = 1;
    userProgress.lastActiveTime = todayTime;
  } else {
    const diffDays = Math.round((todayTime - lastActiveTime) / oneDay);
    if (diffDays === 1) {
      userProgress.streak = (userProgress.streak || 0) + 1;
      userProgress.lastActiveTime = todayTime;
    } else if (diffDays > 1) {
      userProgress.streak = 1; 
      userProgress.lastActiveTime = todayTime;
    }
  }
 
  await db.collection("users").doc(currentUser.uid).set(userProgress, { merge: true });
}
 
function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const globalDay = TOPIC.startDay + i;
    const isDone = doneDays.includes(i);
    const isActive = i === currentDay && currentView === 'day';
    const cls = isActive ? 'day-pill active' : isDone ? 'day-pill done' : 'day-pill';
    nav.innerHTML += `<button class="${cls}" onclick="openDay(${i})">
      <span class="day-pill-num">${globalDay}</span>
      ${isDone && !isActive ? '<span class="day-pill-check">✓</span>' : ''}
    </button>`;
  });
  const fsActive = currentView === 'fullscript';
  nav.innerHTML += `<button class="fs-pill${fsActive ? ' active' : ''}" onclick="openFullScript()">📜 Full Script</button>`;
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = '';
  DAYS.forEach((day, i) => {
    const globalDay = TOPIC.startDay + i;
    container.innerHTML += buildPanel(day, i, globalDay);
  });
