<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 01 – Morning Routine · Lani Be A Gift</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF7F0; --warm-white: #FFFCF7; --blush: #F5E6D8; --rose: #E8C4A8;
    --terracotta: #C9764A; --terra-deep: #A0552E;
    --sage: #7A9E87; --sage-light: #C8DDD0; --sage-deep: #4A7259;
    --sky: #8BB8D4; --sky-light: #D4E8F3;
    --lavender: #C4B5D4; --lavender-light: #EDE8F5;
    --sunny: #F2C94C; --sunny-light: #FBF0C4;
    --coral: #E8856A; --coral-light: #FAD8CF;
    --ink: #2C2416; --ink-soft: #5C4E3A; --ink-muted: #8C7E6A;
    --border: rgba(44,36,22,0.12);
    --radius: 16px; --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; }

  /* ── HEADER ── */
  header {
    background:var(--warm-white); border-bottom:1px solid var(--border);
    padding:0 20px; height:56px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .logo { font-family:'Playfair Display',serif; font-size:18px; color:var(--terracotta); }
  .logo span { font-style:italic; }
  .home-btn {
    padding:6px 14px; border-radius:8px; border:1px solid var(--border);
    font-size:12px; color:var(--ink-muted); background:none; cursor:pointer;
    font-family:'DM Sans',sans-serif; text-decoration:none;
    display:flex; align-items:center; gap:5px;
  }
  .home-btn:hover { background:var(--blush); }

  /* ── TOPIC HERO ── */
  .topic-hero { background:var(--warm-white); padding:28px 20px 20px; border-bottom:1px solid var(--border); }
  .topic-eyebrow { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--terracotta); margin-bottom:6px; }
  .topic-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--ink); margin-bottom:4px; }
  .topic-title em { color:var(--terracotta); font-style:italic; }
  .topic-vn { font-size:13px; color:var(--ink-muted); }

  /* ── DAYS NAV ── */
  .days-nav {
    display:flex; gap:8px; padding:16px 20px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    background:var(--warm-white); border-bottom:1px solid var(--border); scrollbar-width:none;
  }
  .days-nav::-webkit-scrollbar { display:none; }
  .day-pill {
    flex-shrink:0; width:44px; height:44px; border-radius:50%; border:1px solid var(--border);
    background:var(--warm-white); font-size:13px; font-weight:500; cursor:pointer;
    transition:all 0.2s; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1px; font-family:'DM Sans',sans-serif; color:var(--ink-muted);
  }
  .day-pill:hover { background:var(--blush); border-color:var(--rose); }
  .day-pill.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }
  .day-pill.done { background:var(--sage-light); color:var(--sage-deep); border-color:var(--sage); }
  .day-pill-num { font-size:14px; font-weight:500; line-height:1; }
  .day-pill-check { font-size:9px; line-height:1; }

  /* ── DAY PANEL ── */
  .day-panel { display:none; }
  .day-panel.active { display:block; }
  .day-header { padding:20px 20px 16px; background:var(--warm-white); border-bottom:1px solid var(--border); }
  .day-num-label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-muted); margin-bottom:4px; }
  .day-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--ink); margin-bottom:6px; }
  .day-dialogue-preview { display:flex; flex-direction:column; gap:6px; padding:14px 16px; background:var(--blush); border-radius:var(--radius-sm); margin-top:10px; }
  .dialogue-line { font-size:13px; line-height:1.5; }
  .dialogue-line strong { color:var(--terracotta); }
  .dialogue-line .vn { color:var(--ink-muted); font-style:italic; font-size:12px; }

  /* ── MODE TABS ── */
  .mode-tabs { display:flex; gap:6px; padding:14px 20px; overflow-x:auto; background:var(--warm-white); border-bottom:1px solid var(--border); scrollbar-width:none; }
  .mode-tabs::-webkit-scrollbar { display:none; }
  .mode-tab { flex-shrink:0; padding:7px 14px; border-radius:99px; border:1px solid var(--border); font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; background:var(--warm-white); color:var(--ink-soft); white-space:nowrap; }
  .mode-tab:hover { background:var(--blush); }
  .mode-tab.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }

  /* ── MODE CONTENT ── */
  .mode-content { padding:20px; display:none; }
  .mode-content.active { display:block; }

  /* ── FLASHCARD ── */
  .fc-wrap { perspective:1000px; height:240px; margin-bottom:20px; }
  .fc { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.5s; cursor:pointer; }
  .fc.flipped { transform:rotateY(180deg); }
  .fc-front, .fc-back { position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; }
  .fc-front { background:var(--warm-white); border:1px solid var(--border); }
  .fc-back { background:var(--terracotta); transform:rotateY(180deg); }
  .fc-en { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); margin-bottom:6px; }
  .fc-speaker { font-size:12px; color:var(--ink-muted); letter-spacing:1px; text-transform:uppercase; }
  .fc-hint { font-size:12px; color:var(--ink-muted); margin-top:14px; }
  .fc-vn { font-family:'Playfair Display',serif; font-size:20px; color:white; margin-bottom:8px; }
  .fc-note { font-size:13px; color:rgba(255,255,255,0.82); font-style:italic; line-height:1.5; }
  .fc-nav { display:flex; align-items:center; justify-content:center; gap:16px; }
  .fc-btn { width:42px; height:42px; border-radius:50%; border:1px solid var(--border); background:var(--warm-white); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .fc-btn:hover { background:var(--blush); }
  .fc-count { font-size:13px; color:var(--ink-muted); min-width:60px; text-align:center; }

  /* ── VOCAB ── */
  .vocab-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; }
  .vocab-top { padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .vocab-word { font-family:'Playfair Display',serif; font-size:20px; color:var(--ink); }
  .vocab-phonetic { font-family:'DM Mono',monospace; font-size:12px; color:var(--ink-muted); }
  .vocab-body { padding:14px 18px; }
  .vocab-meaning { font-size:15px; color:var(--ink); font-weight:500; margin-bottom:10px; }
  .vocab-row { display:flex; gap:8px; margin-bottom:7px; font-size:13px; line-height:1.5; }
  .vr-label { color:var(--terracotta); font-weight:500; min-width:80px; flex-shrink:0; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; padding-top:1px; }
  .vr-val { color:var(--ink-soft); }
  .vr-vn { color:var(--ink-muted); font-size:12px; font-style:italic; margin-top:2px; }

  /* ── QUIZ ── */
  .quiz-q-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:22px 20px; margin-bottom:16px; }
  .quiz-q-num { font-size:11px; color:var(--ink-muted); margin-bottom:6px; letter-spacing:1px; text-transform:uppercase; }
  .quiz-q-text { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); margin-bottom:4px; }
  .quiz-opts { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  .quiz-opt { padding:13px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--warm-white); cursor:pointer; font-size:14px; color:var(--ink); transition:all 0.2s; text-align:left; font-family:'DM Sans',sans-serif; }
  .quiz-opt.correct { background:var(--sage-light); border-color:var(--sage); color:var(--sage-deep); }
  .quiz-opt.wrong { background:var(--coral-light); border-color:var(--coral); color:#7A2E1A; }
  .quiz-fb { padding:13px 16px; border-radius:var(--radius-sm); font-size:13px; line-height:1.5; display:none; margin-bottom:12px; }
  .quiz-fb.show { display:block; }
  .quiz-fb.ok { background:var(--sage-light); color:var(--sage-deep); }
  .quiz-fb.nope { background:var(--coral-light); color:#7A2E1A; }
  .quiz-next { width:100%; padding:13px; border-radius:var(--radius-sm); border:none; background:var(--terracotta); color:white; font-size:14px; font-weight:500; cursor:pointer; }
  .quiz-next:disabled { opacity:0.35; cursor:default; }

  /* ── DICTATION ── */
  .dict-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; text-align:center; margin-bottom:16px; }
  .dict-blanks { font-family:'DM Mono',monospace; font-size:24px; letter-spacing:6px; color:var(--ink-muted); margin-bottom:8px; }
  .dict-hint { font-size:12px; color:var(--ink-muted); margin-bottom:20px; }
  .play-btn { width:60px; height:60px; border-radius:50%; border:none; background:var(--terracotta); color:white; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; transition:all 0.2s; }
  .play-btn.playing { background:var(--sage); animation:pulse 1s infinite; }
  .dict-input { width:100%; padding:13px 16px; border-radius:var(--radius-sm); border:1.5px solid var(--border); font-size:16px; text-align:center; outline:none; }
  .dict-input.correct { border-color:var(--sage); background:var(--sage-light); }

  /* ── SHADOWING & RECORDER ── */
  .shadow-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:12px; }
  .shadow-speaker { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--terracotta); margin-bottom:6px; font-weight:500; }
  .shadow-en { font-family:'Playfair Display',serif; font-size:18px; color:var(--ink); margin-bottom:4px; line-height:1.4; }
  .shadow-vn { font-size:13px; color:var(--ink-muted); font-style:italic; margin-bottom:12px; }
  .shadow-btns { display:flex; gap:8px; }
  .shadow-btn { flex:1; padding:9px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--warm-white); font-size:12px; cursor:pointer; color:var(--ink-soft); }
  .shadow-btn.primary { background:var(--terracotta); color:white; border-color:var(--terracotta); }

  .rec-zone { margin-top:12px; border-top:1px solid var(--border); padding-top:12px; }
  .rec-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .rec-btn { width:44px; height:44px; border-radius:50%; border:none; background:var(--blush); color:var(--terracotta); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rec-btn.recording { background:var(--coral); color:white; animation:rec-pulse 1s infinite; }
  @keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(232,133,106,0.5)} 50%{box-shadow:0 0 0 8px rgba(232,133,106,0)} }
  .rec-label { font-size:12px; color:var(--ink-muted); }
  
  .playback-btn { padding:6px 14px; border-radius:99px; border:1px solid var(--border); background:var(--sage-light); font-size:12px; color:var(--sage-deep); cursor:pointer; display:none; }
  .playback-btn.show { display:inline-flex; align-items:center; gap:5px; }

  .score-badge { display:none; margin-top:10px; padding:12px 16px; border-radius:var(--radius-sm); font-size:13px; line-height:1.6; }
  .score-badge.show { display:block; }
  .score-badge.excellent { background:#EAF3DE; border:1px solid #7A9E87; color:#27500A; }
  .score-badge.good      { background:var(--sunny-light); border:1px solid var(--sunny); color:#7A5A00; }
  .score-badge.retry     { background:var(--coral-light); border:1px solid var(--coral); color:#7A2E1A; }
  .score-bar-wrap { height:6px; background:rgba(44,36,22,0.1); border-radius:99px; margin:8px 0 4px; overflow:hidden; }
  .score-bar { height:100%; border-radius:99px; transition:width 0.6s ease; }
  .score-bar.excellent { background:#639922; }
  .score-bar.good      { background:var(--sunny); }
  .score-bar.retry     { background:var(--coral); }

  .done-banner { background:var(--sage-light); border:1px solid var(--sage); border-radius:var(--radius); padding:20px; text-align:center; margin-bottom:16px; display:none; }
  .done-banner.show { display:block; }
  .finish-btn { width:100%; padding:14px; border-radius:99px; border:none; background:var(--terracotta); color:white; font-size:15px; cursor:pointer; margin-top:8px; }

  /* ── FULL SCRIPT ── */
  #panel-fullscript { display:none; }
  #panel-fullscript.active { display:block; }
  .fullscript-hero { background:var(--warm-white); padding:24px 20px 20px; border-bottom:1px solid var(--border); }
  .fullscript-hero-title { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); margin-bottom:4px; }
  .fullscript-content { padding:20px; }
  .fs-day-block { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px; }
  .fs-day-header { padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer; }
  .fs-day-num { width:36px; height:36px; border-radius:50%; flex-shrink:0; background:var(--blush); border:1px solid var(--rose); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:15px; color:var(--terracotta); }
  .fs-day-num.done-num { background:var(--sage-light); border-color:var(--sage); color:var(--sage-deep); }
  .fs-day-title { font-size:15px; font-weight:500; color:var(--ink); flex:1; }
  .fs-dialogue { padding:0 18px; max-height:0; overflow:hidden; transition:max-height 0.35s ease, padding 0.2s; }
  .fs-dialogue.open { max-height:800px; padding:14px 18px 16px; }
  .fs-line { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .fs-speaker { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--terracotta); font-weight:500; margin-bottom:4px; }
  .fs-en { font-family:'Playfair Display',serif; font-size:17px; color:var(--ink); margin-bottom:3px; }
  .fs-vn { font-size:13px; color:var(--ink-muted); font-style:italic; margin-bottom:6px; }
  .fs-speak-btn { padding:4px 12px; border-radius:99px; border:1px solid var(--border); background:var(--warm-white); font-size:11px; cursor:pointer; }
  .fullscript-print-btn { width:100%; padding:13px; border-radius:99px; border:1.5px solid var(--terracotta); background:transparent; color:var(--terracotta); font-size:14px; cursor:pointer; margin-top:4px; }
  .fs-pill { flex-shrink:0; padding:0 14px; height:44px; border-radius:22px; border:1px solid var(--border); background:var(--warm-white); font-size:12px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .fs-pill.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }

  @media print {
    header, .days-nav, .topic-hero, .day-panel, .mode-tabs, .fullscript-print-btn, .fs-speak-btn { display:none !important; }
    #panel-fullscript { display:block !important; }
    .fs-dialogue { max-height:none !important; padding:14px 18px 16px !important; }
    .fs-day-block { break-inside:avoid; }
    body { background:white; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>Lani</span> · Be A Gift</div>
</header>

<div class="topic-hero">
  <div class="topic-eyebrow">Topic 01 · 10 ngày</div>
  <div class="topic-title">☀️ Morning <em>Routine</em></div>
  <div class="topic-vn">Chào ngày mới năng lượng</div>
</div>

<div class="days-nav" id="daysNav"></div>
<div id="panels"></div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA — 10 NGÀY ĐẦY ĐỦ CHI TIẾT
// ═══════════════════════════════════════════════════════
const TOPIC = { num: '01', name: 'Morning Routine', startDay: 1 };

const DAYS = [
  // DAY 1
  {
    title: 'Đánh thức sâu ngủ',
    dialogue: [
      { speaker: 'Mom', en: "Wakey wakey, sleepyhead! It's time to get up.", vn: 'Dậy thôi, dậy thôi nào sâu ngủ ơi! Đến giờ thức dậy rồi.', note: '' },
      { speaker: 'Child', en: "Good morning, Mommy... Just five more minutes?", vn: 'Chào buổi sáng mẹ yêu... Cho con nằm thêm 5 phút nữa thôi được không ạ?', note: 'Bé ngáp' },
    ],
    vocab: [
      { en: 'Sleepyhead', phonetic: '/ˈsliːpihed/', speaker: 'Mom', meaning: 'Sâu ngủ', synonym: 'Late riser', collocation: 'Wake up, sleepyhead!', example: '"Come on, sleepyhead!"', exampleVn: '"Dậy thôi đồ sâu ngủ ơi!"' },
      { en: 'Get up', phonetic: '/ɡet ʌp/', speaker: 'Mom', meaning: 'Thức dậy / Ra khỏi giường', synonym: 'Wake up', collocation: 'Time to get up', example: '"It is time to get up now."', exampleVn: '"Đến giờ phải ra khỏi giường rồi."' }
    ],
    quiz: [
      { q: 'Mẹ gọi bé là gì khi bé chưa muốn dậy?', opts: ['Sweetie','Sleepyhead','Baby'], ans: 1, exp: '"Sleepyhead" là cách gọi yêu cho trẻ lười dậy.' },
      { q: 'Bé muốn ngủ thêm bao lâu?', opts: ['5 minutes','10 minutes','1 hour'], ans: 0, exp: 'Bé xin: "Just five more minutes?"' },
      { q: '"Get up" nghĩa là gì?', opts: ['Đi ngủ','Đi chơi','Thức dậy'], ans: 2, exp: '"Get up" là ra khỏi giường.' }
    ],
    dictation: [
      { text: 'Wakey wakey', hint: 'Dậy thôi nào', hintVn: 'Cách đánh thức trẻ' },
      { text: 'sleepyhead', hint: 'Con sâu ngủ', hintVn: 'Người lười dậy' }
    ],
    shadowing: [
      { speaker: 'Mom', en: "Wakey wakey, sleepyhead! It's time to get up.", vn: 'Dậy thôi, dậy thôi nào sâu ngủ ơi! Đến giờ thức dậy rồi.' },
      { speaker: 'Child', en: "Good morning, Mommy... Just five more minutes?", vn: 'Chào buổi sáng mẹ yêu... Cho con nằm thêm 5 phút nữa thôi được không ạ?' }
    ]
  },
  // DAY 2
  {
    title: 'Ánh nắng rực rỡ',
    dialogue: [
      { speaker: 'Mom', en: "Come on, let's open the curtains. Look! The sun is shining.", vn: 'Thôi nào, để mẹ kéo rèm ra nhé. Nhìn kìa! Nắng đang tỏa sáng rực rỡ luôn.', note: '' },
      { speaker: 'Child', en: "Okay, okay, I'm awake now.", vn: 'Dạ vâng, dạ vâng, con tỉnh ngủ rồi đây ạ.', note: '' },
    ],
    vocab: [
      { en: 'Curtains', phonetic: '/ˈkɜːrtnz/', speaker: 'Mom', meaning: 'Rèm cửa', synonym: 'Drapes', collocation: 'Open the curtains', example: '"Open the curtains, please."', exampleVn: '"Mở rèm cửa ra con nhé."' },
      { en: 'Shining', phonetic: '/ˈʃaɪnɪŋ/', speaker: 'Mom', meaning: 'Tỏa sáng', synonym: 'Bright', collocation: 'Sun is shining', example: '"The sun is shining brightly."', exampleVn: '"Mặt trời đang tỏa sáng rực rỡ."' }
    ],
    quiz: [
      { q: 'Mẹ làm gì để đón ánh sáng?', opts: ['Open door','Open curtains','Turn on lights'], ans: 1, exp: 'Mẹ kéo rèm (open the curtains).' },
      { q: 'Bé nói gì khi tỉnh ngủ?', opts: ["I'm sleeping","I'm awake now","I'm hungry"], ans: 1, exp: 'Bé nói "I\'m awake now".' },
      { q: '"Shining" dùng để miêu tả cái gì?', opts: ['Mặt trăng','Mặt trời (Sun)','Ngôi sao'], ans: 1, exp: 'Mẹ nói "The sun is shining".' }
    ],
    dictation: [
      { text: 'open the curtains', hint: 'Mở rèm', hintVn: 'Kéo rèm cửa ra' },
      { text: 'sun is shining', hint: 'Nắng đang tỏa sáng', hintVn: 'Nắng chói chang' }
    ],
    shadowing: [
      { speaker: 'Mom', en: "Come on, let's open the curtains.", vn: 'Thôi nào, để mẹ kéo rèm ra nhé.' },
      { speaker: 'Child', en: "Okay, okay, I'm awake now.", vn: 'Dạ vâng, dạ vâng, con tỉnh ngủ rồi đây ạ.' }
    ]
  },

// ═══════════════════════════════════════════════════════
//  STATE & RENDER LOGIC
// ═══════════════════════════════════════════════════════
let currentDay = 0;
let fcIdx = {}, fcFlipped = {};
let quizState = {};
let dictState = {};
let doneDays = JSON.parse(localStorage.getItem('lani_t01_done') || '[]');
let currentView = 'day';

function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const isDone = doneDays.includes(i);
    const isActive = i === currentDay && currentView === 'day';
    const cls = isActive ? 'day-pill active' : isDone ? 'day-pill done' : 'day-pill';
    nav.innerHTML += `<button class="${cls}" onclick="openDay(${i})">
      <span class="day-pill-num">${i+1}</span>
      ${isDone && !isActive ? '<span class="day-pill-check">✓</span>' : ''}
    </button>`;
  });
  const fsActive = currentView === 'fullscript';
  nav.innerHTML += `<button class="fs-pill ${fsActive ? ' active' : ''}" onclick="openFullScript()">📜 Full Script</button>`;
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = '';
  DAYS.forEach((day, i) => { container.innerHTML += buildPanel(day, i); });
  container.innerHTML += buildFullScriptPanel();
  DAYS.forEach((_, i) => initDay(i));
}

function buildFullScriptPanel() {
  const lines = DAYS.map((day, i) => {
    const isDone = doneDays.includes(i);
    const dlHTML = day.dialogue.map(l => {
      const safeEn = l.en.replace(/'/g, "\\'");
      return `<div class="fs-line">
        <div class="fs-speaker">${l.speaker}</div>
        <div class="fs-en">${l.en}</div>
        <div class="fs-vn">${l.vn}</div>
        <div class="fs-line-btns">
          <button class="fs-speak-btn" onclick="speak('${safeEn}',0.9)">🔊 Nghe</button>
          <button class="fs-speak-btn" style="color:var(--sage-deep); border-color:var(--sage)" onclick="speak('${safeEn}',0.6)">🐢 Chậm</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="fs-day-block">
      <div class="fs-day-header" onclick="toggleFsDay(${i})">
        <div class="fs-day-num${isDone ? ' done-num' : ''}">${i+1}</div>
        <div class="fs-day-title">${day.title}</div>
        <div class="fs-chevron" id="fschev-${i}">›</div>
      </div>
      <div class="fs-dialogue" id="fsdlg-${i}">${dlHTML}</div>
    </div>`;
  }).join('');
  
  return `<div id="panel-fullscript">
    <div class="fullscript-hero">
      <div class="topic-eyebrow">📜 Full Script</div>
      <div class="fullscript-hero-title">Morning Routine — Toàn bộ kịch bản</div>
    </div>
    <div class="fullscript-content">${lines}<button class="fullscript-print-btn" onclick="window.print()">🖨️ In toàn bộ kịch bản</button></div>
  </div>`;
}

function buildPanel(day, i) {
  const dlHTML = day.dialogue.map(l => `<div class="dialogue-line"><strong>${l.speaker}:</strong> ${l.en}<div class="vn">${l.vn}</div></div>`).join('');
  return `<div class="day-panel${i === 0 ? ' active' : ''}" id="panel-${i}">
    <div class="day-header"><div class="day-num-label">Day ${i+1}</div><div class="day-title">${day.title}</div><div class="day-dialogue-preview">${dlHTML}</div></div>
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="switchMode(${i},'flashcard',this)">📇 Flashcard</button>
      <button class="mode-tab" onclick="switchMode(${i},'vocab',this)">📖 Từ vựng</button>
      <button class="mode-tab" onclick="switchMode(${i},'quiz',this)">❓ Quiz (3)</button>
      <button class="mode-tab" onclick="switchMode(${i},'dictation',this)">✍️ Dictation</button>
      <button class="mode-tab" onclick="switchMode(${i},'shadowing',this)">🎤 Shadowing</button>
    </div>
    
    <div class="mode-content active" id="mode-${i}-flashcard">
      <div class="fc-wrap"><div class="fc" id="fc-${i}" onclick="flipCard(${i})">
        <div class="fc-front"><div class="fc-en" id="fc-en-${i}"></div><div class="fc-speaker" id="fc-spk-${i}"></div><div class="fc-hint">👆 Bấm để xem nghĩa</div></div>
        <div class="fc-back"><div class="fc-vn" id="fc-vn-${i}"></div></div>
      </div></div>
      <div class="fc-nav"><button class="fc-btn" onclick="fcPrev(${i})">←</button><div class="fc-count" id="fc-count-${i}"></div><button class="fc-btn" onclick="fcNext(${i})">→</button></div>
      <div style="text-align:center;margin-top:18px;"><button class="speak-btn" onclick="speak(document.getElementById('fc-en-${i}').textContent)">🔊 Nghe</button></div>
    </div>

    <div class="mode-content" id="mode-${i}-vocab">${buildVocabHTML(day.vocab)}</div>
    <div class="mode-content" id="mode-${i}-quiz"><div id="quiz-body-${i}"></div></div>
    <div class="mode-content" id="mode-${i}-dictation"><div id="dict-body-${i}"></div></div>
    
    <div class="mode-content" id="mode-${i}-shadowing">
      ${buildShadowHTML(day.shadowing, i)}
      <div class="done-banner" id="done-${i}"><div class="done-banner-title">🌟 Tuyệt vời!</div><div class="done-banner-sub">Bạn đã hoàn thành Day ${i+1}.</div></div>
      <button class="finish-btn" onclick="finishDay(${i})">✅ Hoàn thành ngày học!</button>
    </div>
  </div>`;
}

function buildVocabHTML(vocab) {
  return vocab.map(v => `<div class="vocab-card">
    <div class="vocab-top"><div class="vocab-word">${v.en}</div><div class="vocab-phonetic">${v.phonetic}</div></div>
    <div class="vocab-body">
      <div class="vocab-meaning">${v.meaning}</div>
      ${v.synonym ? `<div class="vocab-row"><div class="vr-label">Synonym</div><div class="vr-val">${v.synonym}</div></div>` : ''}
      ${v.example ? `<div class="vocab-row"><div class="vr-label">Example</div><div class="vr-val" style="font-style:italic">${v.example}<div class="vr-vn">${v.exampleVn||''}</div></div></div>` : ''}
      <button class="speak-btn" onclick="speak('${v.en.replace(/'/g,"\\'")}')">🔊 Nghe</button>
    </div>
  </div>`).join('');
}

function buildShadowHTML(lines, i) {
  return lines.map((l, li) => {
    const id = `${i}-${li}`;
    const safeEn = l.en.replace(/'/g, "\\'");
    return `<div class="shadow-card">
      <div class="shadow-speaker">${l.speaker}</div><div class="shadow-en">${l.en}</div><div class="shadow-vn">${l.vn}</div>
      <div class="shadow-btns">
        <button class="shadow-btn" onclick="speak('${safeEn}', 0.6)">▶ Chậm</button>
        <button class="shadow-btn primary" onclick="speak('${safeEn}', 0.9)">▶ Bình thường</button>
      </div>
      <div class="rec-zone">
        <div class="rec-row">
          <button class="rec-btn" id="rec-${id}" onclick="toggleRecord('${id}','${safeEn}')">🎤</button>
          <div class="rec-label" id="label-${id}">Bấm mic để thu âm</div>
          <button class="playback-btn" id="playbk-${id}" onclick="playbackRec('${id}')">▶ Nghe lại giọng con</button>
        </div>
        <div class="score-badge" id="score-${id}"></div>
      </div>
    </div>`;
  }).join('');
}

function initDay(i) { fcIdx[i] = 0; updateFlashcard(i); renderQuiz(i); renderDict(i); }
function openDay(i) { currentDay = i; currentView = 'day'; document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active')); document.getElementById(`panel-${i}`).classList.add('active'); document.getElementById('panel-fullscript').classList.remove('active'); renderNav(); }
function openFullScript() { currentView = 'fullscript'; document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active')); document.getElementById('panel-fullscript').classList.add('active'); renderNav(); }
function toggleFsDay(i) { document.getElementById(`fsdlg-${i}`).classList.toggle('open'); const chev = document.getElementById(`fschev-${i}`); chev.style.transform = chev.style.transform === 'rotate(90deg)' ? 'rotate(0)' : 'rotate(90deg)'; }
function switchMode(d, m, btn) { const p = document.getElementById(`panel-${d}`); p.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); p.querySelectorAll('.mode-content').forEach(c=>c.classList.remove('active')); document.getElementById(`mode-${d}-${m}`).classList.add('active'); }

// Flashcard
function updateFlashcard(i) { const c = DAYS[i].dialogue[fcIdx[i]]; document.getElementById(`fc-en-${i}`).textContent = c.en; document.getElementById(`fc-spk-${i}`).textContent = c.speaker; document.getElementById(`fc-vn-${i}`).textContent = c.vn; document.getElementById(`fc-count-${i}`).textContent = `${fcIdx[i]+1}/${DAYS[i].dialogue.length}`; document.getElementById(`fc-${i}`).classList.remove('flipped'); }
function flipCard(i) { document.getElementById(`fc-${i}`).classList.toggle('flipped'); }
function fcNext(i) { if(fcIdx[i]<DAYS[i].dialogue.length-1){ fcIdx[i]++; updateFlashcard(i); } }
function fcPrev(i) { if(fcIdx[i]>0){ fcIdx[i]--; updateFlashcard(i); } }

// Quiz (3 câu)
function renderQuiz(i) { quizState[i] = { idx: 0 }; renderQuizQuestion(i); }
function renderQuizQuestion(i) {
  const state = quizState[i]; const qs = DAYS[i].quiz;
  if (state.idx >= qs.length) { document.getElementById(`quiz-body-${i}`).innerHTML = '<div class="done-banner show"><div class="done-banner-title">🎉 Hoàn thành Quiz!</div></div>'; return; }
  const q = qs[state.idx];
  document.getElementById(`quiz-body-${i}`).innerHTML = `<div class="quiz-q-card"><div class="quiz-q-num">Câu ${state.idx + 1} / ${qs.length}</div><div class="quiz-q-text">${q.q}</div></div>
    <div class="quiz-opts">${q.opts.map((o, oi) => `<button class="quiz-opt" id="opt-${i}-${oi}" onclick="selectQuiz(${i},${oi})">${o}</button>`).join('')}</div>
    <div class="quiz-fb" id="qfb-${i}"></div><button class="quiz-next" id="qnext-${i}" onclick="nextQuiz(${i})" disabled>Câu tiếp theo →</button>`;
}
function selectQuiz(i, chosen) {
  const state = quizState[i]; const q = DAYS[i].quiz[state.idx]; const opts = document.querySelectorAll(`#panel-${i} .quiz-opt`);
  opts.forEach(o => o.style.pointerEvents = 'none');
  opts[q.ans].classList.add('correct');
  const fb = document.getElementById(`qfb-${i}`);
  if (chosen === q.ans) { fb.textContent = '🎉 ' + q.exp; fb.className = 'quiz-fb ok show'; }
  else { opts[chosen].classList.add('wrong'); fb.textContent = '❌ ' + q.exp; fb.className = 'quiz-fb nope show'; }
  document.getElementById(`qnext-${i}`).disabled = false;
}
function nextQuiz(i) { quizState[i].idx++; renderQuizQuestion(i); }

// Dictation
function renderDict(i) { dictState[i] = { idx: 0 }; renderDictItem(i); }
function renderDictItem(i) {
  const state = dictState[i]; const items = DAYS[i].dictation;
  if (state.idx >= items.length) { document.getElementById(`dict-body-${i}`).innerHTML = '<div class="done-banner show"><div class="done-banner-title">✍️ Hoàn thành Dictation!</div></div>'; return; }
  const it = items[state.idx];
  document.getElementById(`dict-body-${i}`).innerHTML = `<div class="dict-card"><div class="dict-blanks">${it.text.replace(/[^\s]/g, '_')}</div><div class="dict-hint">${it.hint} (${it.hintVn})</div><button class="play-btn" id="dplay-${i}" onclick="playDict(${i})">▶</button>
    <input class="dict-input" id="dinput-${i}" type="text" placeholder="Gõ từ nghe được..." oninput="checkDict(${i})"></div><div class="quiz-fb" id="dfb-${i}"></div><button class="quiz-next" id="dnext-${i}" onclick="nextDict(${i})" disabled>Từ tiếp theo →</button>`;
}
function playDict(i) { speak(DAYS[i].dictation[dictState[i].idx].text, 0.75); document.getElementById(`dplay-${i}`).classList.add('playing'); setTimeout(()=>document.getElementById(`dplay-${i}`).classList.remove('playing'), 1000); }
function checkDict(i) {
  if (document.getElementById(`dinput-${i}`).value.trim().toLowerCase() === DAYS[i].dictation[dictState[i].idx].text.toLowerCase()) {
    document.getElementById(`dinput-${i}`).classList.add('correct'); document.getElementById(`dfb-${i}`).textContent = '🎉 Chính xác!'; document.getElementById(`dfb-${i}`).className = 'quiz-fb ok show'; document.getElementById(`dnext-${i}`).disabled = false;
  }
}
function nextDict(i) { dictState[i].idx++; renderDictItem(i); }

function finishDay(i) { if (!doneDays.includes(i)) { doneDays.push(i); localStorage.setItem('lani_t01_done', JSON.stringify(doneDays)); } document.getElementById(`done-${i}`).classList.add('show'); renderNav(); }

// Audio & Web Speech API (Shadowing)
let _selectedVoice = null;
function getVoice() {
  if (_selectedVoice) return _selectedVoice;
  const voices = speechSynthesis.getVoices();
  const priority = ['Google US English', 'Microsoft Aria', 'Samantha', 'Google UK English Female'];
  for (let name of priority) { const v = voices.find(v => v.name.includes(name)); if (v) { _selectedVoice = v; return v; } }
  return voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female')) || voices[0];
}
if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = () => { _selectedVoice = null; getVoice(); };

function speak(text, rate = 0.85) {
  speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = rate; u.pitch = 1.1; u.voice = getVoice(); speechSynthesis.speak(u);
}

const recState = {};
async function toggleRecord(id, targetText) {
  const btn = document.getElementById(`rec-${id}`);
  const label = document.getElementById(`label-${id}`);
  const badge = document.getElementById(`score-${id}`);
  const pbk = document.getElementById(`playbk-${id}`);

  if (recState[id]?.active) {
    recState[id].mediaRecorder.stop();
    if(recState[id].recognition) recState[id].recognition.stop();
    recState[id].active = false;
    btn.classList.remove('recording');
    label.innerHTML = "Đang chấm điểm...";
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream); const chunks = [];
      mr.ondataavailable = e => chunks.push(e.data);
      mr.onstop = () => { recState[id].blob = new Blob(chunks, { type: 'audio/webm' }); pbk.classList.add('show'); };
      
      let recognition = null;
      if(window.SpeechRecognition || window.webkitSpeechRecognition) {
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US'; recognition.interimResults = false;
        recognition.onresult = (e) => {
          const resultText = e.results[0][0].transcript.toLowerCase().replace(/[.,?]/g,"");
          const target = targetText.toLowerCase().replace(/[.,?]/g,"");
          const targetWords = target.split(' '); const resultWords = resultText.split(' ');
          let matches = 0; targetWords.forEach(w => { if(resultWords.includes(w)) matches++; });
          const score = Math.round((matches / targetWords.length) * 100);
          
          badge.className = 'score-badge show ' + (score > 80 ? 'excellent' : score > 50 ? 'good' : 'retry');
          badge.innerHTML = `<strong>${score}% Chính xác</strong><div class="score-bar-wrap"><div class="score-bar ${score > 80 ? 'excellent' : 'good'}" style="width:${score}%"></div></div><div style="font-size:12px; margin-top:5px">Học viên đọc: <i>"${resultText}"</i></div>`;
          label.innerHTML = "Đã xong! Bấm mic để thử lại";
        };
        recognition.onerror = () => { label.innerHTML = "Không nhận diện được giọng nói."; };
      }
      
      mr.start(); if(recognition) recognition.start();
      recState[id] = { active: true, mediaRecorder: mr, recognition };
      btn.classList.add('recording'); label.innerHTML = "Đang thu âm... Bấm lại để dừng"; badge.classList.remove('show');
    } catch(e) { alert('Bạn cần cấp quyền truy cập micro cho trình duyệt nhé!'); }
  }
}
function playbackRec(id) { if (recState[id]?.blob) new Audio(URL.createObjectURL(recState[id].blob)).play(); }

renderPanels(); renderNav();
</script>
