<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 01 – Morning Routine · Lani Be A Gift</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF7F0; --warm-white: #FFFCF7; --blush: #F5E6D8; --rose: #E8C4A8;
    --terracotta: #C9764A; --terra-deep: #A0552E;
    --sage: #7A9E87; --sage-light: #C8DDD0; --sage-deep: #4A7259;
    --sky: #8BB8D4; --sky-light: #D4E8F3;
    --lavender: #C4B5D4; --lavender-light: #EDE8F5;
    --sunny: #F2C94C; --sunny-light: #FBF0C4;
    --coral: #E8856A; --coral-light: #FAD8CF;
    --ink: #2C2416; --ink-soft: #5C4E3A; --ink-muted: #8C7E6A;
    --border: rgba(44,36,22,0.12);
    --radius: 16px; --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; }
  header { background:var(--warm-white); border-bottom:1px solid var(--border); padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { font-family:'Playfair Display',serif; font-size:18px; color:var(--terracotta); }
  .logo span { font-style:italic; }
  .home-btn { padding:6px 14px; border-radius:8px; border:1px solid var(--border); font-size:12px; color:var(--ink-muted); background:none; cursor:pointer; text-decoration:none; display:flex; align-items:center; gap:5px; }
  .home-btn:hover { background:var(--blush); }
  .topic-hero { background:var(--warm-white); padding:28px 20px 20px; border-bottom:1px solid var(--border); }
  .topic-eyebrow { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--terracotta); margin-bottom:6px; }
  .topic-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--ink); margin-bottom:4px; }
  .topic-vn { font-size:13px; color:var(--ink-muted); }
  .days-nav { display:flex; gap:8px; padding:16px 20px; overflow-x:auto; background:var(--warm-white); border-bottom:1px solid var(--border); scrollbar-width:none; }
  .days-nav::-webkit-scrollbar { display:none; }
  .day-pill { flex-shrink:0; width:44px; height:44px; border-radius:50%; border:1px solid var(--border); background:var(--warm-white); font-size:13px; font-weight:500; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--ink-muted); }
  .day-pill.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }
  .day-pill.done { background:var(--sage-light); color:var(--sage-deep); border-color:var(--sage); }
  .day-panel { display:none; }
  .day-panel.active { display:block; }
  .day-header { padding:20px 20px 16px; background:var(--warm-white); border-bottom:1px solid var(--border); }
  .day-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--ink); margin-bottom:6px; }
  .day-dialogue-preview { display:flex; flex-direction:column; gap:6px; padding:14px 16px; background:var(--blush); border-radius:var(--radius-sm); margin-top:10px; }
  .dialogue-line { font-size:13px; line-height:1.5; }
  .dialogue-line strong { color:var(--terracotta); }
  .mode-tabs { display:flex; gap:6px; padding:14px 20px; overflow-x:auto; background:var(--warm-white); border-bottom:1px solid var(--border); scrollbar-width:none; }
  .mode-tab { flex-shrink:0; padding:7px 14px; border-radius:99px; border:1px solid var(--border); font-size:12px; cursor:pointer; background:var(--warm-white); color:var(--ink-soft); }
  .mode-tab.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }
  .mode-content { padding:20px; display:none; }
  .mode-content.active { display:block; }
  .fc-wrap { perspective:1000px; height:240px; margin-bottom:20px; }
  .fc { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.5s; cursor:pointer; }
  .fc.flipped { transform:rotateY(180deg); }
  .fc-front, .fc-back { position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; }
  .fc-front { background:var(--warm-white); border:1px solid var(--border); }
  .fc-back { background:var(--terracotta); transform:rotateY(180deg); }
  .fc-en { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); }
  .fc-vn { font-family:'Playfair Display',serif; font-size:20px; color:white; }
  .fc-nav { display:flex; align-items:center; justify-content:center; gap:16px; }
  .fc-btn { width:42px; height:42px; border-radius:50%; border:1px solid var(--border); background:var(--warm-white); cursor:pointer; }
  .vocab-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:14px; padding:18px; }
  .vocab-word { font-family:'Playfair Display',serif; font-size:20px; color:var(--ink); }
  .quiz-q-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:22px 20px; margin-bottom:16px; }
  .quiz-opt { width:100%; padding:13px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--warm-white); cursor:pointer; margin-bottom:8px; text-align:left; }
  .quiz-opt.correct { background:var(--sage-light); border-color:var(--sage); color:var(--sage-deep); }
  .quiz-opt.wrong { background:var(--coral-light); border-color:var(--coral); }
  .dict-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; text-align:center; }
  .dict-input { width:100%; padding:13px 16px; border-radius:var(--radius-sm); border:1.5px solid var(--border); text-align:center; outline:none; margin-top:15px; }
  .shadow-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:12px; }
  .shadow-en { font-family:'Playfair Display',serif; font-size:18px; color:var(--ink); }
  .shadow-btn { padding:9px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); cursor:pointer; font-size:12px; }
  .shadow-btn.primary { background:var(--terracotta); color:white; }
  .rec-btn { width:44px; height:44px; border-radius:50%; border:none; background:var(--blush); color:var(--terracotta); cursor:pointer; }
  .rec-btn.recording { background:var(--coral); color:white; animation: pulse 1s infinite; }
  @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(232,133,106,0.7);} 70% {box-shadow: 0 0 0 10px rgba(232,133,106,0);} 100% {box-shadow: 0 0 0 0 rgba(232,133,106,0);} }
  .finish-btn { width:100%; padding:14px; border-radius:99px; border:none; background:var(--terracotta); color:white; cursor:pointer; }
  #panel-fullscript { display:none; padding:20px; }
  #panel-fullscript.active { display:block; }
  .fs-day-block { background:white; border:1px solid var(--border); border-radius:12px; margin-bottom:10px; padding:15px; }
</style>
</head>
<body>

<header>
  <div class="logo"><span>Lani</span> · Be A Gift</div>
  <a class="home-btn" href="#">← Trang chủ</a>
</header>

<div class="topic-hero">
  <div class="topic-eyebrow">Topic 01 · 10 ngày</div>
  <div class="topic-title">☀️ Morning <em>Routine</em></div>
  <div class="topic-vn">Chào ngày mới năng lượng</div>
</div>

<div class="days-nav" id="daysNav"></div>

<div id="panels"></div>

<script>
const DAYS = [
  {
    title: 'Đánh thức sâu ngủ',
    dialogue: [
      { speaker: 'Mom', en: "Wakey wakey, sleepyhead! It's time to get up.", vn: 'Dậy thôi, dậy thôi nào sâu ngủ ơi! Đến giờ thức dậy rồi.', note: '' },
      { speaker: 'Child', en: 'Good morning, Mommy... Just five more minutes?', vn: 'Chào buổi sáng mẹ yêu... Cho con nằm thêm 5 phút nữa thôi được không ạ?', note: 'Bé ngáp và vươn vai' },
    ],
    vocab: [
      { en: 'Sleepyhead', phonetic: '/ˈsliːpihed/', meaning: 'Sâu ngủ (cách gọi trêu đùa bé lười dậy)', example: 'Wake up, sleepyhead!', exampleVn: 'Dậy đi đồ sâu ngủ!' },
      { en: 'Five more minutes', phonetic: '/faɪv mɔːr ˈmɪnɪts/', meaning: '5 phút nữa thôi', example: 'Just five more minutes, please.', exampleVn: 'Chỉ 5 phút nữa thôi ạ.' }
    ],
    quiz: [{ q: 'Bé gọi mẹ là gì?', opts: ['Teacher','Mommy','Sister'], ans: 1, exp: 'Bé gọi là "Mommy" (mẹ yêu).' }],
    dictation: [{ text: 'Wakey wakey', hint: 'Dậy thôi nào', hintVn: 'Dậy thôi nào' }],
    shadowing: [{ speaker: 'Mom', en: "Wakey wakey, sleepyhead!", vn: 'Dậy thôi nào sâu ngủ ơi!' }]
  },
  {
    title: 'Ánh nắng rực rỡ',
    dialogue: [
      { speaker: 'Mom', en: "Come on, let's open the curtains. Look! The sun is shining.", vn: 'Thôi nào, để mẹ kéo rèm ra nhé. Nhìn kìa! Nắng đang tỏa sáng rực rỡ luôn.', note: '' },
      { speaker: 'Child', en: "Okay, okay, I'm awake now.", vn: 'Dạ vâng, dạ vâng, con tỉnh ngủ rồi đây ạ.', note: '' },
    ],
    vocab: [
      { en: 'Curtains', phonetic: '/ˈkɜːrtnz/', meaning: 'Rèm cửa', example: 'Open the curtains.', exampleVn: 'Mở rèm cửa ra.' },
      { en: 'Shining', phonetic: '/ˈʃaɪnɪŋ/', meaning: 'Tỏa sáng rực rỡ' }
    ],
    quiz: [{ q: 'Mẹ làm gì để con thấy nắng?', opts: ['Open the door','Open the curtains','Turn on lights'], ans: 1, exp: 'Mẹ mở rèm (open the curtains) để đón nắng.' }],
    dictation: [{ text: 'The sun is shining', hint: 'Nắng đang tỏa sáng', hintVn: 'Nắng đang tỏa sáng' }],
    shadowing: [{ speaker: 'Mom', en: "Look! The sun is shining.", vn: 'Nhìn kìa! Nắng đang tỏa sáng rực rỡ luôn.' }]
  },
  {
    title: 'Rửa mặt tỉnh táo',
    dialogue: [
      { speaker: 'Mom', en: 'Good! Now go wash your face and freshen up.', vn: 'Ngoan lắm! Giờ con đi rửa mặt cho tỉnh táo đi nào.', note: '' },
      { speaker: 'Child', en: 'Done! The water is so refreshing.', vn: 'Xong rồi ạ! Nước mát sảng khoái quá mẹ ơi.', note: '' },
    ],
    vocab: [
      { en: 'Freshen up', phonetic: '/ˈfreʃn ʌp/', meaning: 'Làm cho tỉnh táo/tươi tỉnh', example: 'I need to freshen up.', exampleVn: 'Con cần đi rửa mặt cho tỉnh táo.' },
      { en: 'Refreshing', phonetic: '/rɪˈfreʃɪŋ/', meaning: 'Sảng khoái/mát mẻ' }
    ],
    quiz: [{ q: 'Bé thấy nước như thế nào?', opts: ['Hot','Refreshing','Dirty'], ans: 1, exp: 'Nước mát sảng khoái (refreshing).' }],
    dictation: [{ text: 'wash your face', hint: 'Rửa mặt', hintVn: 'Rửa mặt' }],
    shadowing: [{ speaker: 'Child', en: 'The water is so refreshing.', vn: 'Nước mát sảng khoái quá mẹ ơi.' }]
  },
  {
    title: 'Đánh răng sạch tinh',
    dialogue: [
      { speaker: 'Mom', en: "Don't forget to brush your teeth too.", vn: 'Đừng quên đánh răng nữa nhé con.', note: '' },
      { speaker: 'Child', en: 'Brush, brush, brush! My mouth feels so clean!', vn: 'Chà, chà, chà! Miệng con sạch tinh luôn rồi này!', note: '' },
    ],
    vocab: [
      { en: 'Brush your teeth', phonetic: '/brʌʃ jɔːr tiːθ/', meaning: 'Đánh răng' },
      { en: 'Clean', phonetic: '/kliːn/', meaning: 'Sạch sẽ/Sạch tinh' }
    ],
    quiz: [{ q: 'Hành động "brush" là gì?', opts: ['Rửa mặt','Đánh răng','Uống nước'], ans: 1, exp: 'Brush teeth nghĩa là đánh răng.' }],
    dictation: [{ text: 'brush your teeth', hint: 'Đánh răng', hintVn: 'Đánh răng' }],
    shadowing: [{ speaker: 'Child', en: 'My mouth feels so clean!', vn: 'Miệng con sạch tinh luôn rồi!' }]
  },
  {
    title: 'Ấm bụng đầu ngày',
    dialogue: [
      { speaker: 'Mom', en: 'Here, drink some warm water.', vn: 'Đây, con uống chút nước ấm đi.', note: '' },
      { speaker: 'Child', en: 'Thanks, Mom. It warms my tummy.', vn: 'Con cảm ơn mẹ. Nước làm ấm bụng con quá.', note: '' },
    ],
    vocab: [
      { en: 'Warm water', phonetic: '/wɔːrm ˈwɔːtər/', meaning: 'Nước ấm' },
      { en: 'Tummy', phonetic: '/ˈtʌmi/', meaning: 'Cái bụng (cách gọi dễ thương cho bé)' }
    ],
    quiz: [{ q: 'Nước ấm làm phần nào của bé thấy ấm?', opts: ['Hands','Tummy','Head'], ans: 1, exp: 'Nước làm ấm bụng (tummy).' }],
    dictation: [{ text: 'warm water', hint: 'Nước ấm', hintVn: 'Nước ấm' }],
    shadowing: [{ speaker: 'Child', en: 'It warms my tummy.', vn: 'Nước làm ấm bụng con quá.' }]
  },
  {
    title: 'Phút giây tĩnh lặng',
    dialogue: [
      { speaker: 'Mom', en: "Come sit next to me for a minute. Let's sit quietly.", vn: 'Lại đây ngồi cạnh mẹ một lát. Hai mẹ con mình cùng ngồi tĩnh lặng nhé.', note: '' },
      { speaker: 'Child', en: 'Like this? Should I close my eyes?', vn: 'Như thế này ạ? Con có nên nhắm mắt lại không mẹ?', note: '' },
    ],
    vocab: [
      { en: 'Quietly', phonetic: '/ˈkwaɪətli/', meaning: 'Tĩnh lặng/Một cách yên lặng' },
      { en: 'Close my eyes', phonetic: '/kləʊz maɪ aɪz/', meaning: 'Nhắm mắt con lại' }
    ],
    quiz: [{ q: 'Mẹ bảo bé ngồi thế nào?', opts: ['Noisily','Quietly','Fast'], ans: 1, exp: 'Mẹ bảo ngồi tĩnh lặng (quietly).' }],
    dictation: [{ text: 'sit quietly', hint: 'Ngồi tĩnh lặng', hintVn: 'Ngồi tĩnh lặng' }],
    shadowing: [{ speaker: 'Mom', en: "Let's sit quietly.", vn: 'Hai mẹ con mình cùng ngồi tĩnh lặng nhé.' }]
  },
  {
    title: 'Quan sát hơi thở',
    dialogue: [
      { speaker: 'Mom', en: 'Exactly. Close your eyes and observe your breath.', vn: 'Chính xác rồi. Con nhắm mắt lại và quan sát hơi thở của mình nhé.', note: '' },
      { speaker: 'Child', en: 'Just observe it? Like a game?', vn: 'Chỉ quan sát thôi hả mẹ? Giống như một trò chơi ấy nhỉ?', note: '' },
    ],
    vocab: [
      { en: 'Observe', phonetic: '/əbˈzɜːrv/', meaning: 'Quan sát/Theo dõi' },
      { en: 'Breath', phonetic: '/breθ/', meaning: 'Hơi thở' }
    ],
    quiz: [{ q: 'Bé so sánh việc quan sát hơi thở với gì?', opts: ['A story','A game','A song'], ans: 1, exp: 'Bé thấy giống một trò chơi (a game).' }],
    dictation: [{ text: 'observe your breath', hint: 'Quan sát hơi thở', hintVn: 'Quan sát hơi thở' }],
    shadowing: [{ speaker: 'Mom', en: 'Observe your breath.', vn: 'Quan sát hơi thở của mình nhé.' }]
  },
  {
    title: 'Hơi thở tự nhiên',
    dialogue: [
      { speaker: 'Mom', en: 'Yes! Feel your natural breath. You don\'t need to control it.', vn: 'Đúng rồi! Cảm nhận hơi thở tự nhiên của con. Con không cần phải điều khiển nó đâu.', note: '' },
      { speaker: 'Child', en: 'I feel it going in and out.', vn: 'Con cảm thấy hơi thở đang đi vào và đi ra rồi ạ.', note: '' },
    ],
    vocab: [
      { en: 'Natural', phonetic: '/ˈnætʃrəl/', meaning: 'Tự nhiên' },
      { en: 'Control', phonetic: '/kənˈtrəʊl/', meaning: 'Điều khiển/Kiểm soát' }
    ],
    quiz: [{ q: 'Hơi thở đi như thế nào?', opts: ['Up and down','In and out','Left and right'], ans: 1, exp: 'Hơi thở đi vào (in) và đi ra (out).' }],
    dictation: [{ text: 'natural breath', hint: 'Hơi thở tự nhiên', hintVn: 'Hơi thở tự nhiên' }],
    shadowing: [{ speaker: 'Mom', en: 'Feel your natural breath.', vn: 'Cảm nhận hơi thở tự nhiên của con.' }]
  },
  {
    title: 'Cảm nhận sự bình yên',
    dialogue: [
      { speaker: 'Mom', en: 'Just observe it. How do you feel?', vn: 'Cứ quan sát hơi thở thôi. Con cảm thấy thế nào?', note: '' },
      { speaker: 'Child', en: 'I feel so peaceful, Mommy.', vn: 'Con cảm thấy thật bình yên, mẹ ạ.', note: '' },
    ],
    vocab: [
      { en: 'Peaceful', phonetic: '/ˈpiːsfl/', meaning: 'Bình yên/Yên bình' }
    ],
    quiz: [{ q: '"Peaceful" nghĩa là gì?', opts: ['Buồn','Vui','Bình yên'], ans: 2, exp: 'Peaceful là cảm giác bình yên sau khi ngồi tĩnh lặng.' }],
    dictation: [{ text: 'I feel so peaceful', hint: 'Con thấy thật bình yên', hintVn: 'Con thấy thật bình yên' }],
    shadowing: [{ speaker: 'Child', en: 'I feel so peaceful, Mommy.', vn: 'Con cảm thấy thật bình yên, mẹ ạ.' }]
  },
  {
    title: 'Ra tủ đồ thôi!',
    dialogue: [
      { speaker: 'Mom', en: "Wonderful! Now, let's get changed out of those pajamas.", vn: 'Tuyệt vời quá! Giờ thì mình thay bộ đồ ngủ này ra thôi nào.', note: '' },
      { speaker: 'Child', en: "Can I pick my clothes today? Let's go to the closet!", vn: 'Hôm nay con tự chọn quần áo được không mẹ? Mình cùng ra tủ đồ đi!', note: '' },
    ],
    vocab: [
      { en: 'Pajamas', phonetic: '/pəˈdʒɑːməz/', meaning: 'Bộ đồ ngủ' },
      { en: 'Closet', phonetic: '/ˈklɒzɪt/', meaning: 'Tủ quần áo/Tủ đồ' }
    ],
    quiz: [{ q: 'Con muốn đi đâu để chọn đồ?', opts: ['Kitchen','Closet','Garden'], ans: 1, exp: 'Bé muốn ra tủ đồ (closet).' }],
    dictation: [{ text: 'Let\'s go to the closet', hint: 'Ra tủ đồ thôi', hintVn: 'Ra tủ đồ thôi' }],
    shadowing: [{ speaker: 'Child', en: "Let's go to the closet!", vn: 'Mình cùng ra tủ đồ đi!' }]
  },
];

let currentDay = 0;
let doneDays = JSON.parse(localStorage.getItem('lani_t01_done') || '[]');
let currentView = 'day';

function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const isActive = i === currentDay && currentView === 'day';
    const isDone = doneDays.includes(i);
    const cls = `day-pill ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`;
    nav.innerHTML += `<button class="${cls}" onclick="openDay(${i})">${i+1}</button>`;
  });
  nav.innerHTML += `<button class="mode-tab ${currentView==='full'?'active':''}" onclick="openFull()">Full Script</button>`;
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = '';
  DAYS.forEach((day, i) => {
    container.innerHTML += `<div class="day-panel ${i===0?'active':''}" id="panel-${i}">
      <div class="day-header"><div class="day-title">${day.title}</div><div class="day-dialogue-preview">
        ${day.dialogue.map(l=>`<div class="dialogue-line"><strong>${l.speaker}:</strong> ${l.en}<div>${l.vn}</div></div>`).join('')}
      </div></div>
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="switchMode(${i},'fc',this)">Flashcard</button>
        <button class="mode-tab" onclick="switchMode(${i},'vocab',this)">Từ vựng</button>
        <button class="mode-tab" onclick="switchMode(${i},'quiz',this)">Quiz</button>
        <button class="mode-tab" onclick="switchMode(${i},'shadow',this)">Shadowing</button>
      </div>
      <div class="mode-content active" id="mode-${i}-fc">
        <div class="fc-wrap"><div class="fc" onclick="this.classList.toggle('flipped')">
          <div class="fc-front"><div class="fc-en">${day.dialogue[0].en}</div></div>
          <div class="fc-back"><div class="fc-vn">${day.dialogue[0].vn}</div></div>
        </div></div>
      </div>
      <div class="mode-content" id="mode-${i}-vocab">
        ${day.vocab.map(v=>`<div class="vocab-card"><div class="vocab-word">${v.en} ${v.phonetic}</div><div>${v.meaning}</div><div style="font-style:italic">${v.example}</div></div>`).join('')}
      </div>
      <div class="mode-content" id="mode-${i}-quiz">
        <div class="quiz-q-card">${day.quiz[0].q}</div>
        ${day.quiz[0].opts.map((o,oi)=>`<button class="quiz-opt" id="opt-${i}-${oi}" onclick="checkQuiz(${i},${oi})">${o}</button>`).join('')}
        <div id="quiz-fb-${i}" style="margin-top:10px; display:none;"></div>
      </div>
      <div class="mode-content" id="mode-${i}-shadow">
        ${day.shadowing.map(s=>`<div class="shadow-card"><div class="shadow-en">${s.en}</div><div>${s.vn}</div><button class="shadow-btn primary" onclick="speak('${s.en.replace(/'/g,"\\'")}')">🔊 Nghe</button></div>`).join('')}
        <button class="finish-btn" style="margin-top:20px;" onclick="finishDay(${i})">✅ Xong bài học!</button>
      </div>
    </div>`;
  });
  
  let fullHTML = `<div id="panel-fullscript"><h3>📜 Toàn bộ kịch bản</h3>`;
  DAYS.forEach(d => {
    fullHTML += `<div class="fs-day-block"><strong>${d.title}</strong><br>${d.dialogue.map(l=>`${l.speaker}: ${l.en}`).join('<br>')}</div>`;
  });
  fullHTML += `</div>`;
  container.innerHTML += fullHTML;
}

function openDay(i) { currentDay = i; currentView = 'day'; document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active')); document.getElementById(`panel-${i}`).classList.add('active'); document.getElementById('panel-fullscript').classList.remove('active'); renderNav(); }
function openFull() { currentView = 'full'; document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active')); document.getElementById('panel-fullscript').classList.add('active'); renderNav(); }
function switchMode(d, m, b) { const p = document.getElementById(`panel-${d}`); p.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active')); b.classList.add('active'); p.querySelectorAll('.mode-content').forEach(c=>c.classList.remove('active')); p.querySelector(`#mode-${d}-${m}`).classList.add('active'); }
function checkQuiz(d, o) { const q = DAYS[d].quiz[0]; const fb = document.getElementById(`quiz-fb-${d}`); fb.style.display = 'block'; fb.textContent = q.exp; if(o === q.ans) document.getElementById(`opt-${d}-${o}`).classList.add('correct'); else document.getElementById(`opt-${d}-${o}`).classList.add('wrong'); }
function finishDay(i) { if(!doneDays.includes(i)) doneDays.push(i); localStorage.setItem('lani_t01_done', JSON.stringify(doneDays)); renderNav(); }
function speak(t) { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; speechSynthesis.speak(u); }

renderNav(); renderPanels();
</script>
</body>
</html>
