auth.onAuthStateChanged(async (user) => {

  } else {

    // 2. Nếu tải được dữ liệu, render giao diện. Nếu không, báo lỗi.

async function fetchLessonData() {
  try {
    // Đã cập nhật lại đúng Collection và Document theo ảnh bạn cung cấp
    const docRef = db.collection("topics").doc("topic01");
    const docSnap = await docRef.get();

    if (docSnap.exists) {
      const data = docSnap.data();
      DAYS = data.days || []; 
    } else {
      console.error("Không tìm thấy dữ liệu (Document 'topic01' không tồn tại trong collection 'topics').");
    }
  } catch (error) {
    console.error("Lỗi tải dữ liệu bài học:", error);
  }
}
 
async function fetchProgress() {
  try {
    const doc = await db.collection("users").doc(currentUser.uid).get();
    if (doc.exists) {
      userProgress = doc.data();
      const daysCompleted = userProgress.progress[0] || 0;
      for(let i=0; i < daysCompleted; i++) {
        doneDays.push(i);
      }
    }
    renderPanels();
    renderNav();
  } catch (error) {
    console.error("Lỗi tải tiến độ:", error);
  }
}

async function finishDay(i, btnElement) {
  if(btnElement) btnElement.style.display = 'none';
  if (!doneDays.includes(i)) doneDays.push(i);
  
  document.getElementById(`done-${i}`).classList.add('show');
  renderNav();
  document.getElementById(`done-${i}`).scrollIntoView({ behavior: 'smooth' });
 
  if (!currentUser) return;
  
  const currentGlobalDay = i + 1; 
  const savedProgress = userProgress.progress[0] || 0;
  if (currentGlobalDay > savedProgress) {
    userProgress.progress[0] = currentGlobalDay;
  }
 
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayTime = today.getTime();
  const lastActiveTime = userProgress.lastActiveTime || 0;
  const oneDay = 24 * 60 * 60 * 1000;
 
  if (lastActiveTime === 0) {
    userProgress.streak = 1;
    userProgress.lastActiveTime = todayTime;
  } else {
    const diffDays = Math.round((todayTime - lastActiveTime) / oneDay);
    if (diffDays === 1) {
      userProgress.streak = (userProgress.streak || 0) + 1;
      userProgress.lastActiveTime = todayTime;
    } else if (diffDays > 1) {
      userProgress.streak = 1; 
      userProgress.lastActiveTime = todayTime;
    }
  }
  await db.collection("users").doc(currentUser.uid).set(userProgress, { merge: true });
}
 
function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const globalDay = TOPIC.startDay + i;
    const isDone = doneDays.includes(i);
    const isActive = i === currentDay && currentView === 'day';
    const cls = isActive ? 'day-pill active' : isDone ? 'day-pill done' : 'day-pill';
    nav.innerHTML += `<button class="${cls}" onclick="openDay(${i})">
      <span class="day-pill-num">${globalDay}</span>
      ${isDone && !isActive ? '<span class="day-pill-check">✓</span>' : ''}
    </button>`;
  });
  const fsActive = currentView === 'fullscript';
  nav.innerHTML += `<button class="fs-pill${fsActive ? ' active' : ''}" onclick="openFullScript()">📜 Full Script</button>`;
}

function selectQuiz(i, chosen) {

}

let _selectedVoice = null;
const VOICE_PRIORITY = ['Google US English', 'Google UK English Female', 'Microsoft Aria Online (Natural) - English (United States)', 'Samantha', 'Karen', 'Google العربية'];
function pickVoice() {
  if (_selectedVoice) return _selectedVoice;
  const voices = speechSynthesis.getVoices(); if (!voices.length) return null;
  for (const name of VOICE_PRIORITY) { const v = voices.find(v => v.name === name); if (v) { _selectedVoice = v; return v; } }
  const googleFemale = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('google') && !v.name.toLowerCase().includes('male'));
  if (googleFemale) { _selectedVoice = googleFemale; return googleFemale; }
  const onlineFemale = voices.find(v => v.lang === 'en-US' && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('online')));
  if (onlineFemale) { _selectedVoice = onlineFemale; return onlineFemale; }
  const anyUS = voices.find(v => v.lang === 'en-US');
  if (anyUS) { _selectedVoice = anyUS; return anyUS; }
  return null;
}
if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = () => { _selectedVoice = null; pickVoice(); }; }
function speak(text, rate = 0.85) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate; u.pitch = 1.0;
  const voice = pickVoice(); if (voice) u.voice = voice;
  speechSynthesis.speak(u);
}
 
const recState = {};
function toggleRecord(id, targetText) { if (recState[id]?.active) stopRecord(id, targetText); else startRecord(id, targetText); }
async function startRecord(id, targetText) {
  const btn = document.getElementById(`${id}-recbtn`); const label = document.getElementById(`${id}-reclabel`);
  const score = document.getElementById(`${id}-score`); const pbk = document.getElementById(`${id}-playbk`);
  score.className = 'score-badge'; pbk.className = 'playback-btn';
 
  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch(e) { label.innerHTML = '<strong style="color:var(--coral)">Không thể mở micro.</strong> Hãy cho phép trình duyệt truy cập micro.'; return; }
 
  const mr = new MediaRecorder(stream); const chunks = [];
  mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mr.onstop = () => { recState[id].blob = new Blob(chunks, { type: 'audio/webm' }); stream.getTracks().forEach(t => t.stop()); pbk.className = 'playback-btn show'; };
  mr.start();
 
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    const rec = new SR(); rec.lang = 'en-US'; rec.continuous = false; rec.interimResults = false; rec.maxAlternatives = 3;
    rec.onresult = e => {
      const alts = []; for (let i = 0; i < e.results[0].length; i++) alts.push(e.results[0][i].transcript.toLowerCase().trim());
      recState[id].recognized = alts;
    };
    rec.onerror = () => { recState[id].recognized = []; };
    rec.start();
    recState[id] = { ...recState[id], recognition: rec };
  }
 
  recState[id] = { ...recState[id], mediaRecorder: mr, chunks, active: true, blob: null, recognized: [] };
  btn.classList.add('recording'); btn.textContent = '⏹';
  label.innerHTML = '<strong style="color:var(--coral)">Đang thu âm...</strong> Bấm ⏹để dừng';
}
function stopRecord(id, targetText) {
  const state = recState[id]; if (!state?.active) return;
  const btn = document.getElementById(`${id}-recbtn`); const label = document.getElementById(`${id}-reclabel`);
  state.mediaRecorder.stop(); try { state.recognition?.stop(); } catch(e) {}
  state.active = false; btn.classList.remove('recording'); btn.textContent = '🎤';
  label.innerHTML = '<strong>Đang chấm điểm...</strong>';
  setTimeout(() => scoreProunciation(id, targetText), 900);
}
function scoreProunciation(id, targetText) {
  const label = document.getElementById(`${id}-reclabel`); const badge = document.getElementById(`${id}-score`);
  const alts = recState[id]?.recognized || []; const tWords = targetText.toLowerCase().replace(/[^\w\s']/g, '').trim().split(/\s+/);
 
  if (!alts.length) { renderScore(badge, label, 0, tWords, []); return; }
  let bestScore = 0, bestMatch = [];
  alts.forEach(alt => {
    const aWords = alt.replace(/[^\w\s']/g, '').split(/\s+/);
    const { score, matches } = wordMatchScore(tWords, aWords);
    if (score > bestScore) { bestScore = score; bestMatch = matches; }
  });
  renderScore(badge, label, bestScore, tWords, bestMatch);
}
function wordMatchScore(tWords, aWords) {
  const matches = tWords.map(tw => {
    const twn = norm(tw);
    if (aWords.some(sw => norm(sw) === twn)) return { word: tw, hit: true };
    const fuzzy = aWords.some(sw => twn.length >= 4 ? lev(twn, norm(sw)) <= 1 : norm(sw) === twn);
    return { word: tw, hit: fuzzy };
  });
  return { score: Math.round(matches.filter(m => m.hit).length / tWords.length * 100), matches };
}
function norm(w) { return w.toLowerCase().replace(/[^a-z']/g, ''); }
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function renderScore(badge, label, score, tWords, matches) {
  let tier, emoji, msg, tip;
  if (score >= 90)      { tier='excellent'; emoji='🌟'; msg=`Xuất sắc! Phát âm chuẩn (${score}%)!`; tip='Tuyệt vời – bé sẽ học theo giọng ba/mẹ này!'; }
  else if (score >= 70) { tier='good';      emoji='👍'; msg=`Tốt! Đúng ${score}% từ.`;             tip='Nghe lại và lặp thêm một lần nhé!'; }
  else if (score >= 40) { tier='ok';        emoji='💪'; msg=`Cố lên! Đúng ${score}% từ.`;          tip='Nghe chậm → lặp từng từ → nói cả câu.'; }
  else                  { tier='retry';     emoji='🔄'; msg=score===0?'Chưa nghe rõ giọng nói!':`Đúng ${score}% — Hãy thử lại!`; tip='Bấm ▶ Nghe chậm rồi bắt chước từng từ.'; }
  const wordHTML = matches.length ? '<div class="score-words">'+matches.map(m=>`<span class="score-word ${m.hit?'hit':'miss'}">${m.word}</span>`).join('')+'</div>' : '';
  badge.className = `score-badge show ${tier}`;
  badge.innerHTML = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-size:18px">${emoji}</span><strong>${msg}</strong></div><div class="score-bar-wrap"><div class="score-bar ${tier}" style="width:${score}%"></div></div><div style="font-size:12px;margin-top:4px;opacity:0.8">${tip}</div>${wordHTML}`;
  label.innerHTML = '<strong>Bấm mic</strong> để thử lại';
}
function playbackRec(id) { const blob = recState[id]?.blob; if (blob) new Audio(URL.createObjectURL(blob)).play(); }
