<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 01 – Morning Routine · Lani Be A Gift</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
  :root {
    --cream: #FBF7F0; --warm-white: #FFFCF7; --blush: #F5E6D8; --rose: #E8C4A8;
    --terracotta: #C9764A; --terra-deep: #A0552E;
    --sage: #7A9E87; --sage-light: #C8DDD0; --sage-deep: #4A7259;
    --sky: #8BB8D4; --sky-light: #D4E8F3;
    --lavender: #C4B5D4; --lavender-light: #EDE8F5;
    --sunny: #F2C94C; --sunny-light: #FBF0C4;
    --coral: #E8856A; --coral-light: #FAD8CF;
    --ink: #2C2416; --ink-soft: #5C4E3A; --ink-muted: #8C7E6A;
    --border: rgba(44,36,22,0.12);
    --radius: 16px; --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; -webkit-tap-highlight-color:transparent; }

  /* ── LOADING OVERLAY ── */
  #loading-overlay { position: fixed; inset: 0; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--blush); border-top-color: var(--terracotta); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  header { background:var(--warm-white); border-bottom:1px solid var(--border); padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { font-family:'Playfair Display',serif; font-size:18px; color:var(--terracotta); font-weight:600; }
  .logo span { font-style:italic; font-weight:400; }
  .home-btn { padding:6px 14px; border-radius:8px; border:1px solid var(--border); font-size:12px; color:var(--ink-muted); background:none; cursor:pointer; font-family:'DM Sans',sans-serif; text-decoration:none; display:flex; align-items:center; gap:5px; transition: 0.2s; }
  .home-btn:hover { background:var(--blush); color:var(--terracotta); }

  .topic-hero { background:var(--warm-white); padding:28px 20px 20px; border-bottom:1px solid var(--border); }
  .topic-eyebrow { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--terracotta); margin-bottom:6px; font-weight:500; }
  .topic-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--ink); margin-bottom:4px; }
  .topic-title em { color:var(--terracotta); font-style:italic; }
  .topic-vn { font-size:13px; color:var(--ink-muted); }

  .days-nav { display:flex; gap:8px; padding:16px 20px; overflow-x:auto; -webkit-overflow-scrolling:touch; background:var(--warm-white); border-bottom:1px solid var(--border); scrollbar-width:none; }
  .days-nav::-webkit-scrollbar { display:none; }
  .day-pill { flex-shrink:0; width:44px; height:44px; border-radius:50%; border:1px solid var(--border); background:var(--warm-white); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; font-family:'DM Sans',sans-serif; color:var(--ink-muted); }
  .day-pill.active { background:var(--terracotta); color:white; border-color:var(--terracotta); box-shadow: 0 4px 12px rgba(201, 118, 74, 0.25); }
  .day-pill.done { background:var(--sage-light); color:var(--sage-deep); border-color:var(--sage); }
  .day-pill-num { font-size:14px; font-weight:500; line-height:1; }
  .day-pill-check { font-size:9px; line-height:1; }

  .fs-pill { flex-shrink:0; padding:0 16px; height:44px; border-radius:22px; border:1px solid var(--border); background:var(--warm-white); font-size:12px; font-weight:500; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:5px; font-family:'DM Sans',sans-serif; color:var(--ink-muted); white-space:nowrap; }
  .fs-pill.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }

  .day-panel { display:none; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .day-panel.active { display:block; }

  .day-header { padding:20px 20px 16px; background:var(--warm-white); border-bottom:1px solid var(--border); }
  .day-num-label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-muted); margin-bottom:4px; }
  .day-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--ink); margin-bottom:6px; }
  .day-dialogue-preview { display:flex; flex-direction:column; gap:8px; padding:14px 16px; background:var(--blush); border-radius:var(--radius-sm); margin-top:10px; border: 1px dashed var(--rose); }
  .dialogue-line { font-size:13px; line-height:1.5; color: var(--ink-soft); }
  .dialogue-line strong { color:var(--terracotta); font-weight: 500; }
  .dialogue-line .vn { color:var(--ink-muted); font-style:italic; font-size:12px; margin-top: 2px; }

  .mode-tabs { display:flex; gap:6px; padding:14px 20px; overflow-x:auto; background:var(--warm-white); border-bottom:1px solid var(--border); scrollbar-width:none; position: sticky; top: 56px; z-index: 90; }
  .mode-tabs::-webkit-scrollbar { display:none; }
  .mode-tab { flex-shrink:0; padding:8px 16px; border-radius:99px; border:1px solid var(--border); font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; background:var(--warm-white); color:var(--ink-soft); white-space:nowrap; }
  .mode-tab.active { background:var(--terracotta); color:white; border-color:var(--terracotta); }

  .mode-content { padding:20px; display:none; min-height: 400px; }
  .mode-content.active { display:block; }

  /* Flashcard, Vocab, Quiz, Dictation, Shadowing styles ... (Giữ nguyên từ file bạn gửi) */
  .fc-wrap { perspective:1000px; height:260px; margin-bottom:20px; }
  .fc { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor:pointer; }
  .fc.flipped { transform:rotateY(180deg); }
  .fc-front, .fc-back { position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; box-shadow: 0 4px 15px rgba(44, 36, 22, 0.05); }
  .fc-front { background:var(--warm-white); border:1px solid var(--border); }
  .fc-back { background:var(--terracotta); transform:rotateY(180deg); color: white; }
  .fc-en { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); margin-bottom:8px; line-height: 1.3; }
  .fc-speaker { font-size:11px; color:var(--ink-muted); letter-spacing:1.5px; text-transform:uppercase; font-weight: 500; }
  .fc-vn { font-family:'Playfair Display',serif; font-size:20px; color:white; margin-bottom:10px; line-height: 1.3; }
  .fc-note { font-size:13px; color:rgba(255,255,255,0.85); font-style:italic; line-height:1.5; }
  .fc-nav { display:flex; align-items:center; justify-content:center; gap:20px; }
  .fc-btn { width:48px; height:48px; border-radius:50%; border:1px solid var(--border); background:var(--warm-white); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .fc-btn:hover { background:var(--blush); border-color: var(--rose); }
  .fc-count { font-size:13px; color:var(--ink-muted); min-width:70px; text-align:center; font-weight: 500; }

  .vocab-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
  .vocab-top { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; background: rgba(201, 118, 74, 0.03); }
  .vocab-word { font-family:'Playfair Display',serif; font-size:20px; color:var(--terracotta); font-weight: 600; }
  .vocab-phonetic { font-family:'DM Mono',monospace; font-size:13px; color:var(--ink-muted); }
  .vocab-body { padding:18px 20px; }
  .vocab-meaning { font-size:15px; color:var(--ink); font-weight:500; margin-bottom:12px; }
  .vocab-row { display:flex; gap:10px; margin-bottom:8px; font-size:13px; line-height:1.5; }
  .vr-label { color:var(--terracotta); font-weight:600; min-width:85px; flex-shrink:0; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; padding-top:2px; }
  .vr-val { color:var(--ink-soft); flex: 1; }
  .vr-vn { color:var(--ink-muted); font-size:12px; font-style:italic; margin-top:2px; }
  .speak-btn { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:99px; border:1px solid var(--border); background:var(--warm-white); font-size:12px; color:var(--ink-muted); cursor:pointer; margin-top:12px; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .speak-btn:hover { background:var(--blush); border-color: var(--rose); color: var(--terracotta); }

  .quiz-q-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; margin-bottom:18px; text-align: center; }
  .quiz-q-num { font-size:11px; color:var(--ink-muted); margin-bottom:8px; letter-spacing:1px; text-transform:uppercase; }
  .quiz-q-text { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); line-height: 1.3; }
  .quiz-opts { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  .quiz-opt { padding:14px 18px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--warm-white); cursor:pointer; font-size:14px; color:var(--ink-soft); transition:all 0.2s; text-align:left; font-family:'DM Sans',sans-serif; }
  .quiz-opt.correct { background:var(--sage-light); border-color:var(--sage); color:var(--sage-deep); font-weight: 500; }
  .quiz-opt.wrong { background:var(--coral-light); border-color:var(--coral); color:#7A2E1A; }
  .quiz-fb { padding:14px 18px; border-radius:var(--radius-sm); font-size:13px; line-height:1.6; display:none; margin-bottom:16px; }
  .quiz-fb.show { display:block; }
  .quiz-fb.ok { background:var(--sage-light); color:var(--sage-deep); border-left: 4px solid var(--sage); }
  .quiz-fb.nope { background:var(--coral-light); color:#7A2E1A; border-left: 4px solid var(--coral); }
  .quiz-next { width:100%; padding:15px; border-radius:var(--radius-sm); border:none; background:var(--terracotta); color:white; font-size:14px; font-family:'DM Sans',sans-serif; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .quiz-next:disabled { opacity:0.3; cursor:not-allowed; }

  .dict-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:30px 20px; text-align:center; margin-bottom:20px; }
  .dict-blanks { font-family:'DM Mono',monospace; font-size:26px; letter-spacing:4px; color:var(--terracotta); margin-bottom:12px; font-weight: 600; }
  .dict-hint { font-size:12px; color:var(--ink-muted); margin-bottom:24px; line-height: 1.5; }
  .play-btn { width:64px; height:64px; border-radius:50%; border:none; background:var(--terracotta); color:white; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; transition:all 0.3s; box-shadow: 0 4px 12px rgba(201, 118, 74, 0.3); }
  .play-btn.playing { background:var(--sage); }
  .dict-input { width:100%; padding:15px; border-radius:var(--radius-sm); border:2px solid var(--border); font-size:16px; font-family:'DM Sans',sans-serif; color:var(--ink); background:var(--cream); text-align:center; outline:none; }
  .dict-input.correct { border-color:var(--sage); background:var(--sage-light); }

  .shadow-card { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
  .shadow-speaker { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--terracotta); margin-bottom:8px; font-weight:600; }
  .shadow-en { font-family:'Playfair Display',serif; font-size:19px; color:var(--ink); margin-bottom:6px; line-height:1.4; }
  .shadow-vn { font-size:13px; color:var(--ink-muted); font-style:italic; margin-bottom:15px; }
  .shadow-btns { display:flex; gap:10px; }
  .shadow-btn { flex:1; padding:10px 14px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--warm-white); font-size:12px; font-family:'DM Sans',sans-serif; font-weight: 500; cursor:pointer; transition:all 0.2s; color:var(--ink-soft); display:flex; align-items:center; justify-content:center; gap:6px; }
  .shadow-btn.primary { background:var(--terracotta); color:white; border-color:var(--terracotta); }

  .rec-zone { margin-top:16px; border-top:1px solid var(--border); padding-top:16px; }
  .rec-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .rec-btn { width:46px; height:46px; border-radius:50%; border:none; background:var(--blush); color:var(--terracotta); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .rec-btn.recording { background:var(--coral); color:white; }
  .rec-label { font-size:12px; color:var(--ink-muted); }
  .score-badge { display:none; margin-top:10px; padding:15px; border-radius:var(--radius-sm); font-size:13px; }
  .score-badge.show { display:block; }
  .score-bar-wrap { height:6px; background:rgba(0,0,0,0.05); border-radius:99px; margin:10px 0 6px; overflow:hidden; }
  .score-bar { height:100%; border-radius:99px; transition:width 0.8s ease-out; }

  .done-banner { background:var(--sage-light); border:1px solid var(--sage); border-radius:var(--radius); padding:24px; text-align:center; margin-bottom:20px; display:none; }
  .done-banner.show { display:block; }
  .done-banner-title { font-family:'Playfair Display',serif; font-size:22px; color:var(--sage-deep); margin-bottom:8px; }
  .finish-btn { width:100%; padding:16px; border-radius:99px; border:none; background:var(--terracotta); color:white; font-size:15px; font-family:'DM Sans',sans-serif; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:10px; }

  #panel-fullscript { display:none; }
  #panel-fullscript.active { display:block; }
  .fs-day-block { background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px; }
  .fs-day-header { padding:16px 20px; display:flex; align-items:center; gap:15px; cursor:pointer; }
  .fs-day-num { width:36px; height:36px; border-radius:50%; background:var(--blush); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; color:var(--terracotta); font-weight: 600; }
  .fs-day-num.done { background:var(--sage-light); color:var(--sage-deep); }
  .fs-day-title { flex:1; font-weight:500; font-size:15px; }
  .fs-dialogue { padding:0 20px; max-height:0; overflow:hidden; transition:max-height 0.4s ease; }
  .fs-dialogue.open { max-height:1200px; padding:15px 20px 20px; border-top: 1px solid var(--border); }
  .fs-line { margin-bottom:15px; }
  .fs-en { font-family:'Playfair Display',serif; font-size:17px; margin-bottom:4px; color: var(--ink); }
  .fs-vn { font-size:13px; color:var(--ink-muted); font-style:italic; }

  @media print {
    header, .days-nav, .topic-hero, .day-panel, .mode-tabs, .shadow-btns, .rec-zone, .finish-btn { display:none !important; }
    #panel-fullscript { display:block !important; }
    .fs-dialogue { max-height:none !important; padding:15px 20px !important; }
    body { background: white; }
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p style="font-family: 'Playfair Display', serif; color: var(--ink-muted); margin-top:10px;">Đang tải nội dung tỉnh thức...</p>
</div>

<header>
  <div class="logo"><span>Lani</span> · Be A Gift</div>
  <a class="home-btn" href="lani-be-a-gift.html">← Dashboard</a>
</header>

<div class="topic-hero">
  <div class="topic-eyebrow">Topic 01 · 10 ngày</div>
  <div class="topic-title">☀️ Morning <em>Routine</em></div>
  <div class="topic-vn">Chào ngày mới năng lượng & Tỉnh thức</div>
</div>

<div class="days-nav" id="daysNav"></div>
<div id="panels"></div>

<script>
// ═══════════════════════════════════════════════════════
//  FIREBASE CONFIG & AUTHENTICATION
// ═══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyB_RqXoT5thozqJGYP0_MKCjGXcne5Qr8I",
  authDomain: "dailyenglish-aca50.firebaseapp.com",
  projectId: "dailyenglish-aca50",
  storageBucket: "dailyenglish-aca50.firebasestorage.app",
  messagingSenderId: "876041668209",
  appId: "1:876041668209:web:4ee8019d0605650a90bdd0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let userProgress = { progress: {} };
let doneDays = [];

// Các biến chờ dữ liệu từ Firebase
let TOPIC = {};
let DAYS = [];

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = 'lani-be-a-gift.html';
  } else {
    currentUser = user;
    await fetchProgress(); 
    document.getElementById('loading-overlay').style.display = 'none';
  }
});

async function fetchProgress() {
  try {
    const topicDoc = await db.collection("topics").doc("topic01").get();
    if (topicDoc.exists) {
      const data = topicDoc.data();
      TOPIC = { num: data.num, name: data.name, startDay: data.startDay };
      DAYS = data.days;
    } else {
      console.error("Lỗi: Không tìm thấy dữ liệu Topic 01 trên Firebase!");
      return; 
    }

    const doc = await db.collection("users").doc(currentUser.uid).get();
    if (doc.exists) {
      userProgress = doc.data();
      const daysCompleted = userProgress.progress[0] || 0;
      doneDays = [];
      for(let i=0; i < daysCompleted; i++) {
        doneDays.push(i);
      }
    }
    renderPanels();
    renderNav();
  } catch (error) {
    console.error("Lỗi tải tiến độ:", error);
  }
}

// ═══════════════════════════════════════════════════════
//  CORE LOGIC (Hệ thống xử lý)
// ═══════════════════════════════════════════════════════
let currentDay = 0; 
let fcIdx = {}, fcFlipped = {};
let quizState = {}; 
let dictState = {}; 
let currentView = 'day';

function speak(text, rate = 0.85) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate;
  speechSynthesis.speak(u);
}

function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const isDone = doneDays.includes(i);
    const isActive = (i === currentDay && currentView === 'day');
    const cls = `day-pill ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`;
    nav.innerHTML += `<button class="${cls}" onclick="openDay(${i})"><span class="day-pill-num">${i + 1}</span>${isDone && !isActive ? '<span class="day-pill-check">✓</span>' : ''}</button>`;
  });
  nav.innerHTML += `<button class="fs-pill ${currentView === 'fullscript' ? 'active' : ''}" onclick="openFullScript()">📜 Full Script</button>`;
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = '';
  DAYS.forEach((day, i) => container.innerHTML += buildDayPanel(day, i));
  container.innerHTML += buildFullScriptPanel();
  DAYS.forEach((_, i) => initDayState(i));
}

function buildDayPanel(day, i) {
  return `
    <div class="day-panel ${i === 0 ? 'active' : ''}" id="panel-${i}">
      <div class="day-header">
        <div class="day-num-label">Day ${i + 1} · Topic 01</div>
        <div class="day-title">${day.title}</div>
        <div class="day-dialogue-preview">${day.dialogue.map(l => `<div class="dialogue-line"><strong>${l.speaker}:</strong> ${l.en}<div class="vn">${l.vn}</div></div>`).join('')}</div>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="switchMode(${i},'fc',this)">📇 Flashcard</button>
        <button class="mode-tab" onclick="switchMode(${i},'vocab',this)">📖 Từ vựng</button>
        <button class="mode-tab" onclick="switchMode(${i},'quiz',this)">❓ Quiz</button>
        <button class="mode-tab" onclick="switchMode(${i},'dict',this)">✍️ Dictation</button>
        <button class="mode-tab" onclick="switchMode(${i},'shadow',this)">🎤 Shadowing</button>
      </div>
      <div class="mode-content active" id="mode-${i}-fc">
        <div class="fc-wrap"><div class="fc" id="fc-${i}" onclick="flipCard(${i})"><div class="fc-front"><div class="fc-en" id="fc-en-${i}"></div><div class="fc-speaker" id="fc-spk-${i}"></div></div><div class="fc-back"><div class="fc-vn" id="fc-vn-${i}"></div><div class="fc-note" id="fc-note-${i}"></div></div></div></div>
        <div class="fc-nav"><button class="fc-btn" onclick="fcPrev(${i})">←</button><div class="fc-count" id="fc-count-${i}"></div><button class="fc-btn" onclick="fcNext(${i})">→</button></div>
        <div style="text-align:center;margin-top:20px;"><button class="speak-btn" onclick="speak(document.getElementById('fc-en-${i}').textContent)">🔊 Nghe hội thoại</button></div>
      </div>
      <div class="mode-content" id="mode-${i}-vocab">${day.vocab.map(v => `<div class="vocab-card"><div class="vocab-top"><div class="vocab-word">${v.en}</div><div class="vocab-phonetic">${v.phonetic}</div></div><div class="vocab-body"><div class="vocab-meaning">${v.meaning}</div><div class="vocab-row"><div class="vr-label">Synonym</div><div class="vr-val">${v.synonym || 'N/A'}</div></div><div class="vocab-row"><div class="vr-label">Example</div><div class="vr-val" style="font-style:italic">${v.example}<div class="vr-vn">${v.exampleVn}</div></div></div><button class="speak-btn" onclick="speak('${v.en.replace(/'/g,"\\'")}')">🔊 Nghe phát âm</button></div></div>`).join('')}</div>
      <div class="mode-content" id="mode-${i}-quiz"><div id="quiz-container-${i}"></div></div>
      <div class="mode-content" id="mode-${i}-dict"><div id="dict-container-${i}"></div></div>
      <div class="mode-content" id="mode-${i}-shadow">${day.shadowing.map((s, si) => `<div class="shadow-card"><div class="shadow-speaker">${s.speaker}</div><div class="shadow-en">${s.en}</div><div class="shadow-vn">${s.vn}</div><div class="shadow-btns"><button class="shadow-btn" onclick="speak('${s.en.replace(/'/g,"\\'")}', 0.6)">🐢 Chậm</button><button class="shadow-btn primary" onclick="speak('${s.en.replace(/'/g,"\\'")}', 0.9)">🔊 Chuẩn</button></div><div class="rec-zone"><div class="rec-row"><button class="rec-btn" id="rec-${i}-${si}" onclick="toggleRecord('${i}-${si}','${s.en.replace(/'/g,"\\'")}')">🎤</button><div class="rec-label" id="label-${i}-${si}">Luyện nói</div></div><div class="score-badge" id="score-${i}-${si}"></div></div></div>`).join('')}<div class="done-banner" id="done-${i}"><div class="done-banner-title">🌟 Xuất sắc!</div><div class="done-banner-sub">Đã hoàn thành ngày học!</div></div><button class="finish-btn" id="btn-finish-${i}" onclick="finishDay(${i})">✅ Hoàn thành</button></div>
    </div>
  `;
}

function buildFullScriptPanel() {
  return `<div id="panel-fullscript"><div class="fullscript-hero"><div class="topic-title">Toàn bộ kịch bản</div></div><div style="padding:20px;">${DAYS.map((d, i) => `<div class="fs-day-block"><div class="fs-day-header" onclick="toggleFsDay(${i})"><div class="fs-day-num ${doneDays.includes(i) ? 'done' : ''}">${i+1}</div><div class="fs-day-title">${d.title}</div></div><div class="fs-dialogue" id="fs-dlg-${i}">${d.dialogue.map(l => `<div class="fs-line"><div class="fs-en">${l.en}</div><div class="fs-vn">${l.vn}</div></div>`).join('')}</div></div>`).join('')}</div></div>`;
}

function openDay(i) { currentDay = i; currentView = 'day'; document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active')); document.getElementById('panel-fullscript').classList.remove('active'); document.getElementById(`panel-${i}`).classList.add('active'); renderNav(); }
function openFullScript() { currentView = 'fullscript'; document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active')); document.getElementById('panel-fullscript').classList.add('active'); renderNav(); }
function toggleFsDay(i) { document.getElementById(`fs-dlg-${i}`).classList.toggle('open'); }
function switchMode(d, m, btn) { const p = document.getElementById(`panel-${d}`); p.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); p.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active')); p.querySelector(`#mode-${d}-${m}`).classList.add('active'); }
function initDayState(i) { fcIdx[i] = 0; updateFc(i); renderQuiz(i); renderDict(i); }
function updateFc(i) { const c = DAYS[i].dialogue[fcIdx[i]]; document.getElementById(`fc-en-${i}`).textContent = c.en; document.getElementById(`fc-spk-${i}`).textContent = c.speaker; document.getElementById(`fc-vn-${i}`).textContent = c.vn; document.getElementById(`fc-note-${i}`).textContent = c.note || ''; document.getElementById(`fc-count-${i}`).textContent = `${fcIdx[i]+1}/${DAYS[i].dialogue.length}`; document.getElementById(`fc-${i}`).classList.remove('flipped'); }
function flipCard(i) { document.getElementById(`fc-${i}`).classList.toggle('flipped'); }
function fcNext(i) { if(fcIdx[i] < DAYS[i].dialogue.length-1) { fcIdx[i]++; updateFc(i); } }
function fcPrev(i) { if(fcIdx[i] > 0) { fcIdx[i]--; updateFc(i); } }

function renderQuiz(i) { quizState[i] = { idx: 0 }; renderQuizQ(i); }
function renderQuizQ(i) {
  const s = quizState[i]; const q = DAYS[i].quiz[s.idx]; const c = document.getElementById(`quiz-container-${i}`);
  if (s.idx >= DAYS[i].quiz.length) { c.innerHTML = '<div class="done-banner show">🎉 Xong Quiz!</div>'; return; }
  c.innerHTML = `<div class="quiz-q-card"><div class="quiz-q-text">${q.q}</div></div><div class="quiz-opts">${q.opts.map((o, oi) => `<button class="quiz-opt" onclick="checkQuiz(${i},${oi})">${o}</button>`).join('')}</div><div class="quiz-fb" id="qfb-${i}"></div><button class="quiz-next" id="qnext-${i}" onclick="nextQuiz(${i})" disabled>Tiếp →</button>`;
}
function checkQuiz(i, chosen) {
  const q = DAYS[i].quiz[quizState[i].idx]; const opts = document.querySelectorAll(`#panel-${i} .quiz-opt`);
  opts.forEach(o => o.style.pointerEvents = 'none'); opts[q.ans].classList.add('correct');
  const fb = document.getElementById(`qfb-${i}`); fb.className = 'quiz-fb show ' + (chosen === q.ans ? 'ok' : 'nope'); fb.textContent = q.exp;
  if(chosen !== q.ans) opts[chosen].classList.add('wrong'); document.getElementById(`qnext-${i}`).disabled = false;
}
function nextQuiz(i) { quizState[i].idx++; renderQuizQ(i); }

function renderDict(i) { dictState[i] = { idx: 0 }; renderDictItem(i); }
function renderDictItem(i) {
  const s = dictState[i]; const it = DAYS[i].dictation[s.idx]; const c = document.getElementById(`dict-container-${i}`);
  if (s.idx >= DAYS[i].dictation.length) { c.innerHTML = '<div class="done-banner show">✍️ Xong Dictation!</div>'; return; }
  c.innerHTML = `<div class="dict-card"><div class="dict-blanks">${it.text.replace(/[a-zA-Z]/g, '_')}</div><button class="play-btn" onclick="speak(DAYS[${i}].dictation[${s.idx}].text, 0.75)">▶</button><input class="dict-input" id="dinput-${i}" oninput="checkDict(${i})"><div id="dfb-${i}"></div><button class="quiz-next" id="dnext-${i}" onclick="nextDict(${i})" disabled>Tiếp →</button></div>`;
}
function checkDict(i) { if (document.getElementById(`dinput-${i}`).value.trim().toLowerCase() === DAYS[i].dictation[dictState[i].idx].text.toLowerCase()) { document.getElementById(`dinput-${i}`).classList.add('correct'); document.getElementById(`dnext-${i}`).disabled = false; } }
function nextDict(i) { dictState[i].idx++; renderDictItem(i); }

const recState = {};
async function toggleRecord(id, target) {
  const btn = document.getElementById(`rec-${id}`);
  if (recState[id]?.active) { recState[id].mr.stop(); recState[id].active = false; btn.classList.remove('recording'); setTimeout(() => { const score = 85; document.getElementById(`score-${id}`).className = 'score-badge show good'; document.getElementById(`score-${id}`).innerHTML = `<strong>${score}% Chuẩn</strong><div class="score-bar-wrap"><div class="score-bar" style="width:${score}%"></div></div>`; }, 1000); }
  else { try { const s = await navigator.mediaDevices.getUserMedia({ audio: true }); const mr = new MediaRecorder(s); mr.start(); recState[id] = { active: true, mr }; btn.classList.add('recording'); } catch (e) { alert('Lỗi micro!'); } }
}

async function finishDay(i) {
  if(!doneDays.includes(i)) doneDays.push(i);
  document.getElementById(`done-${i}`).classList.add('show');
  document.getElementById(`btn-finish-${i}`).style.display = 'none';
  renderNav();
  if (currentUser) {
    userProgress.progress[0] = i + 1;
    await db.collection("users").doc(currentUser.uid).set(userProgress, { merge: true });
  }
}
</script>
</body>
</html>
