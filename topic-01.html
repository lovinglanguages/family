<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 01 – Morning Routine · Lani Be A Gift</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF7F0; --warm-white: #FFFCF7; --blush: #F5E6D8; --rose: #E8C4A8;
    --terracotta: #C9764A; --terra-deep: #A0552E;
    --sage: #7A9E87; --sage-light: #C8DDD0; --sage-deep: #4A7259;
    --border: rgba(44,36,22,0.12);
    --radius: 16px; --radius-sm: 10px;
    --ink: #2C2416; --ink-muted: #8C7E6A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; overflow-x: hidden; }

  /* ── HEADER ── */
  header {
    background:var(--warm-white); border-bottom:1px solid var(--border);
    padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:1000;
  }
  .logo { font-family:'Playfair Display',serif; font-size:18px; color:var(--terracotta); font-weight:600; }
  .logo span { font-style:italic; font-weight:400; }

  /* ── TOPIC HERO ── */
  .topic-hero { background:var(--warm-white); padding:28px 20px 20px; border-bottom:1px solid var(--border); }
  .topic-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--ink); }
  .topic-title em { color:var(--terracotta); font-style:italic; }

  /* ── NAV ── */
  .days-nav {
    display:flex; gap:8px; padding:16px 20px; overflow-x:auto; background:var(--warm-white);
    border-bottom:1px solid var(--border); scrollbar-width:none;
  }
  .day-pill {
    flex-shrink:0; width:44px; height:44px; border-radius:50%; border:1px solid var(--border);
    background:var(--warm-white); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .day-pill.active { background:var(--terracotta); color:white; border-color:var(--terracotta); box-shadow: 0 4px 10px rgba(201,118,74,0.3); }

  /* ── CONTENT ── */
  .day-panel { display:none; animation: fadeIn 0.4s ease; }
  .day-panel.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }

  .day-header { padding:20px; background:var(--warm-white); border-bottom:1px solid var(--border); }
  .mode-tabs { display:flex; gap:6px; padding:12px 20px; overflow-x:auto; background:var(--warm-white); border-bottom:1px solid var(--border); }
  .mode-tab { padding:8px 16px; border-radius:99px; border:1px solid var(--border); font-size:12px; cursor:pointer; white-space:nowrap; background: white; }
  .mode-tab.active { background:var(--terracotta); color:white; }

  .mode-content { padding:20px; }

  /* ── SHADOWING & SCORING ── */
  .shadow-card { background:white; border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:15px; }
  .shadow-en { font-family:'Playfair Display',serif; font-size:20px; margin-bottom:10px; line-height:1.4; color:var(--ink); }
  .shadow-vn { font-size:14px; color:var(--ink-muted); font-style:italic; margin-bottom:15px; }
  
  .btn-group { display:flex; gap:10px; margin-bottom:15px; }
  .btn-play-model { background: var(--blush); border:1px solid var(--rose); color: var(--terracotta); padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:500; display:flex; align-items:center; gap:5px; }
  
  .rec-zone { background: var(--cream); padding:15px; border-radius:12px; border: 1px dashed var(--terracotta); text-align:center; }
  .rec-btn { width:56px; height:56px; border-radius:50%; border:none; background:var(--terracotta); color:white; font-size:24px; cursor:pointer; transition: 0.3s; }
  .rec-btn.recording { background:var(--coral); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(232,133,106,0.7); } 70% { box-shadow: 0 0 0 15px rgba(232,133,106,0); } 100% { box-shadow: 0 0 0 0 rgba(232,133,106,0.7); } }
  
  .playback-btn { margin-top:10px; background:var(--sage); color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer; display:none; }
  .playback-btn.show { display:inline-block; }

  .score-display { margin-top:15px; display:none; }
  .score-display.show { display:block; }
  .score-bar-bg { height:8px; background:rgba(0,0,0,0.1); border-radius:4px; margin:10px 0; overflow:hidden; }
  .score-bar-fill { height:100%; background:var(--sage); transition: width 1s ease-out; }
  .score-text { font-weight:bold; font-size:18px; color:var(--sage-deep); }
  .feedback-msg { font-size:13px; color:var(--ink-muted); margin-top:5px; }

  /* ── DICTATION & QUIZ ── */
  .dict-input { width:100%; padding:12px; border-radius:8px; border:2px solid var(--border); font-size:16px; margin-top:10px; text-align:center; }
  .dict-input.correct { border-color:var(--sage); background:var(--sage-light); }

  .quiz-opt { width:100%; padding:12px; border:1px solid var(--border); border-radius:8px; background:white; margin-bottom:8px; cursor:pointer; text-align:left; }
  .quiz-opt.correct { background:var(--sage-light); border-color:var(--sage); }
  .quiz-opt.wrong { background:var(--coral-light); border-color:var(--coral); }
</style>
</head>

// ═══════════════════════════════════════════════════════
//  HỆ THỐNG XỬ LÝ ÂM THANH & CHẤM ĐIỂM
// ═══════════════════════════════════════════════════════
let currentDay = 0;
const recState = {};

// 1. Chọn giọng đọc chuẩn nhất (Google Female)
function getBestVoice() {
  const voices = speechSynthesis.getVoices();
  // Ưu tiên các giọng nữ tự nhiên nhất của Google và Microsoft
  const priority = [
    'Google US English', 
    'Microsoft Aria Online (Natural)', 
    'Samantha', 
    'Google UK English Female'
  ];
  for (let name of priority) {
    const v = voices.find(v => v.name.includes(name));
    if (v) return v;
  }
  return voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female')) || voices[0];
}

function speak(text, rate = 0.85) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getBestVoice();
  u.rate = rate;
  u.pitch = 1.1; // Chỉnh tông cao hơn chút cho ấm áp
  speechSynthesis.speak(u);
}

// 2. Chấm điểm & Thu âm Shadowing
async function toggleRecord(id, targetText) {
  const btn = document.getElementById(`rec-${id}`);
  const label = document.getElementById(`label-${id}`);
  const scoreDiv = document.getElementById(`score-div-${id}`);
  const playBtn = document.getElementById(`playbk-${id}`);

  if (recState[id]?.active) {
    // Dừng thu âm
    recState[id].mediaRecorder.stop();
    recState[id].recognition.stop();
    recState[id].active = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤';
    label.innerText = "Đang phân tích...";
  } else {
    // Bắt đầu thu âm
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mediaRecorder = new MediaRecorder(stream);
      const audioChunks = [];
      
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
        recState[id].audioUrl = URL.createObjectURL(audioBlob);
        playBtn.classList.add('show');
      };

      // Web Speech API để chấm điểm
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'en-US';
      recognition.interimResults = false;

      recognition.onresult = (event) => {
        const resultText = event.results[0][0].transcript.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"");
        const target = targetText.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"");
        
        // Tính điểm đơn giản dựa trên số từ khớp
        const targetWords = target.split(' ');
        const resultWords = resultText.split(' ');
        let matches = 0;
        targetWords.forEach(w => { if(resultWords.includes(w)) matches++; });
        
        const score = Math.round((matches / targetWords.length) * 100);
        showScore(id, score, resultText);
      };

      recognition.onerror = () => { label.innerText = "Lỗi thu âm. Thử lại nhé!"; };

      mediaRecorder.start();
      recognition.start();
      recState[id] = { active: true, mediaRecorder, recognition };
      btn.classList.add('recording');
      btn.innerHTML = '⏹';
      label.innerText = "Con đang nói... Bấm ⏹ khi xong nhé";
      scoreDiv.classList.remove('show');
    } catch (e) {
      alert("Cần cho phép micro để luyện nói Lani nhé!");
    }
  }
}

function showScore(id, score, transcript) {
  const scoreDiv = document.getElementById(`score-div-${id}`);
  const bar = document.getElementById(`bar-${id}`);
  const text = document.getElementById(`val-${id}`);
  const feedback = document.getElementById(`fb-${id}`);
  const label = document.getElementById(`label-${id}`);

  scoreDiv.classList.add('show');
  text.innerText = score + "%";
  bar.style.width = score + "%";
  label.innerText = "Học viên nói: \"" + transcript + "\"";

  if (score > 80) feedback.innerText = "🌟 Tuyệt vời! Phát âm rất chuẩn.";
  else if (score > 50) feedback.innerText = "👍 Khá tốt, con cố gắng rõ chữ hơn nhé.";
  else feedback.innerText = "🔄 Con nghe lại mẫu và thử lại lần nữa nào.";
}

function playBack(id) {
  if (recState[id]?.audioUrl) {
    const audio = new Audio(recState[id].audioUrl);
    audio.play();
  }
}

// 3. Render giao diện

      document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active'));
      document.getElementById(`panel-${i}`).classList.add('active');
    };
    nav.appendChild(pill);

    // Panels
    const panel = document.createElement('div');
    panel.className = `day-panel ${i===0?'active':''}`;
    panel.id = `panel-${i}`;
    panel.innerHTML = `
      <div class="day-header">
        <div style="font-size:11px; color:var(--terracotta); font-weight:bold; margin-bottom:5px;">DAY ${i+1}</div>
        <div class="day-title">${day.title}</div>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="tab(this, ${i}, 'sh')">🎤 Shadowing</button>
        <button class="mode-tab" onclick="tab(this, ${i}, 'vc')">📖 Vocab</button>
        <button class="mode-tab" onclick="tab(this, ${i}, 'qz')">❓ Quiz</button>
      </div>
      <div class="mode-content" id="sh-${i}" style="display:block">
        ${day.dialogue.map((line, li) => `
          <div class="shadow-card">
            <div style="font-size:10px; color:var(--terracotta); font-weight:bold">${line.speaker.toUpperCase()}</div>
            <div class="shadow-en">${line.en}</div>
            <div class="shadow-vn">${line.vn}</div>
            <div class="btn-group">
              <button class="btn-play-model" onclick="speak('${line.en.replace(/'/g,"\\'")}')">🔊 Nghe mẫu</button>
            </div>
            <div class="rec-zone">
              <button class="rec-btn" id="rec-${i}-${li}" onclick="toggleRecord('${i}-${li}', '${line.en.replace(/'/g,"\\'")}')">🎤</button>
              <div class="rec-label" id="label-${i}-${li}" style="margin-top:10px">Bấm để bắt đầu nói</div>
              <button class="playback-btn" id="playbk-${i}-${li}" onclick="playBack('${i}-${li}')">▶ Nghe lại giọng con</button>
              <div class="score-display" id="score-div-${i}-${li}">
                <div class="score-text" id="val-${i}-${li}">0%</div>
                <div class="score-bar-bg"><div class="score-bar-fill" id="bar-${i}-${li}"></div></div>
                <div class="feedback-msg" id="fb-${i}-${li}"></div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="mode-content" id="vc-${i}" style="display:none">
        ${day.vocab.map(v => `
          <div class="shadow-card">
            <div class="shadow-en">${v.en} <small>${v.phonetic}</small></div>
            <div class="shadow-vn">${v.meaning}</div>
            <div style="font-size:13px; color:var(--ink-muted)">Ví dụ: ${v.example}</div>
            <button class="btn-play-model" style="margin-top:10px" onclick="speak('${v.en}')">🔊 Nghe</button>
          </div>
        `).join('')}
      </div>
      <div class="mode-content" id="qz-${i}" style="display:none">
        <div class="shadow-card">
          <div class="shadow-en" style="font-size:18px">${day.quiz.q}</div>
          ${day.quiz.opts.map((o, oi) => `
            <button class="quiz-opt" onclick="checkQ(this, ${oi}, ${day.quiz.ans})">${o}</button>
          `).join('')}
        </div>
      </div>
    `;
    container.appendChild(panel);
  });
}

function tab(btn, day, mode) {
  const p = document.getElementById(`panel-${day}`);
  p.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  p.querySelectorAll('.mode-content').forEach(c=>c.style.display='none');
  document.getElementById(`${mode}-${day}`).style.display='block';
}

function checkQ(btn, chosen, correct) {
  if(chosen === correct) btn.classList.add('correct');
  else btn.classList.add('wrong');
}

speechSynthesis.onvoiceschanged = () => {}; // Khởi tạo voices
render();
</script>
</body>
